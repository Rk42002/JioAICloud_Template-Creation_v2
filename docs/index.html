  const uniqueCode = generateUniqueCode();

  const trackDesc = {
    A: 'Shiny Maximal — jazzy festive, ornamental, gold-heavy, loud on purpose',
    B: 'Modern Desi — muted earthy tones, editorial restraint, contemporary Indian',
    C: 'Minimalist Classy — maximum restraint, tonal elegance, monochromatic',
    D: 'Artsy Playful — flat bright, sticker/doodle energy, Gen-Z cheerful',
    E: 'Soft & Warm — gentle pastels, botanical warmth, calming morning energy',
  };
  const layoutDesc = {
    L1: 'Text Top — text zone at upper portion, visual fills lower two-thirds',
    L2: 'Text Overlay — visual fills entire canvas, text sits centred over it',
    L3: 'Text Left — left column reserved for text, visual anchored on the right',
    L4: 'Text Right — right column reserved for text, visual anchored on the left',
    L5: 'Text Bottom — visual fills upper portion, text zone at bottom',
    L6: 'Text Centre — frame holds all edges, central zone reserved for text',
  };

  let header = `You are a visual quality evaluator for an AI-generated poster background for a Good Morning greeting card.\n\nUnique Run Code: ${uniqueCode}\n\n`;
  header += `📋 WIZARD SELECTIONS\n`;

  let checks = [];
  let selectionsText = '';

  if (arch === 'A1') {
    const illusItem = getIllusItem();
    const illusName = illusItem ? illusItem.name : (STATE.illusItem === 'NONE' ? 'None' : '—');
    const palObj = getPalette();
    const palName = palObj ? palObj.name : '—';
    const palNatural = (palObj && palObj.tracks && palObj.tracks[STATE.track]) ? palObj.tracks[STATE.track].natural : '—';
    const finishOpt = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
    const renderOpt = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
    const motifOpt = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
    const presetOpt = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
    const illusSizeLabels = { Small: 'Small Accent (<15% canvas)', Medium: 'Medium (30–40% canvas)', Large: 'Large / Hero (50%+ canvas)' };

    selectionsText = `• Archetype: A1 — Text + Frame (decorative border is the defining visual)
• Frame Type: ${step2Opt ? step2Opt.id + ' ' + step2Opt.name : '—'} — ${step2Opt ? step2Opt.desc : ''}
• Layout: ${STATE.layout || '—'} — ${layoutDesc[STATE.layout] || ''}
• Track: ${STATE.track || '—'} — ${trackDesc[STATE.track] || ''}
• Colour Palette: ${palName} (${palNatural})
• Background Finish: ${finishOpt ? finishOpt.name : '—'}
• Illustration: ${illusName}
• Illustration Size: ${illusSizeLabels[STATE.illusSize] || STATE.illusSize || '—'}
• Frame Decoration: ${STATE.frameDecoration || '—'}
• Render Style: ${renderOpt ? renderOpt.name : '—'}
• Motif: ${motifOpt ? motifOpt.name : (STATE.frameDecoration === 'Plain' ? 'None (Plain frame)' : '—')}
• Intensity: ${presetOpt ? presetOpt.name : '—'}`;

    const frameStructureDesc = {
      F1: 'a complete decorative border running along all 4 edges',
      F2: 'horizontal decorative bands at the top and bottom edges only — sides must be open',
      F3: 'a single decorative band at the bottom edge only',
      F4: 'small decorative patches at the 4 corners only — all other edges open',
      F5: 'a curved arch/canopy shape at the top header zone — no frame at the bottom',
    };
    const textZoneDesc = {
      L1: 'upper portion (top third) is the text zone — must be visually clear',
      L2: 'central row is the text zone — illustration fills the whole canvas behind it',
      L3: 'left column is the text zone — must be uncluttered',
      L4: 'right column is the text zone — must be uncluttered',
      L5: 'lower portion (bottom third) is the text zone — must be visually clear',
      L6: 'central zone is the text zone — frame holds all edges around it',
    };
    const decoDesc = {
      Plain: 'No motifs or ornamentation — clean border lines only.',
      Simple: 'Minimal motifs at corners or midpoints only. NOT densely ornate.',
      Detailed: 'Full ornate frame — florals, paisleys, mandalas throughout the border.',
    };

    checks = [
      `FRAME STRUCTURE — Does the frame appear as ${frameStructureDesc[STATE.step2] || 'the correct frame type'}?`,
      `TEXT ZONE — Is the ${textZoneDesc[STATE.layout] || 'text zone clear and uncluttered'}?`,
      `MAIN ILLUSTRATION — Is the "${illusName}" clearly visible, well-rendered, and positioned in the illustration zone?`,
      `ILLUSTRATION SIZE — Does the illustration occupy approximately ${illusSizeLabels[STATE.illusSize] || STATE.illusSize || 'the expected canvas area'}?`,
      `FRAME DECORATION — ${decoDesc[STATE.frameDecoration] || 'Is the frame decoration level correct?'} Are motifs confined to the frame/border edges only (not near the illustration)?`,
      `TRACK AESTHETIC — Does the overall look match "${trackDesc[STATE.track] || ''}"?`,
      `COLOUR PALETTE — Does the background feel like "${palNatural}"? Does the illustration use DIFFERENT colours from the background?`,
      `RENDER STYLE — Does the illustration look like "${renderOpt ? renderOpt.name : ''}"? (${renderOpt ? renderOpt.desc : ''})`,
      `NO AI-GENERATED TEXT — Is there any AI-rendered text or lettering visible in the image? (There should be none.)`,
    ];

  } else if (arch === 'A2') {
    const illusItem = getIllusItem();
    const illusName = illusItem ? illusItem.name : '—';
    const palObj = getPalette();
    const palName = palObj ? palObj.name : '—';
    const palNatural = (palObj && palObj.tracks && palObj.tracks[STATE.track]) ? palObj.tracks[STATE.track].natural : '—';
    const finishOpt = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
    const renderOpt = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
    const motifOpt = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
    const presetOpt = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
    const densityLabel = STATE.a2SubElements.length === 0 ? 'Light (1–2 elements, generous space)' : STATE.a2SubElements.length === 1 ? 'Medium (balanced, main + 1 accent)' : 'Dense (rich scene, main + 2 accents)';
    const accentNames = STATE.a2SubElements.map(id => {
      const acc = Object.values(ACCENT_ITEMS || {}).find ? Object.keys(ACCENT_ITEMS || {}).map(k => ACCENT_ITEMS[k]).find(a => a && STATE.a2SubElements.includes(Object.keys(ACCENT_ITEMS).find(k => ACCENT_ITEMS[k] === a))) : null;
      return id;
    });
    const accentDisplay = STATE.a2SubElements.length === 0 ? 'None' : STATE.a2SubElements.join(', ');

    selectionsText = `• Archetype: A2 — Text + Illustrations (illustrations are the primary visual, no dominant frame)
• Layout: ${STATE.layout || '—'} — ${layoutDesc[STATE.layout] || ''}
• Track: ${STATE.track || '—'} — ${trackDesc[STATE.track] || ''}
• Colour Palette: ${palName} (${palNatural})
• Background Finish: ${finishOpt ? finishOpt.name : '—'}
• Illustration: ${illusName}
• Illustration Density: ${densityLabel} (auto-calculated from accent count: ${STATE.a2SubElements.length})
• Accent Sub-Elements: ${accentDisplay}
• Render Style: ${renderOpt ? renderOpt.name : '—'}
• Motif: ${motifOpt ? motifOpt.name : '—'}
• Intensity: ${presetOpt ? presetOpt.name : '—'}`;

    const textZoneDesc2 = {
      L1: 'upper third is the text zone — must be clear',
      L2: 'central row is text zone — illustration fills entire canvas behind it',
      L3: 'left column is the text zone — must be empty of illustration',
      L4: 'right column is the text zone — must be empty of illustration',
      L5: 'lower third is the text zone — must be clear',
      L6: 'central zone is the text zone',
    };

    checks = [
      `TEXT ZONE — Is the ${textZoneDesc2[STATE.layout] || 'text zone'} clearly free of illustration elements?`,
      `MAIN ILLUSTRATION — Is the "${illusName}" clearly the dominant visual element?`,
      `ILLUSTRATION DENSITY — Does the composition feel ${densityLabel}? (${STATE.a2SubElements.length === 0 ? 'Generous breathing space, 1–2 elements' : STATE.a2SubElements.length === 1 ? 'Balanced, one main + one accent' : 'Rich scene, main + two accents'})`,
      `NO DOMINANT FRAME — Are there no dominant border frames enclosing the canvas? (Motifs/accents around the illustration are fine, full frame borders are not expected.)`,
      `TRACK AESTHETIC — Does the overall look match "${trackDesc[STATE.track] || ''}"?`,
      `COLOUR PALETTE — Does the background feel like "${palNatural}"? Does the illustration use DIFFERENT colours from the background (no colour bleed)?`,
      `RENDER STYLE — Does the illustration look like "${renderOpt ? renderOpt.name : ''}"?`,
      `NO AI-GENERATED TEXT — Is there any AI-rendered text or lettering visible? (There should be none.)`,
    ];

  } else if (arch === 'B1') {
    const d = gatherB1PromptData();
    const mainName = d.sceneItems.length >= 1 ? d.sceneItems[0].name : '—';
    const supportingNames = d.sceneItems.slice(1).map(i => i.name).join(', ') || 'None';
    const moodOpt = STATE.mood ? B1_MOOD_OPTIONS.find(m => m.id === STATE.mood) : null;
    const intOpt = STATE.customPreset ? B1_INTENSITY_PRESETS.find(p => p.id === STATE.customPreset) : null;
    const photoTrack = B1_PHOTO_TRACKS[STATE.track] || {};
    const overlayTypeDesc = {
      O1: 'Uniform dark overlay across entire image',
      O2: 'Gradient — darker toward the top, brighter toward the bottom',
      O3: 'Gradient — darker toward the bottom, brighter toward the top',
      O4: 'Vignette — bright centre, darkened edges',
      O5: 'Caption bar — solid darkened strip at the footer',
    };

    selectionsText = `• Archetype: B1 — Full Photo Background (photorealistic photography, not illustrated)
• Overlay Type: ${step2Opt ? step2Opt.id + ' ' + step2Opt.name : '—'} — ${overlayTypeDesc[STATE.step2] || ''}
• Layout: ${STATE.layout || '—'} — ${layoutDesc[STATE.layout] || ''}
• Track: ${STATE.track || '—'} — ${photoTrack.name || ''} (${photoTrack.desc || ''})
• Main Scene Element: ${mainName}
• Supporting Elements: ${supportingNames}
• Mood / Lighting: ${moodOpt ? moodOpt.name + ' — ' + moodOpt.desc : '—'}
• Overlay Strength: ${STATE.overlayStrength === 'heavy' ? 'Heavy (opaque, strong contrast)' : 'Light (subtle, semi-transparent)'}
• Intensity / Camera: ${intOpt ? intOpt.name + ' — ' + intOpt.desc : '—'}`;

    const textZoneDescB1 = {
      L1: 'The upper portion must appear darker/suitable for white text overlay.',
      L2: 'The central zone must be readable for text overlay.',
      L3: 'The left column must appear suitable for text overlay.',
      L4: 'The right column must appear suitable for text overlay.',
      L5: 'The lower portion must appear darker/suitable for white text overlay.',
      L6: 'The central zone must be readable for text overlay.',
    };

    checks = [
      `MAIN SUBJECT — Is "${mainName}" clearly visible as the main subject? Is it photorealistic (not illustrated/cartoon)?`,
      `SUPPORTING ELEMENTS — ${supportingNames !== 'None' ? `Are the supporting elements (${supportingNames}) present as background/contextual props?` : 'No supporting elements selected — is the composition focused on the main subject alone?'}`,
      `OVERLAY & TEXT ZONE — ${textZoneDescB1[STATE.layout] || 'Is there a clear text-readable zone?'} Overlay type: ${overlayTypeDesc[STATE.step2] || ''}. Strength: ${STATE.overlayStrength}.`,
      `PHOTOGRAPHY STYLE — Does it look like "${photoTrack.name || ''}"? (${photoTrack.desc || ''})`,
      `MOOD & LIGHTING — Does the lighting + colour treatment match "${moodOpt ? moodOpt.name : '—'}"? (${moodOpt ? moodOpt.desc : ''})`,
      `CAMERA / FRAMING — Does the framing match "${intOpt ? intOpt.name : '—'}"? (${intOpt ? intOpt.desc : ''})`,
      `PHOTO QUALITY — Does it look like a professional DSLR photograph with natural depth of field? No CGI, no illustration, no cartoon elements.`,
      `NO AI-GENERATED TEXT — Is there any AI-rendered text or lettering visible in the image? (There should be none.)`,
    ];
  }

  const checksText = checks.map((c, i) => `${i + 1}. ${c}`).join('\n');

  const prompt = `${header}${selectionsText}

✅ EVALUATION CHECKLIST
For each item below, respond: ✅ Pass | ⚠️ Partial (briefly explain) | ❌ Fail (briefly explain)

${checksText}

📊 AFTER COMPLETING THE CHECKLIST, PROVIDE:
• Dimension Scores (1–5 each):
  – Illustration / Subject Quality: __/5
  – Composition & Layout Clarity: __/5
  – Track Style Match: __/5
  – Colour Harmony: __/5
  – Text Zone Readability: __/5
• Would a real Indian WhatsApp user share this as a Good Morning greeting? (Yes / Maybe / No)
• Top issue (if any, in one sentence):

Upload the generated image alongside this prompt in Google Gemini / your AI model.`;

  return prompt;
}

function copyGeminiEvalPrompt(btn) {
  const prompt = buildGeminiEvalPrompt();
  navigator.clipboard.writeText(prompt).then(() => {
    btn.textContent = '✓ Gemini Prompt Copied!';
    setTimeout(() => { btn.textContent = '🤖 Copy Gemini Eval Prompt'; }, 3000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Gemini Prompt Copied!';
    setTimeout(() => { btn.textContent = '🤖 Copy Gemini Eval Prompt'; }, 3000);
  });
}

function exportEvalRow(btn) {
  const isB1 = STATE.archetype === 'B1';
  const runId = generateUniqueCode();
  const timestamp = new Date().toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' });
  const archetype = STATE.archetype || '';
  const step2Opt = getStep2Option();
  const overlay = isB1 ? ((STATE.overlayStrength || 'medium') + ' (auto from ' + (getLayout() ? getLayout().name : '') + ')') : (step2Opt ? step2Opt.name : '');
  const layout = getLayout() ? getLayout().name : '';
  const trackObj = getTrack();
  const track = trackObj ? trackObj.name : '';

  let palette = '', bgFinish = '', illustration = '', renderStyle = '', frameDeco = '', motif = '';
  let sceneMain = '', sceneSupporting = '', mood = '', intensity = '', illusSize = '', a2Accents = '', overlayStrength = '';

  if (isB1) {
    const d = gatherB1PromptData();
    sceneMain = d.sceneItems.length >= 1 ? d.sceneItems[0].name : '';
    sceneSupporting = d.sceneItems.slice(1).map(i => i.name).join(', ');
    const moodOpt = STATE.mood ? B1_MOOD_OPTIONS.find(m => m.id === STATE.mood) : null;
    mood = moodOpt ? moodOpt.name : '';
    overlayStrength = STATE.overlayStrength === 'heavy' ? 'Heavy' : 'Light';
    const intOpt = STATE.customPreset ? B1_INTENSITY_PRESETS.find(p => p.id === STATE.customPreset) : null;
    intensity = intOpt ? intOpt.name : '';
  } else {
    const pal = getPalette();
    palette = pal ? pal.name : '';
    const finishOpt = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
    bgFinish = finishOpt ? finishOpt.name : '';
    const illusItemObj = getIllusItem();
    illustration = illusItemObj ? illusItemObj.name : (STATE.illusItem === 'NONE' ? 'None' : '');
    const illusRenderOpt = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
    renderStyle = illusRenderOpt ? illusRenderOpt.name : '';
    frameDeco = STATE.frameDecoration || '';
    const motifOpt = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
    motif = motifOpt ? motifOpt.name : '';
    const presetOpt = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
    intensity = presetOpt ? presetOpt.name : '';
    const illusSizeOpt = STATE.illusSize ? ILLUS_SIZE_OPTS.find(o => o.id === STATE.illusSize) : null;
    illusSize = illusSizeOpt ? illusSizeOpt.name : '';
    a2Accents = STATE.archetype === 'A2' ? (STATE.a2SubElements.length + ' accent(s)') : '';
  }

  const aiEvalPrompt = buildAIEvalPrompt(); // compact model-agnostic eval prompt for Excel col Y (25)

  // Sanitize any cell for TSV/HTML: tabs/newlines break column alignment in Excel
  function cellForTsv(s) {
    if (s == null || s === undefined) return '';
    return String(s).replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\t/g, ' ').replace(/\n/g, ' ');
  }
  function escapeHtmlCell(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Build tab-separated row — MUST match Prompt_Eval_Framework_v4.xlsx "Eval Data" row 2 exactly (36 cols):
  // A–D   Unique Code | Timestamp | Evaluator | Platform Tested
  // E–H   Archetype | Frame/Overlay Type | Layout | Overlay Strength (B1)
  // I–L   Track | Colour Palette | Background Finish | Render Style
  // M–R   Illustration/Scene Main | Illus Size (A1) | Frame Decoration | Motif | Accents/Supporting | Mood (B1)
  // S     Intensity
  // T–X   5 platform prompts
  // Y     AI Eval Prompt (paste + image into Claude/Gemini/ChatGPT for score)
  // Z     AI Model Response (QA pastes model output)
  // AA–AJ 10 blank scoring / notes columns for QA
  const step2Label = step2Opt ? step2Opt.name : '';
  const cols = [
    cellForTsv(runId), cellForTsv(timestamp), '', '', // A–D
    cellForTsv(archetype), cellForTsv(step2Label), cellForTsv(layout), cellForTsv(overlayStrength), // E–H (4 cols only — no extra column)
    cellForTsv(track), cellForTsv(palette), cellForTsv(bgFinish), cellForTsv(renderStyle), // I–L
    cellForTsv(illustration || sceneMain), cellForTsv(illusSize), cellForTsv(frameDeco), cellForTsv(motif), // M–P
    cellForTsv(a2Accents || sceneSupporting), cellForTsv(mood), // Q–R
    cellForTsv(intensity), // S
    cellForTsv(GENERATED_PROMPTS[0]),
    cellForTsv(GENERATED_PROMPTS[1]),
    cellForTsv(GENERATED_PROMPTS[2]),
    cellForTsv(GENERATED_PROMPTS[3]),
    cellForTsv(GENERATED_PROMPTS[4]), // T–X
    cellForTsv(aiEvalPrompt), // Y — AI Eval Prompt
    '', // Z — AI Model Response (QA fills after running eval)
    '', '', '', '', '', '', '', '', '', '', // AA–AJ — 10 Part B columns
  ];

  if (cols.length !== 36) {
    console.error('Eval export: expected 36 columns (Prompt_Eval_Framework_v4), got', cols.length);
  }

  const tsv = cols.join('\t');
  // HTML table + plain TSV: Excel / Google Sheets paste one click into A4 and fills A→AJ (full row)
  const htmlTable =
    '<meta charset="utf-8"><table xmlns:o="urn:schemas-microsoft-com:office:office">' +
    '<tbody><tr>' +
    cols.map(function (c) { return '<td>' + escapeHtmlCell(c) + '</td>'; }).join('') +
    '</tr></tbody></table>';

  function fallbackCopyPlain() {
    const ta = document.createElement('textarea');
    ta.value = tsv;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.ClipboardItem && typeof ClipboardItem !== 'undefined') {
    try {
      var plainBlob = new Blob([tsv], { type: 'text/plain;charset=utf-8' });
      var htmlBlob = new Blob([htmlTable], { type: 'text/html;charset=utf-8' });
      navigator.clipboard.write([
        new ClipboardItem({
          'text/plain': plainBlob,
          'text/html': htmlBlob,
        }),
      ]).then(function () {
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      }).catch(function () {
        navigator.clipboard.writeText(tsv).then(function () {
          btn.textContent = '✓ Copied (plain only)';
          btn.style.background = '#16A34A';
          setTimeout(function () {
            btn.textContent = '📋 Export Eval Row';
            btn.style.background = '';
          }, 3000);
        }).catch(function () {
          fallbackCopyPlain();
          btn.textContent = '✓ Eval Row Copied!';
          btn.style.background = '#16A34A';
          setTimeout(function () {
            btn.textContent = '📋 Export Eval Row';
            btn.style.background = '';
          }, 3000);
        });
      });
    } catch (e) {
      navigator.clipboard.writeText(tsv).then(function () {
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      }).catch(function () {
        fallbackCopyPlain();
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      });
    }
  } else {
    navigator.clipboard.writeText(tsv).then(function () {
      btn.textContent = '✓ Eval Row Copied!';
      btn.style.background = '#16A34A';
      setTimeout(function () {
        btn.textContent = '📋 Export Eval Row';
        btn.style.background = '';
      }, 3000);
    }).catch(function () {
      fallbackCopyPlain();
      btn.textContent = '✓ Eval Row Copied!';
      btn.style.background = '#16A34A';
      setTimeout(function () {
        btn.textContent = '📋 Export Eval Row';
        btn.style.background = '';
      }, 3000);
    });
  }
}

function copyPromptByIndex(btn, index) {
  const text = GENERATED_PROMPTS[index];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for browsers that block clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

render();
</script>
