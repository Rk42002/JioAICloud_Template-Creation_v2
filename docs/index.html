function getSteps() {
  const isSV = STATE.category === 'suvichar';
  if (STATE.archetype === 'B1') {
    return isSV
      ? ['template', 'feeling', 'b1_text_placement', 'track', 'scene_elements', 'mood', 'intensity']
      : ['template', 'b1_text_placement', 'track', 'scene_elements', 'mood', 'intensity'];
  }
  if (STATE.archetype === 'A2') {
    return isSV
      ? ['template', 'feeling', 'layout', 'track', 'colour_finish', 'visual', 'intensity']
      : ['template', 'layout', 'track', 'colour_finish', 'visual', 'intensity'];
  }
  return isSV
    ? ['template', 'feeling', 'style', 'layout', 'track', 'colour_finish', 'visual', 'intensity']
    : ['template', 'style', 'layout', 'track', 'colour_finish', 'visual', 'intensity'];
}

const STEP_LABELS = {
  template: 'Template',
  feeling: 'Feeling',
  style: 'Style',
  layout: 'Layout',
  track: 'Track',
  colour_finish: 'Colour & Finish',
  visual: 'Visual',
  intensity: 'Intensity',
  // font_text step removed — font/text not included in AI prompts
  // B1 Photo Background specific steps
  b1_text_placement: 'Text & Overlay',
  scene_elements: 'Scene Elements',
  mood: 'Mood',
};

function getArchetype() { return ARCHETYPES.find(a => a.id === STATE.archetype); }
function getTrack() { return TRACKS.find(t => t.id === STATE.track); }
function getLayout() { return LAYOUTS.find(l => l.id === STATE.layout); }

function getPalette() {
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  if (!tv) return null;
  return { ...base, ...tv };
}

function getFont() {
  const base = FONTS_BASE.find(f => f.id === STATE.font);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  return { ...base, ...tv };
}

function getIllusItem() {
  if (!STATE.illusItem || STATE.illusItem === 'NONE') return null;
  for (const cat of ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  // Also search Suvichar catalogue
  for (const cat of SUVICHAR_ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  return null;
}

function getFinishOptions() {
  const map = { A: FINISH_OPTIONS, B: FINISH_OPTIONS_B, C: FINISH_OPTIONS_C, D: FINISH_OPTIONS_D, E: FINISH_OPTIONS_E };
  const base = map[STATE.track] || [];
  if (STATE.category === 'suvichar') return [...base, ...SUVICHAR_BG_FINISHES];
  return base;
}

function getIllusRenderOptions() {
  const map = { A: ILLUS_RENDER_OPTIONS, B: ILLUS_RENDER_B, C: ILLUS_RENDER_C, D: ILLUS_RENDER_D, E: ILLUS_RENDER_E };
  return map[STATE.track] || [];
}

function getMotifOptions() {
  const map = { A: MOTIF_OPTIONS, B: MOTIF_OPTIONS_B, C: MOTIF_OPTIONS_C, D: MOTIF_OPTIONS_D, E: MOTIF_OPTIONS_E };
  return map[STATE.track] || [];
}

function getCustomPresets() {
  const map = { A: CUSTOM_PRESETS, B: CUSTOM_PRESETS_B, C: CUSTOM_PRESETS_C, D: CUSTOM_PRESETS_D, E: CUSTOM_PRESETS_E };
  return map[STATE.track] || [];
}

function getPaletteCountForTrack(track) {
  const counts = { A: 9, B: 8, C: 8, D: 10, E: 9 };
  return counts[track] || 9;
}

function getCategoryLabel() {
  return STATE.category === 'suvichar' ? 'Suvichar / Quote' : 'Good Morning';
}

function getFilteredTracks() {
  if (STATE.category !== 'suvichar' || !STATE.feeling) return TRACKS;
  const feeling = SUVICHAR_FEELINGS.find(f => f.id === STATE.feeling);
  if (!feeling) return TRACKS;
  return TRACKS.filter(t => feeling.allowedTracks.includes(t.id));
}

function getLockedRender() {
  if (STATE.category !== 'suvichar' || !STATE.illusItem) return null;
  return SUVICHAR_LOCKED_RENDERS[STATE.illusItem] || null;
}

function getSuvicharIllusCats() {
  const arch = STATE.archetype;
  const feelingId = STATE.feeling;

  const cats = [];
  // GM carry-overs: filter by archetype and feeling
  const carryoverItems = [];
  for (const gmCat of ILLUS_CATS) {
    for (const item of gmCat.items) {
      if (!SUVICHAR_GM_CARRYOVER_IDS.includes(item.id)) continue;
      // Archetype filter
      if (arch === 'B1' && !['All', 'B1'].some(a => item.archs && item.archs.includes(a))) {
        if (!item.archs || (!item.archs.includes('All') && !item.archs.includes('B1'))) continue;
      }
      // Feeling filter
      const feelingRule = SUVICHAR_ITEM_FEELINGS[item.id];
      if (feelingRule !== 'U' && feelingId && Array.isArray(feelingRule) && !feelingRule.includes(feelingId)) continue;
      carryoverItems.push(item);
    }
  }
  if (carryoverItems.length > 0) cats.push({ id: 'SV-GM', name: 'Carry-overs', icon: '🌅', items: carryoverItems });

  // SV categories
  for (const svCat of SUVICHAR_ILLUS_CATS) {
    const items = svCat.items.filter(item => {
      // B1-only silhouettes
      if (svCat.id === 'SV-IH' && arch !== 'B1') return false;
      // Archetype filter for non-B1 items marked as B1 only
      if (item.archs && item.archs === 'B1' && arch !== 'B1') return false;
      // Feeling filter
      const feelingRule = SUVICHAR_ITEM_FEELINGS[item.id];
      if (!feelingRule) return true;
      if (feelingRule === 'U') return true;
      if (Array.isArray(feelingRule) && feelingId && !feelingRule.includes(feelingId)) return false;
      return true;
    });
    if (items.length > 0) cats.push({ ...svCat, items });
  }
  return cats;
}

// Merged photo desc lookup covering GM + SV items
function getB1PhotoDesc(itemId) {
  return B1_PHOTO_DESC[itemId] || SV_B1_PHOTO_DESC[itemId] || null;
}

// Merged sub-element lookup
function getB1SubElements(itemId) {
  return B1_SUB_ELEMENTS[itemId] || SV_B1_SUB_ELEMENTS[itemId] || [];
}

function getA2SubElements(itemId) {
  return A2_SUB_ELEMENTS[itemId] || SV_A2_SUB_ELEMENTS[itemId] || [];
}

function canProceed() {
  const stepId = getCurrentStepId();

  switch (stepId) {
    case 'template': return !!STATE.category && !!STATE.archetype;
    case 'feeling': return !!STATE.feeling;
    case 'style': return !!STATE.step2;
    case 'layout': return !!STATE.layout;
    case 'b1_text_placement': return !!STATE.layout && !!STATE.overlayStrength;
    case 'track': return !!STATE.track;
    case 'colour_finish': return !!STATE.palette && !!STATE.finish;
    case 'visual': {
      if (!STATE.illusItem) return false;
      if (STATE.illusItem === 'NONE') return true;
      if (STATE.archetype === 'A1') return !!STATE.frameDecoration && !!STATE.illusSize;
      return !!STATE.illusSize;
    }
    case 'intensity': return !!STATE.customPreset;
    // font_text step removed
    // B1 Photo Background specific steps
    case 'scene_elements': return STATE.sceneElements.length >= 1 && STATE.sceneElements.length <= 3;
    case 'mood': return !!STATE.mood;
    default: return false;
  }
}

function getCurrentStepId() {
  const steps = getSteps();
  return steps[Math.min(STATE.step - 1, steps.length - 1)];
}

function select(key, value) {
  STATE[key] = value;
  if (key === 'category') {
    STATE.feeling = null; STATE.archetype = null; STATE.step2 = null; STATE.layout = null;
    STATE.track = null; STATE.palette = null; STATE.font = null; STATE.finish = null;
    STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    STATE.sceneElements = []; STATE.mood = null; STATE.overlayStrength = 'light'; STATE.a2SubElements = [];
  }
  if (key === 'archetype') {
    STATE.feeling = null; STATE.step2 = null; STATE.layout = null; STATE.track = null; STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    // B1 specific resets
    STATE.sceneElements = []; STATE.mood = null; STATE.overlayStrength = 'light'; STATE.a2SubElements = [];
  }
  if (key === 'feeling') {
    STATE.track = null; STATE.palette = null; STATE.font = null; STATE.finish = null;
    STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    STATE.sceneElements = []; STATE.mood = null; STATE.a2SubElements = [];
  }
  if (key === 'step2') { STATE.layout = null; }
  if (key === 'illusItem') { STATE.a2SubElements = []; }  // Reset sub-illustrations when main changes
  if (key === 'track') {
    STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    // B1 specific resets on track change
    STATE.mood = null; STATE.customPreset = null;
  }
  if (key === 'frameDecoration' && value === 'Plain') {
    STATE.motifSet = null; // Plain frame = no motifs
  }
  render();
}

// B1: Select main scene element (resets sub-elements if main changes)
function selectMainSceneElement(itemId) {
  const currentMain = STATE.sceneElements.length >= 1 ? STATE.sceneElements[0] : null;
  if (currentMain === itemId) {
    // Deselect main → clear everything
    STATE.sceneElements = [];
  } else {
    // New main → keep only this, clear old subs
    STATE.sceneElements = [itemId];
  }
  render();
}

// B1: Toggle a supporting/sub element (max 2)
function toggleSubElement(itemId) {
  const subs = STATE.sceneElements.slice(1);
  const idx = subs.indexOf(itemId);
  if (idx > -1) {
    STATE.sceneElements.splice(idx + 1, 1); // +1 because index 0 is main
  } else if (subs.length < 2) {
    STATE.sceneElements.push(itemId);
  }
  render();
}

// A2: Toggle sub-illustration accent (max 2)
function toggleA2SubElement(itemId) {
  const idx = STATE.a2SubElements.indexOf(itemId);
  if (idx > -1) {
    STATE.a2SubElements.splice(idx, 1);
  } else if (STATE.a2SubElements.length < 2) {
    STATE.a2SubElements.push(itemId);
  }
  render();
}

// Legacy — kept for backward compat
function toggleSceneElement(itemId) {
  const idx = STATE.sceneElements.indexOf(itemId);
  if (idx > -1) {
    STATE.sceneElements.splice(idx, 1);
  } else if (STATE.sceneElements.length < 3) {
    STATE.sceneElements.push(itemId);

  render();
}

function jumpTo(step) {
  if (step <= STATE.step) { STATE.step = step; render(); }

function layoutDiagram(layout) {
  const L = LAYOUTS.find(l => l.id === layout);

  const w = 52, h = 74;
  if (L.type === 'vertical') {
    const tH = L.textFirst ? 28 : 52, vH = L.textFirst ? 52 : 28;
    const tY = L.textFirst ? 0 : vH, vY = L.textFirst ? tH : 0;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:8px;flex-shrink:0;"><rect width="${w}" height="${h}" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><rect y="${tY}" width="${w}" height="${tH}" fill="#BFDBFE" rx="2"/><text x="${w/2}" y="${tY+tH/2+4}" text-anchor="middle" font-size="7" font-weight="800" fill="#1E40AF">T</text><rect y="${vY}" width="${w}" height="${vH}" fill="#FED7AA" rx="2"/><text x="${w/2}" y="${vY+vH/2+4}" text-anchor="middle" font-size="7" font-weight="800" fill="#92400E">V</text></svg>`;
  }

    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:8px;flex-shrink:0;"><rect width="${w}" height="${h}" rx="4" fill="#FED7AA" stroke="#CBD5E1" stroke-width="1.5"/><rect width="${w}" height="${h}" rx="4" fill="rgba(191,219,254,0.65)"/><text x="${w/2}" y="${h/2-4}" text-anchor="middle" font-size="7" font-weight="800" fill="#1E3A5F">T</text><text x="${w/2}" y="${h/2+10}" text-anchor="middle" font-size="6" font-weight="800" fill="#92400E">V</text></svg>`;
  }
  if (L.type === 'horizontal') {
    const tW = 20, vW = w - tW;
    const tX = L.textFirst ? 0 : vW, vX = L.textFirst ? tW : 0;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:8px;flex-shrink:0;"><rect width="${w}" height="${h}" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><rect x="${tX}" width="${tW}" height="${h}" fill="#BFDBFE"/><text x="${tX+tW/2}" y="${h/2+4}" text-anchor="middle" font-size="7" font-weight="800" fill="#1E40AF">T</text><rect x="${vX}" width="${vW}" height="${h}" fill="#FED7AA"/><text x="${vX+vW/2}" y="${h/2+4}" text-anchor="middle" font-size="7" font-weight="800" fill="#92400E">V</text></svg>`;
  }
  if (L.type === 'centre-accent') {
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:8px;flex-shrink:0;"><rect width="${w}" height="${h}" rx="4" fill="#BFDBFE" stroke="#F59E0B" stroke-width="2.5"/><text x="${w/2}" y="${h/2+3}" text-anchor="middle" font-size="8" font-weight="800" fill="#1E40AF">T</text><rect x="${w-16}" y="${h-14}" width="12" height="10" rx="2" fill="#FED7AA"/><text x="${w-10}" y="${h-6}" text-anchor="middle" font-size="5" font-weight="800" fill="#92400E">V</text></svg>`;
  }
  return '';
}

function renderProgress() {
  const steps = getSteps();
  const el = document.getElementById('progressSteps');
  let html = '';
  steps.forEach((id, i) => {
    const label = STEP_LABELS[id];
    const stepNum = i + 1;
    const isDone = STATE.step > stepNum;
    const isActive = STATE.step === stepNum;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    html += `<div class="prog-step ${cls}"><div class="num"><span>${stepNum}</span></div><span class="label">${label}</span></div>`;
    if (i < steps.length - 1) {
      html += `<div class="prog-connector ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

// Helper: auto-determine B1 overlay from layout + strength
function getB1AutoOverlay() {
  const strength = STATE.overlayStrength || 'medium';
  const opacityWord = strength === 'light' ? 'light subtle semi-transparent' : 'heavy opaque dark';

  const map = {
    'L1': `${opacityWord} gradient overlay darker at the top fading to clear at the bottom, creating a text-readable zone at top`,
    'L2': `uniform ${opacityWord} dark overlay across the entire image for text readability`,
    'L3': `${opacityWord} gradient overlay darker on the left half fading to clear on the right, creating a text-readable zone on the left`,
    'L4': `${opacityWord} gradient overlay darker on the right half fading to clear on the left, creating a text-readable zone on the right`,
    'L5': `${opacityWord} gradient overlay darker at the bottom fading to clear at the top, creating a text-readable zone at bottom`,
    'L6': `vignette overlay with ${opacityWord} darkened edges and bright vivid centre, text-readable at centre`,
  };
  return map[STATE.layout] || '';
}

function renderStep4() {
  const compat = LAYOUT_COMPAT[STATE.archetype]?.[STATE.step2];

    html += `<div style="background:#FFFBEB;border:1px solid #FCD34D;padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;color:#92400E;"><strong>Layout Compatibility:</strong> Your choice is <span style="font-weight:700;">${compatStatus}</span>.</div>`;

  const availTracks = getFilteredTracks();
  const hiddenCount = TRACKS.length - availTracks.length;

  }
  if (isB1) {
    html += `<div class="options-grid cols-5">${availTracks.map(t => {

      return `<div class="opt-card ${STATE.track === t.id ? 'selected' : ''}" onclick="select('track','${t.id}')"><div class="opt-icon">${t.icon}</div><div class="opt-name">${t.name}</div><div class="opt-desc" style="font-size:11px;margin-bottom:4px;">${t.tagline}</div><div style="background:#F0F9FF;border:1px solid #BFDBFE;border-radius:6px;padding:4px 8px;margin-top:6px;font-size:10px;color:var(--primary);"><strong>📷 Photo:</strong> ${photoTrack.desc}</div></div>`;
    }).join('')}</div>`;
  } else {
    html += `<div class="options-grid cols-4">${availTracks.map(t => `<div class="opt-card ${STATE.track === t.id ? 'selected' : ''}" onclick="select('track','${t.id}')"><div class="opt-icon">${t.icon}</div><div class="opt-name">${t.name}</div><div class="opt-desc" style="font-size:11px;margin-bottom:6px;">${t.tagline}</div><div style="font-size:11px;color:#64748B;">${t.desc}</div></div>`).join('')}</div>`;

function renderStep8() {
  const stepNum = getSteps().indexOf('visual') + 1;
  const isSV = STATE.category === 'suvichar';
  let html = `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Visual</div><div class="step-title">Illustrations & Details</div><div class="step-desc">First pick your illustration, then choose rendering style and decorative elements.</div></div>`;
  let n = 1;

  // Choose illustration catalogue
  const illusCats = isSV ? getSuvicharIllusCats() : ILLUS_CATS;

  // 1. Illustration Category
  html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Illustration Category</div></div><div class="options-grid cols-3">${illusCats.map(cat => `<div class="opt-card ${STATE.illusCategory === cat.id ? 'selected' : ''}" onclick="select('illusCategory','${cat.id}')"><div class="opt-icon">${cat.icon}</div><div class="opt-name">${cat.name}</div><div style="font-size:11px;color:#64748B;">${cat.items ? cat.items.length : cat.count} options</div></div>`).join('')}</div></div>`;

  // 2. Illustration Item (after category chosen)
  if (STATE.illusCategory) {
    const cat = illusCats.find(c => c.id === STATE.illusCategory);
    if (cat) {
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">${cat.name} — Pick One</div></div><div class="options-grid cols-4">${cat.items.map(i => `<div class="opt-card ${STATE.illusItem === i.id ? 'selected' : ''}" onclick="select('illusItem','${i.id}')"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.desc || ''}</div></div>`).join('')}</div></div>`;
    }
  }

  if (STATE.illusItem && STATE.illusItem !== 'NONE') {
    // Auto-apply locked render for SV items
    const lockedRender = getLockedRender();
    if (lockedRender && STATE.illusRender !== lockedRender.id) {
      STATE.illusRender = lockedRender.id;
    }

    // A2 Sub-illustrations: curated accent items (rendered in same illustration style)
    if (STATE.archetype === 'A2') {
      const a2SubIds = getA2SubElements(STATE.illusItem);
      const subItems = a2SubIds.map(subId => { const acc = ACCENT_ITEMS[subId]; return acc ? { id: subId, ...acc } : null; }).filter(Boolean);
      if (subItems.length > 0) {
        const a2SubEls = STATE.a2SubElements || [];
        const densityLabel = a2SubEls.length === 0 ? 'Light (main only)' : a2SubEls.length === 1 ? 'Medium' : 'Dense';
        html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Scene Accents <span style="font-weight:400;color:var(--muted);">(optional, up to 2)</span></div><div class="sub-section-tag">${a2SubEls.length}/2 · ${densityLabel}</div></div>`;
        html += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Small decorative elements rendered in the same illustration style. Density auto-adjusts: ${densityLabel}.</div>`;
        html += `<div class="options-grid cols-4">${subItems.map(i => {
          const isSel = a2SubEls.includes(i.id);
          const isMaxed = a2SubEls.length >= 2 && !isSel;
          return `<div class="opt-card ${isSel ? 'selected' : ''}" onclick="${isMaxed ? '' : `toggleA2SubElement('${i.id}')`}" style="${isMaxed ? 'cursor:not-allowed;opacity:0.4;' : ''}"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.illusDesc}</div></div>`;
        }).join('')}</div></div>`;
      }
    }

    // 3. Illustration Scale — cap at Medium for Suvichar
    const sizeOpts = isSV ? ILLUS_SIZE_OPTS.filter(o => o.id !== 'Large') : ILLUS_SIZE_OPTS;
    html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Illustration Scale</div><div class="sub-section-tag">How much space should it take?</div></div>${isSV ? '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Large / Hero not available for Suvichar — text is the hero.</div>' : ''}<div class="options-grid cols-3">${sizeOpts.map(o => `<div class="opt-card ${STATE.illusSize === o.id ? 'selected' : ''}" onclick="select('illusSize','${o.id}')"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;

    // 4. Rendering Style — locked for some SV items
    if (lockedRender) {
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Rendering Style</div><div class="sub-section-tag">Auto-set for this illustration</div></div><div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:10px;padding:12px 16px;font-size:13px;color:#166534;display:flex;align-items:center;gap:10px;">🔒 <strong>${lockedRender.name}</strong> — This illustration has a fixed render style for best results.</div></div>`;
    } else {
      const opts = getIllusRenderOptions();
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Rendering Style</div><div class="sub-section-tag">How should the illustration look?</div></div><div class="options-grid cols-3">${opts.map(o => `<div class="opt-card ${STATE.illusRender === o.id ? 'selected' : ''}" onclick="select('illusRender','${o.id}')"><div style="margin-bottom:8px;">${renderPreviewSVG(o.id)}</div><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;
    }

    // 5. Frame Decoration (A1 only)
    if (STATE.archetype === 'A1') {
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Frame Decoration Level</div><div class="sub-section-tag">How ornate should the border frame be?</div></div><div class="options-grid cols-3">${FRAME_DECO_OPTS.map(o => `<div class="opt-card ${STATE.frameDecoration === o.id ? 'selected' : ''}" onclick="select('frameDecoration','${o.id}')"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;
    }

    // 6. Motifs — hidden for A1 + Plain or when Suvichar + locked render (minimal decoration)
    const showMotifs = !(STATE.archetype === 'A1' && STATE.frameDecoration === 'Plain');
    if (showMotifs) {
      const motifs = getMotifOptions();
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Motifs & Decoration</div><div class="sub-section-tag">Optional decorative patterns</div></div><div class="options-grid cols-5">${motifs.map(m => `<div class="opt-card ${STATE.motifSet === m.id ? 'selected' : ''}" onclick="select('motifSet','${m.id}')"><div style="font-size:22px;margin-bottom:8px;">${m.name === 'None' ? '—' : m.name.substring(0, 1)}</div><div class="opt-name">${m.name}</div></div>`).join('')}</div></div>`;
    }
  }

  return html;
}

function renderB1SceneElements() {
  const mainEl = STATE.sceneElements.length >= 1 ? STATE.sceneElements[0] : null;
  const subEls = STATE.sceneElements.slice(1);
  const stepNum = getSteps().indexOf('scene_elements') + 1;

  let html = `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Scene Elements</div><div class="step-title">Build Your Scene</div><div class="step-desc">Pick a <strong>main subject</strong> for the photo, then optionally add 1–2 related supporting elements.</div></div>`;

  // ── Sub-section 1: Main Element ──
  html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">1</div><div class="sub-section-title">Main Subject</div><div class="sub-section-tag">${mainEl ? '✓ Selected' : 'Pick one'}</div></div>`;
  const b1Cats = STATE.category === 'suvichar' ? getSuvicharIllusCats() : ILLUS_CATS;
  b1Cats.forEach(cat => {
    html += `<div style="margin-bottom:12px;"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;">${cat.icon} ${cat.name}</div><div class="options-grid cols-4">${cat.items.map(i => {
      const isMain = mainEl === i.id;
      const isSub = subEls.includes(i.id);
      const photoDesc = getB1PhotoDesc(i.id) || i.desc;
      return `<div class="opt-card ${isMain ? 'selected' : ''}" onclick="selectMainSceneElement('${i.id}')" style="${isSub ? 'opacity:0.4;pointer-events:none;' : ''}">${isMain ? '<div style="font-size:10px;font-weight:700;color:var(--primary);margin-bottom:4px;">⭐ Main</div>' : ''}<div class="opt-name">${i.name}</div><div class="opt-desc">${photoDesc}</div></div>`;
    }).join('')}</div></div>`;
  });
  html += `</div>`;

  // ── Sub-section 2: Supporting Elements (curated, shown after main is picked) ──
  if (mainEl) {
    const availableSubs = getB1SubElements(mainEl);
    const subItems = availableSubs.map(subId => {
      const acc = B1_ACCENT_ITEMS[subId];
      if (acc) return { id: subId, name: acc.name, photoDesc: acc.photoDesc };
      return null;
    }).filter(Boolean);

    html += `<div class="sub-section" style="margin-top:24px;"><div class="sub-section-header"><div class="sub-section-num">2</div><div class="sub-section-title">Scene Accents <span style="font-weight:400;color:var(--muted);">(optional, pick up to 2 small props)</span></div><div class="sub-section-tag">${subEls.length}/2</div></div>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Small background details that naturally belong in this scene.</div>`;
    if (subItems.length > 0) {
      html += `<div class="options-grid cols-4">${subItems.map(i => {
        const isSel = subEls.includes(i.id);
        const isMaxed = subEls.length >= 2 && !isSel;
        return `<div class="opt-card ${isSel ? 'selected' : ''}" onclick="${isMaxed ? '' : `toggleSubElement('${i.id}')`}" style="${isMaxed ? 'cursor:not-allowed;opacity:0.4;' : ''}"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.photoDesc}</div></div>`;
      }).join('')}</div>`;
    }
    html += `</div>`;
  }

  // Scene composition summary
  if (STATE.sceneElements.length >= 1) {
    const selItems = STATE.sceneElements.map((id, idx) => {
      for (const cat of ILLUS_CATS) { const item = cat.items.find(i => i.id === id); if (item) return { ...item, role: idx === 0 ? 'Main' : 'Accent' }; }
      for (const cat of SUVICHAR_ILLUS_CATS) { const item = cat.items.find(i => i.id === id); if (item) return { ...item, role: idx === 0 ? 'Main' : 'Accent' }; }
      const acc = B1_ACCENT_ITEMS[id];
      if (acc) return { id, name: acc.name, role: 'Accent' };
      return null;
    }).filter(Boolean);
    html += `<div style="margin-top:18px;padding:12px 16px;background:#F0F9FF;border:1px solid #BFDBFE;border-radius:10px;"><div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;">Scene Composition</div><div style="display:flex;flex-wrap:wrap;gap:8px;">${selItems.map((item, idx) => `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:${idx===0 ? 'var(--primary)' : '#E2E8F0'};color:${idx===0 ? '#fff' : '#334155'};font-size:12px;font-weight:600;"><span>${idx===0 ? '⭐' : '○'}</span>${item.name}</div>`).join('')}</div></div>`;
  }

  return html;
}

function renderB1Mood() {
  // Show track-specific suggestion if track is selected
  const trackSuggestions = {
    A: ['MD-1', 'MD-3'],  // Shiny Maximal → Golden Warm, Bright & Vivid
    B: ['MD-2', 'MD-5'],  // Modern Desi → Misty Soft, Vintage Film
    C: ['MD-6', 'MD-2'],  // Minimalist Classy → Soft Pastel, Misty Soft
    D: ['MD-3', 'MD-1'],  // Artsy Playful → Bright & Vivid, Golden Warm
    E: ['MD-6', 'MD-1'],  // Soft & Warm → Soft Pastel, Golden Warm
  };
  const suggested = STATE.track ? (trackSuggestions[STATE.track] || []) : [];
  const trackName = STATE.track ? TRACKS.find(t => t.id === STATE.track)?.name : '';

  let html = `<div class="step-header"><div class="step-eyebrow">Step 6 · Mood</div><div class="step-title">Lighting & Colour Mood</div><div class="step-desc">Sets the atmosphere of the photograph — both the lighting and colour treatment in one pick.</div></div>`;

  if (suggested.length > 0) {
    html += `<div style="background:#F0F9FF;border:1px solid #BFDBFE;padding:10px 16px;border-radius:10px;margin-bottom:18px;font-size:12px;color:var(--primary);"><strong>💡 Suggested for ${trackName}:</strong> ${suggested.map(id => B1_MOOD_OPTIONS.find(m => m.id === id)?.name).filter(Boolean).join(' or ')}</div>`;
  }

  html += `<div class="options-grid cols-3">${B1_MOOD_OPTIONS.map(m => {
    const isSuggested = suggested.includes(m.id);
    const isSelected = STATE.mood === m.id;
    const dimStyle = (!isSuggested && !isSelected) ? 'opacity:0.5;' : '';
    return `<div class="opt-card ${isSelected ? 'selected' : ''} ${isSuggested ? 'recommended' : ''}" onclick="select('mood','${m.id}')" style="${dimStyle}"><div class="opt-name">${m.name}</div><div class="opt-desc">${m.desc}</div></div>`;
  }).join('')}</div>`;

  return html;
}

function renderB1Intensity() {

  return `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Intensity</div><div class="step-title">Camera Distance & Detail</div><div class="step-desc">Controls how close the camera is to the scene — from a distant landscape to an immersive close-up.</div></div><div class="options-grid cols-3">${B1_INTENSITY_PRESETS.map(p => `<div class="opt-card ${STATE.customPreset === p.id ? 'selected' : ''}" onclick="select('customPreset','${p.id}')"><div class="opt-name">${p.name}</div><div class="opt-desc">${p.desc}</div></div>`).join('')}</div>`;
}

function render() {
  renderProgress();

  const stepId = getCurrentStepId();
  let content = '';

  const isB1 = STATE.archetype === 'B1';
  switch (stepId) {
    case 'template': content = renderStep1(); break;
    case 'feeling': content = renderFeelingStep(); break;
    case 'style': content = renderStep2(); break;
    case 'layout': content = renderStep3(); break;
    case 'b1_text_placement': content = renderB1TextPlacement(); break;
    case 'track': content = renderStep4(); break;
    case 'colour_finish': content = renderStepColourFinish(); break;
    case 'visual': content = renderStep8(); break;
    case 'intensity': content = isB1 ? renderB1Intensity() : renderStep9(); break;
    // font_text step removed
    // B1 Photo Background specific steps
    case 'scene_elements': content = renderB1SceneElements(); break;
    case 'mood': content = renderB1Mood(); break;
  }

  const steps = getSteps();
  const isLast = STATE.step >= steps.length;

  content += `<div class="nav-row"><button class="btn btn-secondary" onclick="STATE.step=Math.max(1,STATE.step-1);render();" ${STATE.step === 1 ? 'disabled' : ''}>← Back</button><div>${STATE.step} / ${steps.length}</div><button class="btn btn-primary" onclick="STATE.step=Math.min(${steps.length},STATE.step+1);render();" ${!canProceed() || isLast ? 'disabled' : ''}>Next →</button>${isLast ? '<button class="btn btn-generate" onclick="generatePrompts();">Generate Prompts</button>' : ''}</div>`;

  document.getElementById('app').innerHTML = content;
  document.getElementById('textInput')?.focus();
}

function buildNegatives() {
  const palette = getPalette();
  const roles = palette.roles || {};
  const track = STATE.track;
  const illusRender = getLockedRender() || (STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null);

  let negs = ['text', 'letters', 'words', 'numbers', 'typography', 'watermarks', 'logos', 'blurry', 'low quality'];

  if (track === 'A') negs.push('photorealistic', 'cinematic lighting', 'landscape background', 'minimalism', 'flat modern', 'grunge', 'grayscale');
  if (track === 'B') negs.push('Bollywood', 'maximalist', 'gold foil', 'sparkle', 'metallic', 'loud colours');
  if (track === 'C') negs.push('photorealistic', 'ornate', 'gold foil', 'busy', 'multiple illustrations', 'vivid', 'gradient', 'doodles');
  if (track === 'D') negs.push('photorealism', 'cinematic', 'ornate', 'gold', 'film grain', 'muted', 'serif');
  if (track === 'E') negs.push('harsh', 'neon', 'loud', 'metallic', 'glitter', 'sparkle', 'ornate heavy decoration', 'bold thick outlines');

  if (roles.banColour) {
    negs.push(`${roles.banColour} illustration`, `${roles.banColour} subject`, 'monochrome single-colour');
  }
  if (illusRender && illusRender.id === 'IR-1') {
    negs.push('illustration hidden behind decoration', 'illustration merged with ornamental pattern');
  } else if (STATE.illusItem && STATE.illusItem !== 'NONE' && STATE.motifSet) {
    negs.push('illustration hidden behind decoration', 'motif overlapping illustration');
    if (STATE.archetype === 'A1') {
      negs.push('motif near illustration', 'motif beside illustration', 'motif around illustration');
    } else if (STATE.archetype === 'A2') {
      negs.push('motif on border edges', 'motif on frame');
    }
  }

  // Prevent illustration render style from bleeding into border/frame
  if (illusRender && STATE.illusItem && STATE.illusItem !== 'NONE') {
    negs.push('border style matching illustration style', 'frame affected by illustration rendering');
  }

  return negs;
}

function getStep2Option() {
  if (!STATE.step2) return null;
  const arch = getArchetype();
  const opts = STEP2_OPTIONS[arch.step2Key] || [];
  return opts.find(o => o.id === STATE.step2);
}

function getIllusSizeLabel() {
  if (!STATE.illusSize) return null;
  return ILLUS_SIZE_OPTS.find(o => o.id === STATE.illusSize);
}

function gatherPromptData() {
  const arch = getArchetype();
  const step2Opt = getStep2Option();
  const layout = getLayout();
  const track = getTrack();
  const palette = getPalette();
  const font = getFont();
  const finish = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
  const lockedRenderObj = getLockedRender();
  const illusRender = lockedRenderObj
    ? lockedRenderObj
    : STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
  const motif = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
  const preset = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
  const illusItem = getIllusItem();
  const illusSize = getIllusSizeLabel();
  const roles = palette.roles || {};

  // Size phrase
  let sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
  if (illusSize) {
    if (illusSize.id === 'Small') sizePh = 'small accent illustration under 15 percent of canvas';
    if (illusSize.id === 'Medium') sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
    if (illusSize.id === 'Large') sizePh = 'large hero illustration occupying 50 percent or more of canvas';
  }

  // Frame phrase (A1)
  let framePh = '';
  if (arch.id === 'A1' && step2Opt) {
    const deco = STATE.frameDecoration || 'Simple';
    let frameShape = '';
    if (step2Opt.id === 'F1') frameShape = 'rectangular decorative border frame on all four edges';
    else if (step2Opt.id === 'F2') frameShape = 'decorative bands at top and bottom edges only with open sides';
    else if (step2Opt.id === 'F3') frameShape = 'single decorative band at the bottom edge';
    else if (step2Opt.id === 'F4') frameShape = 'ornamental corner accents at all four corners';
    else if (step2Opt.id === 'F5') frameShape = 'curved arch canopy frame at top with side patches';
    else frameShape = 'decorative border frame';

    let decoPh = 'with subtle motifs at corners';
    if (deco === 'Plain') decoPh = 'with clean simple border lines only no motifs no ornamentation';
    if (deco === 'Detailed') decoPh = 'with rich ornate florals paisleys and mandalas throughout every edge of the frame';

    const frameCol = roles.frame || 'golden metallic';
    framePh = `${frameShape} rendered in ${frameCol} ${decoPh}`;
  }

  // Overlay phrase (B1)
  let overlayPh = '';
  if (arch.id === 'B1' && step2Opt) {
    overlayPh = step2Opt.desc.toLowerCase();
  }

  // Density phrase (A2) — auto-determined from sub-element count
  let densityPh = '';
  let a2AccentPh = '';
  if (arch.id === 'A2') {
    const subCount = (STATE.a2SubElements || []).length;
    if (subCount === 0) densityPh = '1–2 key illustration elements, lots of breathing space, clean airy composition';
    else if (subCount === 1) densityPh = '3–4 illustration elements, balanced and warm composition';
    else densityPh = '5–6 elements, rich festive vibrant scene';
    // Build accent description phrases
    const accPhrases = (STATE.a2SubElements || []).map(id => {
      const acc = ACCENT_ITEMS[id];
      return acc ? acc.illusDesc : '';
    }).filter(Boolean);
    if (accPhrases.length > 0) a2AccentPh = accPhrases.join(', ');
  }

  // Layout text zone phrase
  let textZonePh = '';
  let illusPositionPh = '';
  if (layout.id === 'L1') {
    textZonePh = 'text overlay zone in the upper 25 percent of the canvas with no decorative elements in this area';
    illusPositionPh = 'positioned in the lower portion of the canvas below the text area';
  } else if (layout.id === 'L2') {
    textZonePh = 'text overlay centred on the canvas with semi-transparent breathing space behind it';
    illusPositionPh = 'positioned centrally on the canvas behind the text overlay';
  } else if (layout.id === 'L3') {
    textZonePh = 'left half reserved for text overlay, right half anchors the visual';
    illusPositionPh = 'positioned on the right half of the canvas anchoring the visual weight';
  } else if (layout.id === 'L4') {
    textZonePh = 'right half reserved for text overlay, left half anchors the visual';
    illusPositionPh = 'positioned on the left half of the canvas anchoring the visual weight';
  } else if (layout.id === 'L5') {
    textZonePh = 'text overlay zone in the lower 25 percent of the canvas with no decorative elements in this area';
    illusPositionPh = 'positioned in the upper portion of the canvas above the text area';
  } else if (layout.id === 'L6') {
    textZonePh = 'text occupies the central 60 percent of the canvas as the dominant element';
    illusPositionPh = 'placed at a corner of the canvas not overlapping the central text';
  }

  // Colour phrases
  let bgPh = roles.canvas || palette.tracks[STATE.track]?.natural || 'colourful background';
  let illusColPh = roles.illus || 'contrasting colours';
  let textColPh = roles.textCol || 'high-contrast text colour';

  // Motif phrase — archetype-aware placement
  let motifPh = '';
  let motifPhFirefly = ''; // compact version for Firefly prompts
  if (motif && !(arch.id === 'A1' && STATE.frameDecoration === 'Plain')) {
    if (arch.id === 'A1') {
      // A1: motif is STRICTLY on the border frame only — never near or around the illustration
      motifPh = `${motif.promptPhrase} placed ONLY on the decorative border frame edges, the motif must NOT appear near, around, or beside the illustration — keep the illustration zone completely free of motif elements`;
      motifPhFirefly = `Motif: ${motif.name} on border frame edges only, completely separated from illustration.`;
    } else {
      // A2: motif fills around the illustration or across the overall graphic — NOT on border edges
      motifPh = `${motif.promptPhrase} scattered around and near the illustration as decorative accents filling the composition, the motif appears around the illustration and across the graphic area, NOT placed on border edges`;
      motifPhFirefly = `Motif: ${motif.name} scattered around the illustration as decorative accents, not on borders.`;
    }
  }

  // Rendering phrase with colour reinforcement for IR-2
  let renderPh = illusRender ? illusRender.promptPhrase : 'clean vector illustration';
  if (illusRender && illusRender.id === 'IR-2' && roles.banColour) {
    renderPh += `, using only the palette illustration colours not the ${roles.banColour} background colour`;
  }

  // Ornamental protection phrase (IR-1 only: keeps illustration distinct from ornamental rendering)
  let ornamentalGuard = '';
  if (illusRender && illusRender.id === 'IR-1' && illusItem) {
    ornamentalGuard = `the ${illusItem.name} must remain clearly visible as the central subject distinct from surrounding ornamentation, decorative elements frame the illustration but do not overlap or obscure it`;
  }

  // Motif boundary enforcement — archetype-specific
  let motifBoundary = '';
  if (motifPh && illusItem) {
    if (arch.id === 'A1') {
      // A1: motif stays strictly on border frame, away from illustration
      motifBoundary = `${motif.name} motif pattern stays ONLY on the border frame edges — it must not appear near, beside, or around the ${illusItem.name} illustration`;
    } else {
      // A2: motif floats around illustration but doesn't overlap it
      motifBoundary = `${motif.name} motif accents appear around the composition near the ${illusItem.name} but do not overlap or obscure it`;
    }
    if (ornamentalGuard) {
      ornamentalGuard += `, ${motifBoundary}`;
    }
  }

  // Track style phrase
  let stylePh = '';
  if (track.id === 'A') stylePh = 'ornate festive Indian greeting poster, Indian wedding card energy, traditional ornamental art, gold accents, sparkle particles, 8K ultra-detailed high detail';
  if (track.id === 'B') stylePh = 'contemporary Indian editorial illustration, Scroll.in aesthetic, warm earthy restraint, handcrafted feel, high resolution';
  if (track.id === 'C') stylePh = 'minimal elegant premium Indian poster, Muji Aesop packaging zen aesthetic, tonal refinement, typography dominant, generous empty space';
  if (track.id === 'D') stylePh = 'cheerful bright playful illustration, WhatsApp sticker energy, Alicia Souza Chumbak aesthetic, thick outlines, vibrant flat colours';
  if (track.id === 'E') stylePh = 'soft warm gentle morning poster, calming pastel botanical aesthetic, hand-painted greeting card feel, organic soft forms, generous breathing space, serene and inviting';

  // Preset intensity phrase
  let intensityPh = preset ? preset.promptPhrase : 'balanced composition';

  return { arch, step2Opt, layout, track, palette, font, finish, illusRender, motif, preset, illusItem, illusSize, roles, sizePh, framePh, overlayPh, densityPh, a2AccentPh, textZonePh, illusPositionPh, bgPh, illusColPh, textColPh, motifPh, motifPhFirefly, renderPh, ornamentalGuard, motifBoundary, stylePh, intensityPh };
}

function buildPrompt(platform) {
  if (STATE.archetype === 'B1') {
    const d = gatherB1PromptData();
    if (platform === 'Midjourney') return buildB1MJPrompt(d);
    if (platform === 'Leonardo.AI') return buildB1LeonardoPrompt(d);
    if (platform === 'Firefly (With Text)') return buildB1FireflyWithTextPrompt(d);
    if (platform === 'Firefly (No Text)') return buildB1FireflyNoTextPrompt(d);
    return buildB1GeminiPrompt(d);
  }
  const d = gatherPromptData();
  if (platform === 'Midjourney') return buildMJPrompt(d);
  if (platform === 'Leonardo.AI') return buildLeonardoPrompt(d);
  if (platform === 'Firefly (With Text)') return buildFireflyWithTextPrompt(d);
  if (platform === 'Firefly (No Text)') return buildFireflyNoTextPrompt(d);
  return buildGeminiPrompt(d);
}

// ═══════════════════════════════════════════════════════════════
// B1 PHOTO BACKGROUND — Prompt Data & Builders
// ═══════════════════════════════════════════════════════════════

function gatherB1PromptData() {
  const step2Opt = getStep2Option(); // overlay
  const layout = getLayout();
  const track = getTrack();
  const font = getFont();
  const photoTrack = B1_PHOTO_TRACKS[STATE.track];
  const mood = STATE.mood ? B1_MOOD_OPTIONS.find(m => m.id === STATE.mood) : null;
  const intensity = STATE.customPreset ? B1_INTENSITY_PRESETS.find(p => p.id === STATE.customPreset) : null;

  // Build scene description — first = main (foreground hero), rest = small accent props
  const sceneItems = STATE.sceneElements.map(id => {
    // Check main illustration catalogue first (GM + SV)
    for (const cat of ILLUS_CATS) {
      const item = cat.items.find(i => i.id === id);
      if (item) return { ...item, photoDesc: getB1PhotoDesc(id) || item.desc };
    }
    for (const cat of SUVICHAR_ILLUS_CATS) {
      const item = cat.items.find(i => i.id === id);
      if (item) return { ...item, photoDesc: getB1PhotoDesc(id) || item.desc };
    }
    // Check accent items
    const acc = B1_ACCENT_ITEMS[id];
    if (acc) return { id, name: acc.name, photoDesc: acc.photoDesc };
    return null;
  }).filter(Boolean);

  let scenePh = '';
  if (sceneItems.length === 1) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground`;
  } else if (sceneItems.length === 2) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground, with ${sceneItems[1].photoDesc}`;
  } else if (sceneItems.length === 3) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground, with ${sceneItems[1].photoDesc} and ${sceneItems[2].photoDesc}`;
  }

  // Overlay phrase — auto-determined from text position + strength
  let overlayPh = getB1AutoOverlay();

  // Layout text zone
  let textZonePh = '';
  if (layout.id === 'L1') textZonePh = 'text overlay zone at the top of the image';
  else if (layout.id === 'L2') textZonePh = 'text overlay zone centred on the image';
  else if (layout.id === 'L3') textZonePh = 'text overlay zone on the left half of the image';
  else if (layout.id === 'L4') textZonePh = 'text overlay zone on the right half of the image';
  else if (layout.id === 'L5') textZonePh = 'text overlay zone at the bottom of the image';
  else if (layout.id === 'L6') textZonePh = 'text overlay zone centred occupying the central area';

  // B1 negatives
  let negs = ['text', 'letters', 'words', 'numbers', 'typography', 'illustration', 'cartoon', 'painting', 'drawing', 'sketch', 'vector', 'clipart', 'frame', 'border', 'decorative pattern', 'motif', 'ornamental', 'watermarks', 'logos', 'blurry', 'low quality', 'artificial', 'CGI', 'rendered'];
  if (STATE.track === 'A') negs.push('muted', 'desaturated', 'flat');
  if (STATE.track === 'B') negs.push('oversaturated', 'HDR', 'neon', 'vivid');
  if (STATE.track === 'C') negs.push('colorful', 'saturated', 'busy', 'cluttered');
  if (STATE.track === 'D') negs.push('dark', 'moody', 'desaturated', 'muted');
  if (STATE.track === 'E') negs.push('harsh', 'high contrast', 'neon', 'sharp edges');

  const overlayStrength = STATE.overlayStrength || 'medium';
  return { step2Opt, layout, track, font, photoTrack, mood, intensity, sceneItems, scenePh, overlayPh, textZonePh, negs, overlayStrength };
}

function buildB1MJPrompt(d) {
  const parts = [];

  // Core: photorealistic photograph
  parts.push('photorealistic photograph, full-bleed image filling the entire canvas, early morning Indian setting');

  // Scene elements (main subject first, supporting after)
  parts.push(d.scenePh);

  // Mood (merged lighting + colour treatment)
  if (d.mood) parts.push(d.mood.promptPhrase);

  // Photography aesthetic (Track)
  parts.push(d.photoTrack.promptPhrase);

  // Intensity (camera distance + depth of field)
  if (d.intensity) parts.push(d.intensity.promptPhrase);

  // Colour temperature & atmosphere
  const warmthMap = { 'MD-1': 'warm colour temperature 4500K', 'MD-2': 'neutral colour temperature 5500K', 'MD-3': 'daylight white balance 5600K', 'MD-4': 'warm dramatic colour temperature 4200K', 'MD-5': 'warm analog colour temperature 4800K', 'MD-6': 'cool colour temperature 6200K' };
  if (d.mood && warmthMap[d.mood.id]) parts.push(warmthMap[d.mood.id]);

  // Layout text zone
  parts.push(d.textZonePh);

  // Overlay with strength
  if (d.overlayPh) parts.push(d.overlayPh);

  // Technical quality
  parts.push('9:16 portrait format, professional DSLR photography, sharp focus on subject, high dynamic range, natural bokeh where appropriate');

  const mainPrompt = parts.filter(p => p).join(', ');
  const negs = d.negs.join(', ');
  return `${mainPrompt} --ar 9:16 --s 250 --no ${negs}`;
}

function buildB1LeonardoPrompt(d) {
  const lines = [];
  lines.push(`Photorealistic ${d.photoTrack.name} photograph, ${getCategoryLabel()} poster, 9:16 vertical (1080x1920). Full-bleed photo, no frames, no borders, no illustration. Early morning Indian setting.`);
  lines.push(`Scene: ${d.scenePh}.`);
  if (d.mood) lines.push(`Mood: ${d.mood.promptPhrase}.`);
  lines.push(`Aesthetic: ${d.photoTrack.promptPhrase}.`);
  if (d.intensity) lines.push(`Camera: ${d.intensity.promptPhrase}.`);
  // Overlay with strength context
  const strengthWord = d.overlayStrength === 'heavy' ? 'strong dark' : 'subtle light';
  lines.push(`Text zone: ${d.textZonePh}. Overlay: ${strengthWord} ${d.overlayPh}. Keep this area darker for white text readability.`);
  lines.push(`Quality: DSLR, sharp focus on subject, natural depth of field.`);
  const coreNegs = ['illustration', 'cartoon', 'painting', 'vector', 'frame', 'border', 'pattern', 'text', 'watermark', 'blurry', 'low quality', 'CGI'];
  lines.push(`Negative: ${coreNegs.join(', ')}`);
  return lines.join('\n');
}

function buildB1FireflyWithTextPrompt(d) {
  // Firefly WITH TEXT for B1: hard cap ≤950 chars.
  const parts = [];
  parts.push(`Photorealistic ${d.photoTrack.name} ${getCategoryLabel()} poster, 9:16 vertical, full-bleed photograph, early morning Indian setting.`);
  parts.push(`${trunc(d.scenePh, 130)}.`);
  if (d.mood) parts.push(`${trunc(d.mood.promptPhrase, 90)}.`);
  parts.push(`${trunc(d.photoTrack.promptPhrase, 90)}.`);
  if (d.intensity) parts.push(`${trunc(d.intensity.promptPhrase, 80)}.`);
  const strengthHint = d.overlayStrength === 'heavy' ? 'strong dark' : 'subtle';
  parts.push(`${trunc(d.textZonePh, 60)}, ${strengthHint} ${trunc(d.overlayPh, 50)}.`);
  parts.push(`"${getCategoryLabel()}" text in white decorative font in the text zone, legible. DSLR quality, sharp focus.`);
  let result = parts.join(' ');
  if (result.length > 950) result = result.substring(0, 950).replace(/\s+\S*$/, '');
  return result;
}

function buildB1FireflyNoTextPrompt(d) {
  // Firefly NO TEXT for B1: hard cap ≤950 chars.
  const parts = [];
  parts.push(`Photorealistic ${d.photoTrack.name} photograph, 9:16 vertical, full-bleed, no text, no letters, no words. Early morning Indian setting.`);
  parts.push(`${trunc(d.scenePh, 130)}.`);
  if (d.mood) parts.push(`${trunc(d.mood.promptPhrase, 90)}.`);
  parts.push(`${trunc(d.photoTrack.promptPhrase, 90)}.`);
  if (d.intensity) parts.push(`${trunc(d.intensity.promptPhrase, 80)}.`);
  const strengthHint = d.overlayStrength === 'heavy' ? 'strong dark' : 'subtle';
  parts.push(`${trunc(d.textZonePh, 60)} ${strengthHint} overlay for text zone, ${trunc(d.overlayPh, 50)}.`);
  parts.push(`DSLR quality, sharp focus on subject. Purely visual, no text, no letters, no typography.`);
  let result = parts.join(' ');
  if (result.length > 950) result = result.substring(0, 950).replace(/\s+\S*$/, '');
  return result;
}

function buildB1GeminiPrompt(d) {
  const lines = [];

  lines.push(`A photorealistic ${d.photoTrack.name} style photograph for a ${getCategoryLabel()} greeting poster in vertical 9:16 format. The image is a full-bleed photograph that fills the entire canvas — no frames, no borders, no illustration elements. The setting is early morning in India.`);

  // Scene (main + supporting)
  lines.push(`\nScene: The photograph features ${d.scenePh}. The scene should feel natural and authentic — as if captured in a real Indian morning setting, not staged or artificial.`);

  // Mood (merged lighting + colour)
  if (d.mood) lines.push(`\nLighting & Mood: ${d.mood.promptPhrase}. The light should feel natural and time-appropriate for early morning.`);

  // Photography Aesthetic
  lines.push(`\nPhotography Aesthetic: ${d.photoTrack.promptPhrase}.`);

  // Camera / Intensity
  if (d.intensity) lines.push(`\nCamera & Framing: ${d.intensity.promptPhrase}. Use natural depth of field appropriate to the focal length — sharp focus on the main subject with gentle falloff in the background.`);

  // Colour temperature
  const colourTempMap = { 'MD-1': 'Warm colour temperature around 4500K — amber sunrise warmth.', 'MD-2': 'Neutral colour temperature around 5500K — true-to-life morning tones.', 'MD-3': 'Daylight white balance 5600K — clean bright colours.', 'MD-4': 'Warm dramatic temperature 4200K — emphasise the light-shadow contrast.', 'MD-5': 'Warm analog temperature 4800K — slight colour fade and lifted blacks.', 'MD-6': 'Cool colour temperature 6200K — blue-teal undertones, airy freshness.' };
  if (d.mood && colourTempMap[d.mood.id]) lines.push(`\nColour Temperature: ${colourTempMap[d.mood.id]}`);

  // Layout + Overlay with strength
  const strengthDesc = d.overlayStrength === 'heavy' ? 'a strong, clearly visible dark overlay' : 'a subtle, light semi-transparent overlay';
  lines.push(`\nComposition & Text Zone: The image has ${strengthDesc} — ${d.overlayPh}. The ${d.textZonePh} — this area should be ${d.overlayStrength === 'heavy' ? 'distinctly' : 'slightly'} darker or muted to ensure white text overlay is legible and readable against the photograph.`);

  // Technical quality
  lines.push(`\nTechnical Quality: Professional DSLR quality, sharp focus on the main subject, high dynamic range, natural bokeh where the depth of field creates it. The image should look like it was shot by a skilled photographer, not AI-generated.`);

  // Do not include
  lines.push(`\nDo not include: ${d.negs.join(', ')}.`);

  return lines.join('\n');
}

function buildMJPrompt(d) {
  // MJ: single dense paragraph, comma-separated visual phrases, --ar --s --no flags
  // Ordered by wizard steps for traceability
  const parts = [];

  // [Step 1: Template + Step 2: Style] Frame / Density / Overlay
  if (d.framePh) parts.push(`${d.framePh}, the frame border maintains its own consistent decorative style independent of the illustration rendering`);
  if (d.densityPh) parts.push(d.densityPh);
  if (d.overlayPh) parts.push(d.overlayPh);

  // [Step 3: Layout] Text zone + illustration position
  parts.push(d.textZonePh);

  // [Step 4: Track] — merged into style phrase below

  // [Step 5: Colour + Finish] Background and surface
  parts.push(`${d.bgPh}`);
  if (d.finish) parts.push(d.finish.promptPhrase);

  // [Step 6: Visual] Illustration + render + size + position + motif + guards
  if (d.illusItem) {
    parts.push(`the illustration only is ${d.renderPh} of ${d.illusItem.name} ${d.illusItem.desc} rendered in ${d.illusColPh}`);
    parts.push(`${d.sizePh} ${d.illusPositionPh}`);
    if (d.ornamentalGuard) parts.push(d.ornamentalGuard);
    else if (d.motifBoundary) parts.push(d.motifBoundary);
  }
  if (d.motifPh) parts.push(d.motifPh);

  // A2 accent elements
  if (d.a2AccentPh) parts.push(`small accent details nearby: ${d.a2AccentPh}, rendered in the same illustration style as the main subject`);

  // [Step 7: Intensity]
  parts.push(d.intensityPh);

  // [Track style + sparkle + format]
  parts.push(d.stylePh);
  if (d.track.id === 'A') parts.push('white sparkle particles scattered');
  parts.push('9:16 portrait format');

  const mainPrompt = parts.filter(p => p).join(', ');
  const negs = buildNegatives().join(', ');

  return `${mainPrompt} --ar 9:16 --s 400 --no ${negs}`;
}

function buildLeonardoPrompt(d) {
  // Leonardo: compact structured prompt — must stay under 1400 chars
  const lines = [];
  lines.push(`${d.track.name} ${getCategoryLabel()} poster, 9:16 vertical.`);
  lines.push(`BG: ${d.bgPh}${d.finish ? ', ' + d.finish.promptPhrase : ''}.`);

  if (d.framePh) {
    let frameShort = d.framePh;
    if (frameShort.length > 80) frameShort = frameShort.substring(0, 80).replace(/\s+\S*$/, '');
    lines.push(`Frame: ${frameShort}. No overlap with illustration.`);
  }
  if (d.overlayPh) lines.push(`Overlay: ${d.overlayPh}.`);
  if (d.densityPh) lines.push(`Density: ${d.densityPh}.`);

  lines.push(`Layout: ${d.textZonePh}. Illustration ${d.illusPositionPh}.`);

  if (d.illusItem) {
    // Compact render phrase for Leonardo — truncate verbose ornamental descriptions
    let renderShort = d.renderPh;
    if (renderShort.length > 120) renderShort = renderShort.substring(0, 120).replace(/,\s*[^,]*$/, '');
    lines.push(`Subject: ${d.illusItem.name}, ${d.illusItem.desc}`);
    lines.push(`Render: ${renderShort}, ${d.illusColPh}. ${d.sizePh}.`);
    // Compact guard — archetype-aware
    if (d.ornamentalGuard) lines.push(`${d.illusItem.name} visible, not obscured by decoration.`);
    else if (d.motifBoundary) lines.push(d.arch.id === 'A1' ? `Motif on border frame only, NOT near ${d.illusItem.name}.` : `Motif around composition, not overlapping ${d.illusItem.name}.`);
  }
  if (d.motifPh) {
    if (d.arch.id === 'A1') {
      lines.push(`Motif: ${d.motif.name} on border frame edges ONLY, not near illustration.`);
    } else {
      lines.push(`Motif: ${d.motif.name} scattered around illustration as accents, not on borders.`);
    }
  }

  // A2 accent elements
  if (d.a2AccentPh) lines.push(`Accents: ${d.a2AccentPh}, same illustration style.`);

  let intShort = d.intensityPh;
  if (intShort.length > 100) intShort = intShort.substring(0, 100).replace(/,\s*[^,]*$/, '');
  lines.push(`Intensity: ${intShort}.`);

  // Compact style phrase
  let styleShort = d.stylePh;
  if (styleShort.length > 100) styleShort = styleShort.substring(0, 100).replace(/,\s*[^,]*$/, '');
  lines.push(`Style: ${styleShort}.${d.track.id === 'A' ? ' Sparkle particles.' : ''}`);

  const coreNegs = buildLeonardoNegatives(d);
  lines.push(`Negative: ${coreNegs.join(', ')}`);

  return lines.join('\n');
}

function buildLeonardoNegatives(d) {
  const track = STATE.track;
  const negs = ['text', 'letters', 'words', 'numbers', 'typography', 'watermarks', 'logos', 'blurry', 'low quality'];
  if (track === 'A') negs.push('photorealistic', 'minimalism', 'grayscale');
  if (track === 'B') negs.push('maximalist', 'gold foil', 'sparkle', 'metallic');
  if (track === 'C') negs.push('ornate', 'gold foil', 'busy', 'vivid', 'gradient');
  if (track === 'D') negs.push('photorealism', 'ornate', 'gold', 'muted');
  if (track === 'E') negs.push('harsh', 'neon', 'metallic', 'glitter', 'bold outlines');
  const palette = getPalette();
  if (palette?.roles?.banColour) negs.push(`${palette.roles.banColour} illustration`);
  if (d.illusItem && d.motifPh) {
    negs.push('motif overlapping illustration');
    if (d.arch.id === 'A1') negs.push('motif near illustration', 'motif beside illustration');
    if (d.arch.id === 'A2') negs.push('motif on border', 'motif on frame edges');
  }
  return negs;
}

// Helper: strip hex codes like (#FF8C1A) from strings to save chars
function stripHex(s) { return s.replace(/\s*\(#[A-Fa-f0-9]{3,8}\)/g, ''); }
// Helper: truncate to max chars at last comma
function trunc(s, max) { if (s.length <= max) return s; return s.substring(0, max).replace(/,\s*[^,]*$/, ''); }

function buildFireflyWithTextPrompt(d) {
  // Firefly WITH TEXT: hard cap ≤950 chars. Includes "Good Morning" text.
  const parts = [];
  parts.push(`${d.track.name} ${getCategoryLabel()} poster, 9:16 vertical.`);
  // BG: strip hex, truncate finish
  let bg = stripHex(d.bgPh);
  if (d.finish) { let fin = d.finish.promptPhrase; if (fin.length > 40) fin = trunc(fin, 40); bg += ', ' + fin; }
  parts.push(`BG: ${bg}.`);
  if (d.framePh) parts.push(`Frame: ${trunc(d.framePh, 50)}.`);
  if (d.overlayPh) parts.push(`${trunc(d.overlayPh, 40)}.`);
  if (d.densityPh) parts.push(`${trunc(d.densityPh, 40)}.`);
  // Layout: compact
  const zone = d.textZonePh.includes('upper') ? 'upper' : d.textZonePh.includes('lower') ? 'lower' : d.textZonePh.includes('left') ? 'left' : d.textZonePh.includes('right') ? 'right' : 'centre';
  parts.push(`Text zone: ${zone} 25%. Illustration: ${zone === 'upper' ? 'lower' : zone === 'lower' ? 'upper' : 'opposite'} area.`);
  if (d.illusItem) {
    let render = trunc(stripHex(d.renderPh), 60);
    let col = stripHex(d.illusColPh);
    parts.push(`${d.illusItem.name}: ${d.illusItem.desc}. ${render}, ${col}. ${d.sizePh}.`);
  }
  if (d.motifPh) parts.push(d.motifPhFirefly);
  if (d.a2AccentPh) parts.push(`Accents: ${trunc(d.a2AccentPh, 60)}, same style.`);
  parts.push(`${trunc(d.intensityPh, 60)}.`);
  parts.push(`${trunc(d.stylePh, 60)}.`);
  if (d.track.id === 'A') parts.push('Sparkle particles.');
  parts.push(`Clean "${getCategoryLabel()}" text in decorative font in the text zone, legible, not overlapping illustration.`);
  let result = parts.join(' ');
  if (result.length > 950) result = result.substring(0, 950).replace(/\s+\S*$/, '');
  return result;
}

function buildGeminiPrompt(d) {
  // Gemini: verbose structured descriptive sentences — each section maps to a wizard step
  const lines = [];

  // Header
  lines.push(`A ${d.track.name} style ${getCategoryLabel()} greeting poster in vertical 9:16 format.`);

  // [Step 5: Colour & Finish]
  let scene = `Background & Finish: ${d.bgPh}`;
  if (d.finish) scene += ` with ${d.finish.promptPhrase}`;
  scene += '.';
  lines.push(`\n${scene}`);

  // [Step 1 + 2: Template + Style]
  if (d.framePh) {
    lines.push(`\nFrame (${d.step2Opt.name}): A ${d.framePh} encloses the composition. The frame is purely decorative and does not cover the main illustration. The frame maintains its own consistent style independent of illustration rendering.`);
  }
  if (d.overlayPh) lines.push(`\nOverlay (${d.step2Opt.name}): The photograph has ${d.overlayPh}.`);
  if (d.densityPh) lines.push(`\nDensity: The composition has ${d.densityPh}.`);

  // [Step 3: Layout]
  lines.push(`\nLayout (${d.layout.name}): ${d.textZonePh}. Illustration ${d.illusPositionPh}.`);

  // [Step 6: Visual — Illustration + Render + Size + Motif + Guards]
  if (d.illusItem) {
    lines.push(`\nIllustration: ${d.illusItem.name} — ${d.illusItem.desc}.`);
    lines.push(`Render style (illustration only): ${d.renderPh}. Coloured in ${d.illusColPh}. The rendering style applies only to this illustration, not to the frame or background.`);
    lines.push(`Size: ${d.sizePh}.`);
    if (d.ornamentalGuard) lines.push(`Visibility: The illustration must be clearly visible — ${d.ornamentalGuard}.`);
    else if (d.motifBoundary) lines.push(`Visibility: The ${d.illusItem.name} must be clearly visible — ${d.motifBoundary}.`);
  }
  if (d.motifPh) {
    if (d.arch.id === 'A1') {
      lines.push(`\nMotif: ${d.motifPh}. The motif must appear ONLY on the border frame edges and must NOT appear near, beside, or around the illustration.`);
    } else {
      lines.push(`\nMotif: ${d.motifPh}. The motif accents are scattered around and near the illustration, filling the composition — they do NOT appear on the border edges.`);
    }
  }

  // A2 accent elements
  if (d.a2AccentPh) {
    lines.push(`\nAccent details: Small supporting elements nearby the main illustration — ${d.a2AccentPh}. These accents are rendered in the exact same illustration style as the main subject and serve as subtle scene-setting props.`);
  }

  // [Step 7: Intensity]
  lines.push(`\nDecoration intensity: ${d.intensityPh}.`);

  // [Track style]
  lines.push(`\nStyle reference: ${d.stylePh}.`);
  if (d.track.id === 'A') lines.push(`Small white sparkle particles are scattered across the design.`);

  // Do not include
  const negs = buildNegatives();
  lines.push(`\nDo not include: ${negs.join(', ')}.`);

  return lines.join('\n');
}

// ─── Unique Code Generator ──────────────────────────────────────────────────
function generateUniqueCode() {
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const arch = STATE.archetype || '??';

  const PRESET_ABBR = {
    Basic: 'Ba', Medium: 'Me', Complex: 'Co',
    Minimal: 'Mn', Balanced: 'Bl', Expressive: 'Ex',
    Ultra: 'Ul', Warm: 'Wm', Simple: 'Si', Fun: 'Fn', Maximum: 'Mx', Rich: 'Ri',
  };

  function illusAbbr(name) {
    if (!name) return '??';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 4);
  }

  // Deterministic 3-char hash of the full set of IDs.
  // Different combos always produce different hashes; same combo always produces the same one.
  // This prevents the rare case where two illustrations abbreviate to identical letters.
  function comboHash(...ids) {
    const str = ids.filter(Boolean).join('|');
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return Math.abs(h).toString(36).slice(-3).toUpperCase();
  }

  const parts = [dd + mm];

  if (arch === 'A1') {
    parts.push('A1' + (STATE.step2 || '??'));
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    if (STATE.palette) parts.push(STATE.palette.replace('GM-C', 'C'));
    const illus = getIllusItem();
    parts.push(illusAbbr(illus ? illus.name : (STATE.illusItem === 'NONE' ? 'None' : null)));
    if (STATE.frameDecoration) parts.push({ Plain: 'Pl', Simple: 'Si', Detailed: 'Dt' }[STATE.frameDecoration] || STATE.frameDecoration[0]);
    if (STATE.illusSize) parts.push({ Small: 'Sm', Medium: 'Md', Large: 'Lg' }[STATE.illusSize] || STATE.illusSize[0]);
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.step2, STATE.track, STATE.layout, STATE.palette, STATE.illusItem, STATE.illusRender, STATE.motifSet, STATE.finish, STATE.frameDecoration, STATE.illusSize, STATE.customPreset));

  } else if (arch === 'A2') {
    parts.push('A2');
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    if (STATE.palette) parts.push(STATE.palette.replace('GM-C', 'C'));
    const illus = getIllusItem();
    parts.push(illusAbbr(illus ? illus.name : null));
    parts.push(STATE.a2SubElements.length + 'ac');
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.track, STATE.layout, STATE.palette, STATE.illusItem, STATE.illusRender, STATE.motifSet, STATE.finish, STATE.customPreset, ...STATE.a2SubElements));

  } else if (arch === 'B1') {
    parts.push('B1' + (STATE.step2 || '??'));
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    const d = gatherB1PromptData();
    if (d.sceneItems.length >= 1) parts.push(illusAbbr(d.sceneItems[0].name));
    if (STATE.mood) parts.push(STATE.mood.replace('MD-', 'M'));
    parts.push(STATE.overlayStrength === 'heavy' ? 'Hv' : 'Lt');
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.step2, STATE.track, STATE.layout, STATE.mood, STATE.overlayStrength, STATE.customPreset, ...STATE.sceneElements));
  }

  return parts.join('-');
}
