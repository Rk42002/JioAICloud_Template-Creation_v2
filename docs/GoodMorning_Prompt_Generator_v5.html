// SAFE ZONE — bottom 20% personalization band
// Reserved for the user to composite their own name/signature/branding
// post-generation. The hero illustration's main subject and the hero text
// must stay above this band. Background fill, frame border, and small
// decorative accents (sparkle, scattered motifs) are FREE to extend into
// it — that's what keeps the zone from looking empty / odd if the user
// adds nothing. For B1 the photograph extends naturally with a soft
// gradient fade-out so the bottom reads as a calm area rather than a
// hard exclusion strip.
// ═══════════════════════════════════════════════════════════════
const SAFE_ZONE_PERCENT = 20;
const SAFE_ZONE_DESC = 'the bottom 20 percent of the canvas is a clean personalization safe zone — the main illustration subject and any hero text must stay above this zone, but the background colour, frame border, and small decorative accents like sparkle particles or scattered motifs may extend naturally into it so the area never looks empty or out of place';
const SAFE_ZONE_DESC_B1 = 'the bottom 20 percent of the canvas is a personalization safe zone — the photograph extends naturally to the bottom edge, but the main subject of the photo must stay above this zone and the bottom should soft-gradient fade slightly to a calmer area so user-added text or branding sits comfortably without looking out of place';
const SAFE_ZONE_FIREFLY_AB = 'Bottom 20% is a clean personalization zone, no main subject or hero text in this band, BG and frame extend naturally.';
const SAFE_ZONE_FIREFLY_B1 = 'Bottom 20% personalization zone, photo soft-fades, main subject above this band.';

// Layout L6 (Text Centre, framed) uses a reduced 10% safe zone so a tiny corner accent
// can sit at any of the four corners — including the bottom corners. All other layouts
// keep the standard 20% band. Implemented as a swap inside the dispatch helpers below.
const SAFE_ZONE_DESC_L6 = 'the bottom 10 percent of the canvas is a reduced personalization safe zone for this layout — the central text and the small corner accent illustration both stay clear of this strip, while the frame border and background may extend into it';
const SAFE_ZONE_FIREFLY_L6 = 'Bottom 10% reduced safe zone (this corner-accent layout).';

// Returns the right safe-zone descriptor for a given layout. L6 uses the reduced 10% variant
// since its illustration is a small corner accent that can sit at any of the four corners.
function getSafeZoneDesc(layoutId) { return layoutId === 'L6' ? SAFE_ZONE_DESC_L6 : SAFE_ZONE_DESC; }
function getSafeZoneFireflyAB(layoutId) { return layoutId === 'L6' ? SAFE_ZONE_FIREFLY_L6 : SAFE_ZONE_FIREFLY_AB; }

// B1 hero-text colour adapter.
// Heavy overlay → white always works (dark band beneath text).
// Light overlay → per-track default since white can vanish on bright/airy or
// muted-earth photos. Returns { name, desc } where `name` is a short label
// (used in the audit panel + Firefly compact prompt) and `desc` is the full
// natural-language phrase injected into Leonardo/Gemini/MJ.
function getB1TextColour() {
  const strength = STATE.overlayStrength || 'light';
  if (strength === 'heavy') {
    return { name: 'white', desc: 'white' };
  }
  const map = {
    'A': { name: 'white',           desc: 'crisp white' },
    'B': { name: 'warm cream',      desc: 'warm cream off-white (#FFF7E8) for editorial muted readability' },
    'C': { name: 'dark',            desc: 'very dark grey or near-black for high-contrast minimal readability' },
    'D': { name: 'dark warm grey',  desc: 'dark warm grey or charcoal (#2A1F1A) so the type is readable on the bright airy photograph' },
    'E': { name: 'warm dark',       desc: 'soft warm dark or muted maroon so the type stays readable against pastel dreamy tones' },
  };
  return map[STATE.track] || { name: 'white', desc: 'white' };
}

// Helper: returns the active overlay object (or null)
function getActiveOverlay() {
  if (!STATE.overlay || STATE.overlay === 'OV-NONE') return null;
  return OVERLAYS.find(o => o.id === STATE.overlay) || null;
}

// Helper: which overlays are valid for a given base category.
// For original categories we read overlay.appliesTo. For CATEGORY_PACKS we honour pack.appliesOverlays
// (which lists overlay IDs the pack composes with). The "OV-NONE" default is always included.
function getOverlaysForCategory(catId) {
  const pack = CATEGORY_PACKS[catId];
  if (pack) {
    const allowed = new Set(pack.appliesOverlays || []);
    return OVERLAYS.filter(o => o.id === 'OV-NONE' || allowed.has(o.id));
  }
  return OVERLAYS.filter(o => o.appliesTo.includes(catId));
}

function getSteps() {
  const isSV = STATE.category === 'suvichar';
  let steps;
  if (STATE.archetype === 'B1') {
    steps = isSV
      ? ['template', 'feeling', 'b1_text_placement', 'track', 'scene_elements', 'mood', 'intensity']
      : ['template', 'b1_text_placement', 'track', 'scene_elements', 'mood', 'intensity'];
  } else if (STATE.archetype === 'A2') {
    steps = isSV
      ? ['template', 'feeling', 'layout', 'track', 'colour_finish', 'visual', 'intensity']
      : ['template', 'layout', 'track', 'colour_finish', 'visual', 'intensity'];
  } else {
    steps = isSV
      ? ['template', 'feeling', 'style', 'layout', 'track', 'colour_finish', 'visual', 'intensity']
      : ['template', 'style', 'layout', 'track', 'colour_finish', 'visual', 'intensity'];
  }
  if (isSV) steps.push('custom_text');
  // CATEGORY_PACKS with `customText: true` (Shivji, Ganeshji, Jesus, Islamic) get the same final
  // Custom Text step as Suvichar — pre-filled with the pack's default hero text and editable.
  const _pack = getCategoryPack();
  if (_pack && _pack.customText) steps.push('custom_text');
  return steps;
}

function getArchetype() { return ARCHETYPES.find(a => a.id === STATE.archetype); }
function getTrack() { return TRACKS.find(t => t.id === STATE.track); }
function getLayout() { return LAYOUTS.find(l => l.id === STATE.layout); }

function getPalette() {
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  if (!tv) return null;
  return { ...base, ...tv };
}

function getFont() {
  const base = FONTS_BASE.find(f => f.id === STATE.font);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  return { ...base, ...tv };
}

function getIllusItem() {
  if (!STATE.illusItem || STATE.illusItem === 'NONE') return null;
  for (const cat of ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  // Also search Suvichar catalogue
  for (const cat of SUVICHAR_ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  // Also search Birthday catalogue
  for (const cat of BIRTHDAY_ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  // Active CATEGORY_PACK native illustrations
  const pack = getCategoryPack();
  if (pack) {
    for (const packCat of (pack.illusCats || [])) {
      const item = packCat.items.find(i => i.id === STATE.illusItem);
      if (item) return item;
    }
  }
  // Overlay illustrations
  const ov = getActiveOverlay();
  if (ov) {
    const ovItem = ov.illustrations.find(i => i.id === STATE.illusItem);
    if (ovItem) return { id: ovItem.id, name: ovItem.name, desc: ovItem.desc, archs: ovItem.archs.join(', ') };
  }
  return null;
}

function getFinishOptions() {
  const map = { A: FINISH_OPTIONS, B: FINISH_OPTIONS_B, C: FINISH_OPTIONS_C, D: FINISH_OPTIONS_D, E: FINISH_OPTIONS_E };

}

function getIllusRenderOptions() {

  return map[STATE.track] || [];
}

function getMotifOptions() {
  let base;
  const pack = getCategoryPack();
  if (pack) {
    // Category packs ship per-track motif arrays in pack.motifs[track].
    // Falls back to the framework default if a track isn't listed (e.g. Father's Day Track D).
    base = (pack.motifs && pack.motifs[STATE.track]) || [];
    if (base.length === 0) {
      const map = { A: MOTIF_OPTIONS, B: MOTIF_OPTIONS_B, C: MOTIF_OPTIONS_C, D: MOTIF_OPTIONS_D, E: MOTIF_OPTIONS_E };
      base = map[STATE.track] || [];
    }
  } else if (STATE.category === 'birthday') {
    const bd = { A: BIRTHDAY_MOTIF_OPTIONS_A, B: BIRTHDAY_MOTIF_OPTIONS_B, C: BIRTHDAY_MOTIF_OPTIONS_C, D: BIRTHDAY_MOTIF_OPTIONS_D, E: BIRTHDAY_MOTIF_OPTIONS_E };
    base = bd[STATE.track] || [];
  } else {
    const map = { A: MOTIF_OPTIONS, B: MOTIF_OPTIONS_B, C: MOTIF_OPTIONS_C, D: MOTIF_OPTIONS_D, E: MOTIF_OPTIONS_E };
    base = map[STATE.track] || [];
  }
  // Apply overlay motif swap (1:1 replacement of named base motifs) + adds (extra motifs).
  const ov = getActiveOverlay();
  if (!ov || !STATE.track) return base;
  const swapMap = ov.motifSwaps[STATE.track] || {};
  const swapped = base.map(m => {
    const sw = swapMap[m.id];
    return sw ? { id: sw.id, name: sw.name, promptPhrase: sw.promptPhrase, bestWith: m.bestWith || 'All' } : m;
  });
  const adds = (ov.motifAdds[STATE.track] || []).map(a => ({ id: a.id, name: a.name, promptPhrase: a.promptPhrase, bestWith: 'All' }));
  return [...swapped, ...adds];
}

  const map = { A: CUSTOM_PRESETS, B: CUSTOM_PRESETS_B, C: CUSTOM_PRESETS_C, D: CUSTOM_PRESETS_D, E: CUSTOM_PRESETS_E };

}

// Birthday illustration catalogue resolver — analogous to getSuvicharIllusCats but no feeling filter.
function getBirthdayIllusCats() {
  const arch = STATE.archetype;
  const cats = [];

  // GM carry-overs (filtered by archetype)
  const carryoverItems = [];
  for (const gmCat of ILLUS_CATS) {
    for (const item of gmCat.items) {
      if (!BIRTHDAY_GM_CARRYOVER_IDS.includes(item.id)) continue;
      // Archetype filter
      if (arch === 'B1' && item.archs && !item.archs.includes('All') && !item.archs.includes('B1')) continue;
      if (arch !== 'B1' && item.archs && !item.archs.includes('All') && !item.archs.includes(arch)) continue;
      carryoverItems.push(item);
    }
  }
  if (carryoverItems.length > 0) cats.push({ id: 'BD-GM', name: 'Carry-overs', icon: '🌸', items: carryoverItems });

  // Birthday-specific categories
  for (const bdCat of BIRTHDAY_ILLUS_CATS) {
    const items = bdCat.items.filter(item => {
      // Human / figurative category is B1-only
      if (bdCat.id === 'BD-IH' && arch !== 'B1') return false;
      // Per-item archetype gate
      if (item.archs) {
        if (arch === 'B1' && !item.archs.includes('B1') && !item.archs.includes('All')) return false;
        if (arch !== 'B1' && !item.archs.includes(arch) && !item.archs.includes('All')) return false;
      }
      return true;
    });
    if (items.length > 0) cats.push({ ...bdCat, items });
  }
  return cats;
}

function getFilteredTracks() {
  let tracks = TRACKS;
  // Suvichar feeling filter
  if (STATE.category === 'suvichar' && STATE.feeling) {
    const feeling = SUVICHAR_FEELINGS.find(f => f.id === STATE.feeling);
    if (feeling) tracks = tracks.filter(t => feeling.allowedTracks.includes(t.id));
  }
  // CATEGORY_PACK track lock — devotional packs block Track D etc.
  const pack = getCategoryPack();
  if (pack && pack.blockedTracks.length) {
    tracks = tracks.filter(t => !pack.blockedTracks.includes(t.id));
  }
  // Overlay hard-block filter (Devotional → blocks D, Rain → blocks A, Cricket → blocks E)
  const ov = getActiveOverlay();
  if (ov && ov.blockedTracks.length) {
    tracks = tracks.filter(t => !ov.blockedTracks.includes(t.id));
  }
  return tracks;
}

function getSuvicharIllusCats() {
  const arch = STATE.archetype;
  const feelingId = STATE.feeling;

  // Map each GM carry-over to its semantic SV category (no "Carry-overs" bucket)
  const CARRYOVER_TO_SV_CAT = {
    'GM-I2-01': 'SV-IN', 'GM-I2-04': 'SV-IN', 'GM-I2-05': 'SV-IN',
    'GM-I2-06': 'SV-IN', 'GM-I2-08': 'SV-IN',
    'GM-I3-01': 'SV-IN', 'GM-I3-02': 'SV-IN', 'GM-I6-01': 'SV-IN',
    'GM-I4-01': 'SV-IO', 'GM-I1-01': 'SV-IO',
  };

  function carryoverOk(item) {
    if (arch === 'B1') {
      if (item.archs && !item.archs.includes('All') && !item.archs.includes('B1')) return false;
    }
    const rule = SUVICHAR_ITEM_FEELINGS[item.id];
    if (rule !== 'U' && feelingId && Array.isArray(rule) && !rule.includes(feelingId)) return false;
    return true;
  }

  function nativeOk(item, catId) {
    if (catId === 'SV-IH' && arch !== 'B1') return false;
    if (item.archs && item.archs === 'B1' && arch !== 'B1') return false;
    const rule = SUVICHAR_ITEM_FEELINGS[item.id];
    if (!rule || rule === 'U') return true;
    if (Array.isArray(rule) && feelingId && !rule.includes(feelingId)) return false;
    return true;
  }

  // Collect carry-overs grouped by target SV category
  const carryoverByCat = {};
  for (const gmCat of ILLUS_CATS) {
    for (const item of gmCat.items) {
      const svCatId = CARRYOVER_TO_SV_CAT[item.id];
      if (!svCatId || !carryoverOk(item)) continue;
      if (!carryoverByCat[svCatId]) carryoverByCat[svCatId] = [];
      carryoverByCat[svCatId].push(item);
    }
  }

  const cats = [];
  for (const svCat of SUVICHAR_ILLUS_CATS) {
    const items = [
      ...(carryoverByCat[svCat.id] || []),
      ...svCat.items.filter(item => nativeOk(item, svCat.id)),
    ];
    if (items.length > 0) cats.push({ ...svCat, items });
  }
  return cats;
}

// Catalogue resolver for the 7 new CATEGORY_PACKS entries.
// Returns: GM carry-overs (filtered to current archetype) + native pack illustration sub-categories.
// Mirrors the shape of getBirthdayIllusCats / getSuvicharIllusCats so applyOverlayToCatalogue and
// the Visual / B1-Scene steps can consume it identically.
function getPackIllusCats() {
  const pack = getCategoryPack();
  if (!pack) return [];
  const arch = STATE.archetype;
  const cats = [];

  // 1. GM carry-overs (filtered by archetype)
  const carryoverItems = [];
  for (const gmCat of ILLUS_CATS) {
    for (const item of gmCat.items) {
      if (!pack.carryoverIds.includes(item.id)) continue;
      if (arch === 'B1' && item.archs && !item.archs.includes('All') && !item.archs.includes('B1')) continue;
      if (arch !== 'B1' && item.archs && !item.archs.includes('All') && !item.archs.includes(arch)) continue;
      carryoverItems.push(item);
    }
  }
  if (carryoverItems.length > 0) cats.push({ id: pack.id + '-GM', name: 'Carry-overs', icon: '🌸', items: carryoverItems });

  // 2. Pack-native categories (filtered by archetype)
  for (const packCat of (pack.illusCats || [])) {
    const items = packCat.items.filter(item => {
      if (item.archs) {
        if (arch === 'B1' && !item.archs.includes('B1') && !item.archs.includes('All')) return false;
        if (arch !== 'B1' && !item.archs.includes(arch) && !item.archs.includes('All')) return false;
      }
      return true;
    });
    if (items.length > 0) cats.push({ ...packCat, items });
  }
  return cats;
}

// Apply overlay add + restrict on top of a base catalogue (array of { id, name, items[] }).
// - Removes items in the overlay's restrictByCategory[STATE.category] list
// - Appends overlay-added illustrations as new categories grouped by their `group` field
// - Filters overlay items by current archetype (B1 photo / A1+A2 illustrated)
function applyOverlayToCatalogue(baseCats) {
  const ov = getActiveOverlay();
  if (!ov) return baseCats;
  const arch = STATE.archetype;
  const restricted = new Set(ov.restrictByCategory[STATE.category] || []);

  // Step 1: filter out restricted items from each base cat
  const filteredCats = baseCats.map(cat => ({
    ...cat,
    items: cat.items.filter(item => !restricted.has(item.id)),
  })).filter(cat => cat.items.length > 0);

  // Step 2: group overlay items by their `group` field, filtering by archetype
  const overlayGroups = {};
  for (const item of ov.illustrations) {
    if (arch && item.archs && !item.archs.includes(arch)) continue;
    if (!overlayGroups[item.group]) overlayGroups[item.group] = [];
    overlayGroups[item.group].push({
      id: item.id,
      name: item.name,
      desc: item.desc,
      // store as array-like archs for downstream consumers; expose as space-joined string for UI compat
      archs: item.archs.join(', '),
    });
  }

  // Step 3: append overlay groups as new catalogue categories (icon = overlay icon)
  const overlayCats = Object.keys(overlayGroups).map((groupName, idx) => ({
    id: `${ov.id}-${idx}`,
    name: `${ov.name} · ${groupName}`,
    icon: ov.icon,
    items: overlayGroups[groupName],
  }));

  return [...filteredCats, ...overlayCats];
}

// Merged photo desc lookup covering GM + SV + BD + overlay items
function getB1PhotoDesc(itemId) {
  // Overlay illustrations: use desc as photo desc (already photorealistic in spec)
  const ov = getActiveOverlay();
  if (ov) {
    const ovItem = ov.illustrations.find(i => i.id === itemId);
    if (ovItem) return ovItem.desc;
  }
  return B1_PHOTO_DESC[itemId] || SV_B1_PHOTO_DESC[itemId] || BD_B1_PHOTO_DESC[itemId] || null;
}

// Merged sub-element lookup (GM + SV + BD + V2 packs)
function getB1SubElements(itemId) {
  return B1_SUB_ELEMENTS[itemId] || SV_B1_SUB_ELEMENTS[itemId] || BD_B1_SUB_ELEMENTS[itemId] || RY_B1_SUB_ELEMENTS[itemId] || [];
}

// Merged A2 sub-element lookup (GM + SV + BD + V2 packs)
function getA2SubElements(itemId) {
  return A2_SUB_ELEMENTS[itemId] || SV_A2_SUB_ELEMENTS[itemId] || BD_A2_SUB_ELEMENTS[itemId] || RY_A2_SUB_ELEMENTS[itemId] || [];
}

function canProceed() {
  const stepId = getCurrentStepId();

  switch (stepId) {
    case 'template': return !!STATE.category && !!STATE.archetype;
    case 'feeling': return !!STATE.feeling;
    case 'style': return !!STATE.step2;
    case 'layout': return !!STATE.layout;
    case 'b1_text_placement': return !!STATE.layout && !!STATE.overlayStrength;
    case 'track': return !!STATE.track;
    case 'colour_finish': return !!STATE.palette && !!STATE.finish;
    case 'visual': {
      if (!STATE.illusItem) return false;
      if (STATE.illusItem === 'NONE') return true;
      if (STATE.archetype === 'A1') return !!STATE.frameDecoration && !!STATE.illusSize;
      return !!STATE.illusSize;
    }
    case 'intensity': return !!STATE.customPreset;
    case 'custom_text': {
      // Suvichar requires non-empty input (no default).
      // CATEGORY_PACK editable-text categories (Shivji etc.) accept empty because the pack's
      // heroText is the fallback default — the user can leave it untouched and ship.
      const _p = getCategoryPack();
      if (_p && _p.customText) return true;
      return !!STATE.customText && STATE.customText.trim().length > 0;
    }
    // font_text step removed
    // B1 Photo Background specific steps
    case 'scene_elements': return STATE.sceneElements.length >= 1 && STATE.sceneElements.length <= 3;
    case 'mood': return !!STATE.mood;
    default: return false;
  }
}

function getCurrentStepId() {
  const steps = getSteps();
  return steps[Math.min(STATE.step - 1, steps.length - 1)];
}

function select(key, value) {
  STATE[key] = value;
  if (key === 'category') {
    STATE.overlay = 'OV-NONE'; // overlay validity depends on base category — reset
    STATE.feeling = null; STATE.customText = ''; STATE.archetype = null; STATE.step2 = null; STATE.layout = null;
    STATE.track = null; STATE.palette = null; STATE.font = null; STATE.finish = null;
    STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    STATE.sceneElements = []; STATE.mood = null; STATE.overlayStrength = 'light'; STATE.a2SubElements = [];
  }
  if (key === 'overlay') {
    // Overlay change can invalidate previously-picked track (blockedTracks), illustration (restricted),
    // motif (swapped/blocked), and frame (F5 restricted by Cricket).
    STATE.step2 = null; STATE.layout = null;
    STATE.track = null; STATE.palette = null; STATE.font = null; STATE.finish = null;
    STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    STATE.sceneElements = []; STATE.mood = null; STATE.a2SubElements = [];
  }
  if (key === 'archetype') {
    STATE.feeling = null; STATE.step2 = null; STATE.layout = null; STATE.track = null; STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    // B1 specific resets
    STATE.sceneElements = []; STATE.mood = null; STATE.overlayStrength = 'light'; STATE.a2SubElements = [];
  }
  if (key === 'feeling') {
    STATE.track = null; STATE.palette = null; STATE.font = null; STATE.finish = null;
    STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
    STATE.sceneElements = []; STATE.mood = null; STATE.a2SubElements = [];
  }
  if (key === 'step2') { STATE.layout = null; }
  if (key === 'illusItem') { STATE.a2SubElements = []; }  // Reset sub-illustrations when main changes
  if (key === 'track') {
    STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    // B1 specific resets on track change
    STATE.mood = null; STATE.customPreset = null;
  }
  if (key === 'frameDecoration' && value === 'Plain') {
    STATE.motifSet = null; // Plain frame = no motifs
  }
  render();
}

// B1: Select main scene element (resets sub-elements if main changes)
function selectMainSceneElement(itemId) {
  const currentMain = STATE.sceneElements.length >= 1 ? STATE.sceneElements[0] : null;
  if (currentMain === itemId) {
    // Deselect main → clear everything
    STATE.sceneElements = [];
  } else {
    // New main → keep only this, clear old subs
    STATE.sceneElements = [itemId];
  }
  render();
}

// B1: Toggle a supporting/sub element (max 2)
function toggleSubElement(itemId) {
  const subs = STATE.sceneElements.slice(1);
  const idx = subs.indexOf(itemId);
  if (idx > -1) {
    STATE.sceneElements.splice(idx + 1, 1); // +1 because index 0 is main
  } else if (subs.length < 2) {
    STATE.sceneElements.push(itemId);
  }
  render();
}

// A2: Toggle sub-illustration accent (max 2)
function toggleA2SubElement(itemId) {
  const idx = STATE.a2SubElements.indexOf(itemId);
  if (idx > -1) {
    STATE.a2SubElements.splice(idx, 1);
  } else if (STATE.a2SubElements.length < 2) {
    STATE.a2SubElements.push(itemId);
  }
  render();
}

// Legacy — kept for backward compat
function toggleSceneElement(itemId) {
  const idx = STATE.sceneElements.indexOf(itemId);
  if (idx > -1) {
    STATE.sceneElements.splice(idx, 1);
  } else if (STATE.sceneElements.length < 3) {
    STATE.sceneElements.push(itemId);
  }
  render();
}

function jumpTo(step) {
  if (step <= STATE.step) { STATE.step = step; render(); }
}

  const sz = `<rect x="2" y="${h*0.8}" width="${w-4}" height="${h*0.2 - 2}" fill="rgba(248,250,252,0.85)" stroke="#94A3B8" stroke-width="0.7" stroke-dasharray="2 1.5" rx="2"/><text x="${w/2}" y="${h-3.5}" text-anchor="middle" font-size="4.5" fill="#64748B" font-style="italic">safe zone</text>`;

    let tY = L.textFirst ? 0 : vH, vY = L.textFirst ? tH : 0;

  }
  if (L.type === 'horizontal') {
    const tW = 20, vW = w - tW;
    const tX = L.textFirst ? 0 : vW, vX = L.textFirst ? tW : 0;
    // Side layouts: text/visual rects span full height, but the dashed band on top still flags the reserved area.

    const sz10 = `<rect x="2" y="${h*0.9}" width="${w-4}" height="${h*0.1 - 2}" fill="rgba(248,250,252,0.85)" stroke="#94A3B8" stroke-width="0.7" stroke-dasharray="2 1.5" rx="2"/><text x="${w/2}" y="${h-1.5}" text-anchor="middle" font-size="3.2" fill="#64748B" font-style="italic">safe 10%</text>`;

function renderProgress() {
  const steps = getSteps();
  const el = document.getElementById('progressSteps');
  let html = '';
  steps.forEach((id, i) => {
    const label = STEP_LABELS[id];
    const stepNum = i + 1;
    const isDone = STATE.step > stepNum;
    const isActive = STATE.step === stepNum;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    html += `<div class="prog-step ${cls}"><div class="num"><span>${stepNum}</span></div><span class="label">${label}</span></div>`;
    if (i < steps.length - 1) {
      html += `<div class="prog-connector ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

function renderStep1() {
  // Originals (3) + 7 CATEGORY_PACKS = 10 cards. Pack metadata sourced from CATEGORY_PACKS.
  const categories = [
    { id: 'good_morning', icon: '☀️', name: 'Good Morning', desc: 'Warm, festive poster with sunrise energy. Illustrations, florals, chai — classic morning vibes.' },
    { id: 'suvichar',     icon: '✍️', name: 'Suvichar / Quote', desc: 'Thought-provoking quote cards. Ink, geometry, nature — reflective and meaningful.' },

function renderStep2() {
  const arch = getArchetype();
  const options = getStep2Options();
  const cols = Math.min(options.length, 5);
  const ov = getActiveOverlay();
  let banner = '';
  if (ov && arch.id === 'A1') {
    const restricted = ov.frameRestrict || [];
    const unlocked = ov.frameUnlock || [];
    const notes = [];
    if (restricted.length) notes.push(`<strong>${ov.name}</strong> hides: ${restricted.join(', ')}`);
    if (unlocked.length) notes.push(`<strong>${ov.name}</strong> unlocks: ${unlocked.map(f => f.name).join(', ')}`);
    if (notes.length) banner = `<div style="background:#FFFBEB;border:1px solid #FCD34D;padding:10px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;color:#92400E;">${notes.join(' · ')}</div>`;
  }
  return `<div class="step-header"><div class="step-eyebrow">Step 2 · ${arch.codeName}</div><div class="step-title">${arch.step2Label}</div><div class="step-desc">This choice is specific to ${arch.name}. It determines the primary structural element.</div></div>${banner}<div class="options-grid cols-${cols}">${options.map(o => `<div class="opt-card ${STATE.step2 === o.id ? 'selected' : ''}" onclick="select('step2','${o.id}')"><div style="margin-bottom:10px;">${step2Diagram(o.diagramType)}</div><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div>`;
}

// Overlay-aware step 2 options. A1 frames: applies frameRestrict (hides) and frameUnlock (adds overlay-specific frames if any).
// A2/B1: pass-through (overlays don't touch density or B1 overlay treatments).
function getStep2Options() {
  const arch = getArchetype();
  if (!arch) return [];
  let options = STEP2_OPTIONS[arch.step2Key] || [];
  if (arch.id === 'A1') {
    const ov = getActiveOverlay();
    if (ov) {
      if (ov.frameRestrict.length) options = options.filter(o => !ov.frameRestrict.includes(o.id));
      if (ov.frameUnlock.length) options = [...options, ...ov.frameUnlock];
    }
  }
  return options;
}

function renderStep3() {
  // For B1, show compatibility badges based on overlay selection
  const compat = (STATE.archetype && STATE.step2) ? LAYOUT_COMPAT[STATE.archetype]?.[STATE.step2] : null;
  const stepDesc = STATE.archetype === 'B1'
    ? 'Where should text sit on the photograph? Badges show compatibility with your overlay choice.'
    : 'How should text and visuals be positioned on the canvas?';

  // Hide L2 (Text Overlay) for A1 and A2 — only available for B1
  const filteredLayouts = (STATE.archetype === 'A1' || STATE.archetype === 'A2') ? LAYOUTS.filter(l => l.id !== 'L2') : LAYOUTS;

  return `<div class="step-header"><div class="step-eyebrow">Step 3 · Layout</div><div class="step-title">Text & Visual Arrangement</div><div class="step-desc">${stepDesc}</div></div><div class="options-grid cols-3">${filteredLayouts.map(l => {
    const badge = compat ? compat[l.id] : null;
    const badgeCls = badge === 'best' ? 'recommended' : badge === 'ok' ? 'compatible' : badge === 'caution' ? 'caution' : '';
    return `<div class="opt-card ${STATE.layout === l.id ? 'selected' : ''} ${badgeCls}" onclick="select('layout','${l.id}')"><div>${layoutDiagram(l.id)}</div><div class="opt-name">${l.name}</div><div class="opt-desc">${l.desc}</div></div>`;
  }).join('')}</div>`;
}

// Helper: auto-determine B1 overlay from layout + strength
function getB1AutoOverlay() {
  const strength = STATE.overlayStrength || 'medium';
  const opacityWord = strength === 'light' ? 'light subtle semi-transparent' : 'heavy opaque dark';

  const map = {
    'L1': `${opacityWord} gradient overlay darker at the top fading to clear at the bottom, creating a text-readable zone at top`,
    'L2': `uniform ${opacityWord} dark overlay across the entire image for text readability`,
    'L3': `${opacityWord} gradient overlay darker on the left half fading to clear on the right, creating a text-readable zone on the left`,
    'L4': `${opacityWord} gradient overlay darker on the right half fading to clear on the left, creating a text-readable zone on the right`,
    'L5': `${opacityWord} gradient overlay darker at the bottom fading to clear at the top, creating a text-readable zone at bottom`,
    'L6': `vignette overlay with ${opacityWord} darkened edges and bright vivid centre, text-readable at centre`,
  };
  return map[STATE.layout] || '';
}

function renderStep4() {
  const compat = LAYOUT_COMPAT[STATE.archetype]?.[STATE.step2];
  const compatStatus = compat ? compat[STATE.layout] : null;
  const isB1 = STATE.archetype === 'B1';
  const stepDesc = isB1
    ? 'For photo backgrounds, each track defines a <strong>photography aesthetic</strong> — the colour treatment, contrast, and visual style of the photograph.'
    : 'Each track has its own palette, illustrations, and design language. Pick the vibe that matches your message.';
  const stepTitle = isB1 ? 'Photography Aesthetic' : 'Visual Aesthetic & Energy';

  const stepNum = getSteps().indexOf('track') + 1;
  let html = `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Track Selection</div><div class="step-title">${stepTitle}</div><div class="step-desc">${stepDesc}</div></div>`;
  if (compatStatus) {
    html += `<div style="background:#FFFBEB;border:1px solid #FCD34D;padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;color:#92400E;"><strong>Layout Compatibility:</strong> Your choice is <span style="font-weight:700;">${compatStatus}</span>.</div>`;
  }

  const availTracks = getFilteredTracks();
  const hiddenCount = TRACKS.length - availTracks.length;
  if (STATE.category === 'suvichar' && hiddenCount > 0) {
    const feelingObj = SUVICHAR_FEELINGS.find(f => f.id === STATE.feeling);
    html += `<div style="background:#FFFBEB;border:1px solid #FCD34D;padding:10px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;color:#92400E;">✦ <strong>${hiddenCount} track${hiddenCount>1?'s':''} hidden</strong> — not compatible with <em>${feelingObj ? feelingObj.name : 'your feeling'}</em>.</div>`;
  }
  if (isB1) {
    html += `<div class="options-grid cols-5">${availTracks.map(t => {
      const photoTrack = B1_PHOTO_TRACKS[t.id];
      return `<div class="opt-card ${STATE.track === t.id ? 'selected' : ''}" onclick="select('track','${t.id}')"><div class="opt-icon">${t.icon}</div><div class="opt-name">${t.name}</div><div class="opt-desc" style="font-size:11px;margin-bottom:4px;">${t.tagline}</div><div style="background:#F0F9FF;border:1px solid #BFDBFE;border-radius:6px;padding:4px 8px;margin-top:6px;font-size:10px;color:var(--primary);"><strong>📷 Photo:</strong> ${photoTrack.desc}</div></div>`;
    }).join('')}</div>`;
  } else {
    html += `<div class="options-grid cols-4">${availTracks.map(t => `<div class="opt-card ${STATE.track === t.id ? 'selected' : ''}" onclick="select('track','${t.id}')"><div class="opt-icon">${t.icon}</div><div class="opt-name">${t.name}</div><div class="opt-desc" style="font-size:11px;margin-bottom:6px;">${t.tagline}</div><div style="font-size:11px;color:#64748B;">${t.desc}</div></div>`).join('')}</div>`;

  html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">1</div><div class="sub-section-title">Colour Palette</div></div><div class="options-grid cols-6">${palettesToShow.map(p => {

function renderStep8() {
  const stepNum = getSteps().indexOf('visual') + 1;
  const isSV = STATE.category === 'suvichar';
  const isBD = STATE.category === 'birthday';
  let html = `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Visual</div><div class="step-title">Illustrations & Details</div><div class="step-desc">First pick your illustration, then choose rendering style and decorative elements.</div></div>`;
  let n = 1;

  // Choose illustration catalogue, then layer overlay (add overlay items, restrict base items).
  // CATEGORY_PACKS (Rath Yatra / Vat Savitri / Father's Day / Shivji / Ganeshji / Jesus / Islamic) take precedence.
  let illusCats;
  if (getCategoryPack()) illusCats = getPackIllusCats();
  else if (isSV) illusCats = getSuvicharIllusCats();
  else if (isBD) illusCats = getBirthdayIllusCats();
  else illusCats = ILLUS_CATS;
  illusCats = applyOverlayToCatalogue(illusCats);

  // 1. Illustration Category
  html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Illustration Category</div></div><div class="options-grid cols-3">${illusCats.map(cat => `<div class="opt-card ${STATE.illusCategory === cat.id ? 'selected' : ''}" onclick="select('illusCategory','${cat.id}')"><div class="opt-icon">${cat.icon}</div><div class="opt-name">${cat.name}</div><div style="font-size:11px;color:#64748B;">${cat.items ? cat.items.length : cat.count} options</div></div>`).join('')}</div></div>`;

  // 2. Illustration Item (after category chosen)
  if (STATE.illusCategory) {
    const cat = illusCats.find(c => c.id === STATE.illusCategory);
    if (cat) {
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">${cat.name} — Pick One</div></div><div class="options-grid cols-4">${cat.items.map(i => `<div class="opt-card ${STATE.illusItem === i.id ? 'selected' : ''}" onclick="select('illusItem','${i.id}')"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.desc || ''}</div></div>`).join('')}</div></div>`;
    }
  }

  if (STATE.illusItem && STATE.illusItem !== 'NONE') {
    // Sub-illustrations: curated accent items rendered in same illustration style.
    // A2 (no frame): density auto-adjusts (Light / Medium / Dense) based on count.
    // A1 (with frame): same accent picker, but density is governed by frame decoration —
    //   accents are pure scene-supporting props, no density label.
    if (STATE.archetype === 'A1' || STATE.archetype === 'A2') {
      const subIds = getA2SubElements(STATE.illusItem);
      const subItems = subIds.map(subId => { const acc = ACCENT_ITEMS[subId]; return acc ? { id: subId, ...acc } : null; }).filter(Boolean);
      if (subItems.length > 0) {
        const subEls = STATE.a2SubElements || [];
        const isA2 = STATE.archetype === 'A2';
        const densityLabel = subEls.length === 0 ? 'Light (main only)' : subEls.length === 1 ? 'Medium' : 'Dense';
        const tag = isA2 ? `${subEls.length}/2 · ${densityLabel}` : `${subEls.length}/2`;
        const helper = isA2
          ? `Small decorative elements rendered in the same illustration style. Density auto-adjusts: ${densityLabel}.`
          : `Small supporting scene elements rendered in the same illustration style as the main subject. Sit alongside the main illustration, kept clear of the border frame.`;
        html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Scene Accents <span style="font-weight:400;color:var(--muted);">(optional, up to 2)</span></div><div class="sub-section-tag">${tag}</div></div>`;
        html += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">${helper}</div>`;
        html += `<div class="options-grid cols-4">${subItems.map(i => {
          const isSel = subEls.includes(i.id);
          const isMaxed = subEls.length >= 2 && !isSel;
          return `<div class="opt-card ${isSel ? 'selected' : ''}" onclick="${isMaxed ? '' : `toggleA2SubElement('${i.id}')`}" style="${isMaxed ? 'cursor:not-allowed;opacity:0.4;' : ''}"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.illusDesc}</div></div>`;
        }).join('')}</div></div>`;
      }
    }

    // 3. Illustration Scale — cap at Medium for Suvichar
    const sizeOpts = isSV ? ILLUS_SIZE_OPTS.filter(o => o.id !== 'Large') : ILLUS_SIZE_OPTS;
    html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Illustration Scale</div><div class="sub-section-tag">How much space should it take?</div></div>${isSV ? '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Large / Hero not available for Suvichar — text is the hero.</div>' : ''}<div class="options-grid cols-3">${sizeOpts.map(o => `<div class="opt-card ${STATE.illusSize === o.id ? 'selected' : ''}" onclick="select('illusSize','${o.id}')"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;

    // 4. Rendering Style — same options across categories, varies by track
    {
      const opts = getIllusRenderOptions();
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Rendering Style</div><div class="sub-section-tag">How should the illustration look?</div></div><div class="options-grid cols-3">${opts.map(o => `<div class="opt-card ${STATE.illusRender === o.id ? 'selected' : ''}" onclick="select('illusRender','${o.id}')"><div style="margin-bottom:8px;">${renderPreviewSVG(o.id)}</div><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;
    }

    // 5. Frame Decoration (A1 only)
    if (STATE.archetype === 'A1') {
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Frame Decoration Level</div><div class="sub-section-tag">How ornate should the border frame be?</div></div><div class="options-grid cols-3">${FRAME_DECO_OPTS.map(o => `<div class="opt-card ${STATE.frameDecoration === o.id ? 'selected' : ''}" onclick="select('frameDecoration','${o.id}')"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div>`).join('')}</div></div>`;
    }

    // 6. Motifs — hidden for A1 + Plain or when Suvichar + locked render (minimal decoration)
    const showMotifs = !(STATE.archetype === 'A1' && STATE.frameDecoration === 'Plain');
    if (showMotifs) {
      const motifs = getMotifOptions();
      html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">${n++}</div><div class="sub-section-title">Motifs & Decoration</div><div class="sub-section-tag">Optional decorative patterns</div></div><div class="options-grid cols-5">${motifs.map(m => `<div class="opt-card ${STATE.motifSet === m.id ? 'selected' : ''}" onclick="select('motifSet','${m.id}')"><div style="font-size:22px;margin-bottom:8px;">${m.name === 'None' ? '—' : m.name.substring(0, 1)}</div><div class="opt-name">${m.name}</div></div>`).join('')}</div></div>`;
    }
  }

  return html;
}

// Suvichar — final step: enter the quote text that gets rendered into the poster
function renderCustomTextStep() {
  const stepNum = getSteps().indexOf('custom_text') + 1;
  const pack = getCategoryPack();
  // For CATEGORY_PACKS with editable text, pre-fill the textarea with the pack's default hero text
  // (e.g. "ॐ नमः शिवाय") so the user can either keep it or type their own.
  const isPackEditable = pack && pack.customText;
  const seeded = STATE.customText || (isPackEditable ? pack.heroText : '');
  const val = seeded.replace(/"/g, '&quot;');
  const isSV = STATE.category === 'suvichar';
  const title = isSV ? 'Your Quote' : 'Your Greeting Text';
  const eyebrow = isSV ? 'Quote Text' : 'Greeting Text';
  const desc = isSV
    ? 'Type the quote / suvichar that should appear on the poster. This text is fed into the image prompt.'
    : `The default "${pack.heroText}" is pre-filled. Keep it as-is, or type your own ${pack.name} blessing — it will be rendered onto the poster.`;
  const placeholder = isSV
    ? 'e.g. The journey of a thousand miles begins with a single step.'
    : `e.g. ${pack.heroLangVariants ? pack.heroLangVariants.join(' / ') : pack.heroText}`;
  const variantsRow = isPackEditable && pack.heroLangVariants ? `<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">${pack.heroLangVariants.map(v => `<button type="button" onclick="seedCustomText(${JSON.stringify(v).replace(/"/g, '&quot;')})" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;">${v}</button>`).join('')}</div>` : '';
  return `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · ${eyebrow}</div><div class="step-title">${title}</div><div class="step-desc">${desc}</div></div>
    <div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">1</div><div class="sub-section-title">${title}</div><div class="sub-section-tag">${seeded.length} chars</div></div>
    <textarea id="customTextInput" placeholder="${placeholder}" oninput="setCustomText(this.value)" style="width:100%;min-height:120px;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;line-height:1.5;">${val}</textarea>
    ${variantsRow}
    <div style="font-size:12px;color:var(--muted);margin-top:8px;">Tip: keep it short (under ~120 chars) so it stays legible on the poster. Long quotes may be truncated by some image models.</div>
    </div>`;
}

// Helper for the variant chip-row buttons in renderCustomTextStep — re-seeds the textarea + STATE.
function seedCustomText(v) {
  STATE.customText = v;
  const ta = document.querySelector('#customTextInput');
  if (ta) ta.value = v;
  setCustomText(v);
}

function setCustomText(v) {
  STATE.customText = v;
  // Update only the proceed button state and char counter without losing focus
  const counter = document.querySelector('#customTextInput')?.closest('.sub-section')?.querySelector('.sub-section-tag');
  if (counter) counter.textContent = `${(v || '').length} chars`;
  const nextBtn = document.querySelector('.btn.btn-primary');
  if (nextBtn) {
    if (canProceed()) nextBtn.removeAttribute('disabled'); else nextBtn.setAttribute('disabled','');
  }
  const genBtn = document.querySelector('.btn.btn-generate');
  if (genBtn) {
    if (canProceed()) genBtn.removeAttribute('disabled'); else genBtn.setAttribute('disabled','');
  }
}

function renderB1SceneElements() {
  const mainEl = STATE.sceneElements.length >= 1 ? STATE.sceneElements[0] : null;
  const subEls = STATE.sceneElements.slice(1);
  const stepNum = getSteps().indexOf('scene_elements') + 1;

  let html = `<div class="step-header"><div class="step-eyebrow">Step ${stepNum} · Scene Elements</div><div class="step-title">Build Your Scene</div><div class="step-desc">Pick a <strong>main subject</strong> for the photo, then optionally add 1–2 related supporting elements.</div></div>`;

  // ── Sub-section 1: Main Element ──
  html += `<div class="sub-section"><div class="sub-section-header"><div class="sub-section-num">1</div><div class="sub-section-title">Main Subject</div><div class="sub-section-tag">${mainEl ? '✓ Selected' : 'Pick one'}</div></div>`;
  let b1CatsBase;
  if (getCategoryPack()) b1CatsBase = getPackIllusCats();
  else if (STATE.category === 'suvichar') b1CatsBase = getSuvicharIllusCats();
  else if (STATE.category === 'birthday') b1CatsBase = getBirthdayIllusCats();
  else b1CatsBase = ILLUS_CATS;
  const b1Cats = applyOverlayToCatalogue(b1CatsBase);
  b1Cats.forEach(cat => {
    html += `<div style="margin-bottom:12px;"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;">${cat.icon} ${cat.name}</div><div class="options-grid cols-4">${cat.items.map(i => {
      const isMain = mainEl === i.id;
      const isSub = subEls.includes(i.id);
      const photoDesc = getB1PhotoDesc(i.id) || i.desc;
      return `<div class="opt-card ${isMain ? 'selected' : ''}" onclick="selectMainSceneElement('${i.id}')" style="${isSub ? 'opacity:0.4;pointer-events:none;' : ''}">${isMain ? '<div style="font-size:10px;font-weight:700;color:var(--primary);margin-bottom:4px;">⭐ Main</div>' : ''}<div class="opt-name">${i.name}</div><div class="opt-desc">${photoDesc}</div></div>`;
    }).join('')}</div></div>`;
  });
  html += `</div>`;

  // ── Sub-section 2: Supporting Elements (curated, shown after main is picked) ──
  if (mainEl) {
    const availableSubs = getB1SubElements(mainEl);
    const subItems = availableSubs.map(subId => {
      const acc = B1_ACCENT_ITEMS[subId];
      if (acc) return { id: subId, name: acc.name, photoDesc: acc.photoDesc };
      return null;
    }).filter(Boolean);

    html += `<div class="sub-section" style="margin-top:24px;"><div class="sub-section-header"><div class="sub-section-num">2</div><div class="sub-section-title">Scene Accents <span style="font-weight:400;color:var(--muted);">(optional, pick up to 2 small props)</span></div><div class="sub-section-tag">${subEls.length}/2</div></div>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Small background details that naturally belong in this scene.</div>`;
    if (subItems.length > 0) {
      html += `<div class="options-grid cols-4">${subItems.map(i => {
        const isSel = subEls.includes(i.id);
        const isMaxed = subEls.length >= 2 && !isSel;
        return `<div class="opt-card ${isSel ? 'selected' : ''}" onclick="${isMaxed ? '' : `toggleSubElement('${i.id}')`}" style="${isMaxed ? 'cursor:not-allowed;opacity:0.4;' : ''}"><div class="opt-name">${i.name}</div><div class="opt-desc">${i.photoDesc}</div></div>`;
      }).join('')}</div>`;
    }
    html += `</div>`;
  }

  // Scene composition summary
  if (STATE.sceneElements.length >= 1) {
    const selItems = STATE.sceneElements.map((id, idx) => {
      for (const cat of ILLUS_CATS) { const item = cat.items.find(i => i.id === id); if (item) return { ...item, role: idx === 0 ? 'Main' : 'Accent' }; }
      for (const cat of SUVICHAR_ILLUS_CATS) { const item = cat.items.find(i => i.id === id); if (item) return { ...item, role: idx === 0 ? 'Main' : 'Accent' }; }
      for (const cat of BIRTHDAY_ILLUS_CATS) { const item = cat.items.find(i => i.id === id); if (item) return { ...item, role: idx === 0 ? 'Main' : 'Accent' }; }
      const acc = B1_ACCENT_ITEMS[id];
      if (acc) return { id, name: acc.name, role: 'Accent' };
      return null;
    }).filter(Boolean);
    html += `<div style="margin-top:18px;padding:12px 16px;background:#F0F9FF;border:1px solid #BFDBFE;border-radius:10px;"><div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;">Scene Composition</div><div style="display:flex;flex-wrap:wrap;gap:8px;">${selItems.map((item, idx) => `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:${idx===0 ? 'var(--primary)' : '#E2E8F0'};color:${idx===0 ? '#fff' : '#334155'};font-size:12px;font-weight:600;"><span>${idx===0 ? '⭐' : '○'}</span>${item.name}</div>`).join('')}</div></div>`;
  }

  return html;
}

function renderB1Mood() {
  // Show track-specific suggestion if track is selected
  const trackSuggestions = {
    A: ['MD-1', 'MD-3'],  // Shiny Maximal → Golden Warm, Bright & Vivid
    B: ['MD-2', 'MD-5'],  // Modern Desi → Misty Soft, Vintage Film
    C: ['MD-6', 'MD-2'],  // Minimalist Classy → Soft Pastel, Misty Soft
    D: ['MD-3', 'MD-1'],  // Artsy Playful → Bright & Vivid, Golden Warm
    E: ['MD-6', 'MD-1'],  // Soft & Warm → Soft Pastel, Golden Warm
  };
  const suggested = STATE.track ? (trackSuggestions[STATE.track] || []) : [];
  const trackName = STATE.track ? TRACKS.find(t => t.id === STATE.track)?.name : '';

  let html = `<div class="step-header"><div class="step-eyebrow">Step 6 · Mood</div><div class="step-title">Lighting & Colour Mood</div><div class="step-desc">Sets the atmosphere of the photograph — both the lighting and colour treatment in one pick.</div></div>`;

  if (suggested.length > 0) {
    html += `<div style="background:#F0F9FF;border:1px solid #BFDBFE;padding:10px 16px;border-radius:10px;margin-bottom:18px;font-size:12px;color:var(--primary);"><strong>💡 Suggested for ${trackName}:</strong> ${suggested.map(id => B1_MOOD_OPTIONS.find(m => m.id === id)?.name).filter(Boolean).join(' or ')}</div>`;
  }

  html += `<div class="options-grid cols-3">${B1_MOOD_OPTIONS.map(m => {
    const isSuggested = suggested.includes(m.id);
    const isSelected = STATE.mood === m.id;
    const dimStyle = (!isSuggested && !isSelected) ? 'opacity:0.5;' : '';
    return `<div class="opt-card ${isSelected ? 'selected' : ''} ${isSuggested ? 'recommended' : ''}" onclick="select('mood','${m.id}')" style="${dimStyle}"><div class="opt-name">${m.name}</div><div class="opt-desc">${m.desc}</div></div>`;
  }).join('')}</div>`;

  return html;
}

function render() {
  renderProgress();

  const stepId = getCurrentStepId();
  let content = '';

  const isB1 = STATE.archetype === 'B1';
  switch (stepId) {
    case 'template': content = renderStep1(); break;
    case 'feeling': content = renderFeelingStep(); break;
    case 'style': content = renderStep2(); break;
    case 'layout': content = renderStep3(); break;
    case 'b1_text_placement': content = renderB1TextPlacement(); break;
    case 'track': content = renderStep4(); break;
    case 'colour_finish': content = renderStepColourFinish(); break;
    case 'visual': content = renderStep8(); break;
    case 'intensity': content = isB1 ? renderB1Intensity() : renderStep9(); break;
    case 'custom_text': content = renderCustomTextStep(); break;
    // font_text step removed
    // B1 Photo Background specific steps
    case 'scene_elements': content = renderB1SceneElements(); break;
    case 'mood': content = renderB1Mood(); break;
  }

  const steps = getSteps();
  const isLast = STATE.step >= steps.length;

  content += `<div class="nav-row"><button class="btn btn-secondary" onclick="STATE.step=Math.max(1,STATE.step-1);render();" ${STATE.step === 1 ? 'disabled' : ''}>← Back</button><div>${STATE.step} / ${steps.length}</div><button class="btn btn-primary" onclick="STATE.step=Math.min(${steps.length},STATE.step+1);render();" ${!canProceed() || isLast ? 'disabled' : ''}>Next →</button>${isLast ? '<button class="btn btn-generate" onclick="generatePrompts();">Generate Prompts</button>' : ''}</div>`;

  document.getElementById('app').innerHTML = content;
  document.getElementById('textInput')?.focus();
}

function buildSubjectLine() {
  const track = getTrack();
  const palette = getPalette();
  const layout = getLayout();

  const trackName = track.name;
  const paletteName = palette.name;
  const layoutName = layout.name;

  return `${getCategoryLabel()} Poster — ${trackName} · ${paletteName} · ${layoutName}`;
}

function buildNegatives() {
  const palette = getPalette();
  const roles = palette.roles || {};
  const track = STATE.track;
  const illusRender = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;

  let negs = ['text', 'letters', 'words', 'numbers', 'typography', 'watermarks', 'logos', 'blurry', 'low quality'];

  if (track === 'A') negs.push('photorealistic', 'cinematic lighting', 'landscape background', 'minimalism', 'flat modern', 'grunge', 'grayscale');
  if (track === 'B') negs.push('Bollywood', 'maximalist', 'gold foil', 'sparkle', 'metallic', 'loud colours');
  if (track === 'C') negs.push('photorealistic', 'ornate', 'gold foil', 'busy', 'multiple illustrations', 'vivid', 'gradient', 'doodles');
  if (track === 'D') negs.push('photorealism', 'cinematic', 'ornate', 'gold', 'film grain', 'muted', 'serif');
  if (track === 'E') negs.push('harsh', 'neon', 'loud', 'metallic', 'glitter', 'sparkle', 'ornate heavy decoration', 'bold thick outlines');

  if (roles.banColour) {
    negs.push(`${roles.banColour} illustration`, `${roles.banColour} subject`, 'monochrome single-colour');
  }
  if (illusRender && illusRender.id === 'IR-1') {
    negs.push('illustration hidden behind decoration', 'illustration merged with ornamental pattern');
  } else if (STATE.illusItem && STATE.illusItem !== 'NONE' && STATE.motifSet) {
    negs.push('illustration hidden behind decoration', 'motif overlapping illustration');
    if (STATE.archetype === 'A1') {
      negs.push('motif near illustration', 'motif beside illustration', 'motif around illustration');
    } else if (STATE.archetype === 'A2') {
      negs.push('motif on border edges', 'motif on frame');
    }
  }

  // Prevent illustration render style from bleeding into border/frame
  if (illusRender && STATE.illusItem && STATE.illusItem !== 'NONE') {
    negs.push('border style matching illustration style', 'frame affected by illustration rendering');
  }

  // Category-specific negatives (Birthday: keep tone celebratory, never mournful)
  if (STATE.category === 'birthday') {
    negs.push('funeral', 'mourning', 'sad', 'wilted', 'dark mood', 'horror');
  }
  // CATEGORY_PACK negatives (Rath Yatra, Vat Savitri, Father's Day, Shivji, Ganeshji, Jesus, Islamic)
  const pack = getCategoryPack();
  if (pack) negs.push(...pack.negatives);

  return negs;
}

function getStep2Option() {
  if (!STATE.step2) return null;
  // Use overlay-aware list so any overlay-unlocked frames resolve correctly.
  const opts = getStep2Options();
  return opts.find(o => o.id === STATE.step2);
}

function getIllusSizeLabel() {
  if (!STATE.illusSize) return null;
  return ILLUS_SIZE_OPTS.find(o => o.id === STATE.illusSize);
}

function gatherPromptData() {
  const arch = getArchetype();
  const step2Opt = getStep2Option();
  const layout = getLayout();
  const track = getTrack();
  const palette = getPalette();
  const font = getFont();
  const finish = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
  const illusRender = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
  const motif = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
  const preset = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
  const illusItem = getIllusItem();
  const illusSize = getIllusSizeLabel();
  const roles = palette.roles || {};

  // Size phrase
  let sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
  if (illusSize) {
    if (illusSize.id === 'Small') sizePh = 'small accent illustration under 15 percent of canvas';
    if (illusSize.id === 'Medium') sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
    if (illusSize.id === 'Large') sizePh = 'large hero illustration occupying 50 percent or more of canvas';
  }

  // Frame phrase (A1)
  let framePh = '';
  if (arch.id === 'A1' && step2Opt) {
    const deco = STATE.frameDecoration || 'Simple';
    let frameShape = '';
    if (step2Opt.id === 'F1') frameShape = 'rectangular decorative border frame on all four edges';
    else if (step2Opt.id === 'F2') frameShape = 'decorative bands at top and bottom edges only with open sides';
    else if (step2Opt.id === 'F3') frameShape = 'single decorative band at the bottom edge';
    else if (step2Opt.id === 'F4') frameShape = 'ornamental corner accents at all four corners';
    else if (step2Opt.id === 'F5') frameShape = 'curved arch canopy frame at top with side patches';
    else frameShape = 'decorative border frame';

    let decoPh = 'with subtle motifs at corners';
    if (deco === 'Plain') decoPh = 'with clean simple border lines only no motifs no ornamentation';
    if (deco === 'Detailed') decoPh = 'with rich ornate florals paisleys and mandalas throughout every edge of the frame';

    const frameCol = roles.frame || 'golden metallic';
    framePh = `${frameShape} rendered in ${frameCol} ${decoPh}`;
  }

  // Overlay phrase (B1)
  let overlayPh = '';
  if (arch.id === 'B1' && step2Opt) {
    overlayPh = step2Opt.desc.toLowerCase();
  }

  // Density phrase (A2 only) — auto-determined from sub-element count.
  // A1 also exposes the accent picker but density there is governed by frame decoration,
  // so densityPh stays empty for A1.
  let densityPh = '';
  let a2AccentPh = '';
  if (arch.id === 'A2') {
    const subCount = (STATE.a2SubElements || []).length;
    if (subCount === 0) densityPh = '1–2 key illustration elements, lots of breathing space, clean airy composition';
    else if (subCount === 1) densityPh = '3–4 illustration elements, balanced and warm composition';
    else densityPh = '5–6 elements, rich festive vibrant scene';
  }
  // Accent description phrases — built for both A1 and A2 (B1 uses its own sceneElements path).
  if (arch.id === 'A1' || arch.id === 'A2') {
    const accPhrases = (STATE.a2SubElements || []).map(id => {
      const acc = ACCENT_ITEMS[id];
      return acc ? acc.illusDesc : '';
    }).filter(Boolean);
    if (accPhrases.length > 0) a2AccentPh = accPhrases.join(', ');
  }

  // Layout text zone + illustration position phrases
  // (Updated for the bottom-20% personalization safe zone — see SAFE_ZONE_DESC near the
  // top of the script. Hero text and main illustration are clamped above the bottom 20%;
  // BG/frame/accents may extend into the zone.)
  let textZonePh = '';
  let illusPositionPh = '';
  if (layout.id === 'L1') {
    textZonePh = 'text overlay zone in the upper 25 percent of the canvas with no decorative elements in this area';
    illusPositionPh = 'positioned in the centre band of the canvas below the text area, with the main subject staying above the bottom 20 percent personalization safe zone';
  } else if (layout.id === 'L2') {
    textZonePh = 'text overlay centred at roughly 40 to 50 percent from the top of the canvas with semi-transparent breathing space behind it, never overlapping the bottom 20 percent personalization safe zone';
    illusPositionPh = 'positioned centrally on the canvas behind the text overlay, main subject above the bottom 20 percent personalization safe zone';
  } else if (layout.id === 'L3') {
    textZonePh = 'left column reserved for text overlay, text stays above the bottom 20 percent personalization safe zone, right column anchors the visual';
    illusPositionPh = 'positioned on the right half of the canvas anchoring the visual weight, main subject above the bottom 20 percent personalization safe zone';
  } else if (layout.id === 'L4') {
    textZonePh = 'right column reserved for text overlay, text stays above the bottom 20 percent personalization safe zone, left column anchors the visual';
    illusPositionPh = 'positioned on the left half of the canvas anchoring the visual weight, main subject above the bottom 20 percent personalization safe zone';
  } else if (layout.id === 'L5') {
    textZonePh = 'text overlay zone in the band between 60 and 80 percent from the top of the canvas with no decorative elements in this band, leaving the bottom 20 percent clean as a personalization safe zone';
    illusPositionPh = 'positioned in the upper 60 percent of the canvas above the text band';
  } else if (layout.id === 'L6') {
    // L6 uses a reduced 10% safe zone so the small corner accent can sit at any of the four
    // corners (including the bottom corners) — see SAFE_ZONE_DESC_L6 / getSafeZoneDesc().
    textZonePh = 'text occupies the central 60 percent of the canvas as the dominant element, kept above the bottom 10 percent reduced personalization safe zone';
    illusPositionPh = 'placed as a small decorative accent at any of the four corners of the canvas (upper-left, upper-right, lower-left, or lower-right), tucked tight against the corner, kept clear of the central text and clear of the bottom 10 percent reduced personalization safe zone';
  }

  // Colour phrases
  let bgPh = roles.canvas || palette.tracks[STATE.track]?.natural || 'colourful background';
  let illusColPh = roles.illus || 'contrasting colours';
  let textColPh = roles.textCol || 'high-contrast text colour';

  // Motif phrase — archetype-aware placement
  let motifPh = '';
  let motifPhFirefly = ''; // compact version for Firefly prompts
  if (motif && !(arch.id === 'A1' && STATE.frameDecoration === 'Plain')) {
    if (arch.id === 'A1') {
      // A1: motif is STRICTLY on the border frame only — never near or around the illustration
      motifPh = `${motif.promptPhrase} placed ONLY on the decorative border frame edges, the motif must NOT appear near, around, or beside the illustration — keep the illustration zone completely free of motif elements`;
      motifPhFirefly = `Motif: ${motif.name} on border frame edges only, completely separated from illustration.`;
    } else {
      // A2: motif fills around the illustration or across the overall graphic — NOT on border edges
      motifPh = `${motif.promptPhrase} scattered around and near the illustration as decorative accents filling the composition, the motif appears around the illustration and across the graphic area, NOT placed on border edges`;
      motifPhFirefly = `Motif: ${motif.name} scattered around the illustration as decorative accents, not on borders.`;
    }
  }

  // Rendering phrase with colour reinforcement for IR-2
  let renderPh = illusRender ? illusRender.promptPhrase : 'clean vector illustration';
  if (illusRender && illusRender.id === 'IR-2' && roles.banColour) {
    renderPh += `, using only the palette illustration colours not the ${roles.banColour} background colour`;
  }

  // Ornamental protection phrase (IR-1 only: keeps illustration distinct from ornamental rendering)
  let ornamentalGuard = '';
  if (illusRender && illusRender.id === 'IR-1' && illusItem) {
    ornamentalGuard = `the ${illusItem.name} must remain clearly visible as the central subject distinct from surrounding ornamentation, decorative elements frame the illustration but do not overlap or obscure it`;
  }

  // Motif boundary enforcement — archetype-specific
  let motifBoundary = '';
  if (motifPh && illusItem) {
    if (arch.id === 'A1') {
      // A1: motif stays strictly on border frame, away from illustration
      motifBoundary = `${motif.name} motif pattern stays ONLY on the border frame edges — it must not appear near, beside, or around the ${illusItem.name} illustration`;
    } else {
      // A2: motif floats around illustration but doesn't overlap it
      motifBoundary = `${motif.name} motif accents appear around the composition near the ${illusItem.name} but do not overlap or obscure it`;
    }
    if (ornamentalGuard) {
      ornamentalGuard += `, ${motifBoundary}`;
    }
  }

  // Track style phrase
  let stylePh = '';
  if (track.id === 'A') stylePh = 'ornate festive Indian greeting poster, Indian wedding card energy, traditional ornamental art, gold accents, sparkle particles, 8K ultra-detailed high detail';
  if (track.id === 'B') stylePh = 'contemporary Indian editorial illustration, Scroll.in aesthetic, warm earthy restraint, handcrafted feel, high resolution';
  if (track.id === 'C') stylePh = 'minimal elegant premium Indian poster, Muji Aesop packaging zen aesthetic, tonal refinement, typography dominant, generous empty space';
  if (track.id === 'D') stylePh = 'cheerful bright playful illustration, WhatsApp sticker energy, Alicia Souza Chumbak aesthetic, thick outlines, vibrant flat colours';
  if (track.id === 'E') stylePh = `soft warm gentle ${getCategoryAtmosphere().stylePhMoodWord} poster, calming pastel botanical aesthetic, hand-painted greeting card feel, organic soft forms, generous breathing space, serene and inviting`;

  // Preset intensity phrase
  let intensityPh = preset ? preset.promptPhrase : 'balanced composition';

  // Overlay prompt additions (atmosphere + mood appended; negatives + guard merged into builders)
  const ov = getActiveOverlay();
  const overlayAtm = ov ? ov.prompt.atmosphere : '';
  const overlayMood = ov ? ov.prompt.mood : '';
  const overlayNegs = ov ? ov.prompt.negatives : [];
  const overlayFireflyAtm = ov ? ov.prompt.fireflyAtm : '';
  const overlayFireflyNegGuard = ov ? ov.prompt.fireflyNegGuard : '';

  return { arch, step2Opt, layout, track, palette, font, finish, illusRender, motif, preset, illusItem, illusSize, roles, sizePh, framePh, overlayPh, densityPh, a2AccentPh, textZonePh, illusPositionPh, bgPh, illusColPh, textColPh, motifPh, motifPhFirefly, renderPh, ornamentalGuard, motifBoundary, stylePh, intensityPh, overlay: ov, overlayAtm, overlayMood, overlayNegs, overlayFireflyAtm, overlayFireflyNegGuard };
}

function buildPrompt(platform) {
  if (STATE.archetype === 'B1') {
    const d = gatherB1PromptData();
    if (platform === 'Midjourney') return buildB1MJPrompt(d);
    if (platform === 'Leonardo.AI') return buildB1LeonardoPrompt(d);
    if (platform === 'Firefly (With Text)') return buildB1FireflyWithTextPrompt(d);
    if (platform === 'Firefly (No Text)') return buildB1FireflyNoTextPrompt(d);
    return buildB1GeminiPrompt(d);
  }
  const d = gatherPromptData();
  if (platform === 'Midjourney') return buildMJPrompt(d);
  if (platform === 'Leonardo.AI') return buildLeonardoPrompt(d);
  if (platform === 'Firefly (With Text)') return buildFireflyWithTextPrompt(d);
  if (platform === 'Firefly (No Text)') return buildFireflyNoTextPrompt(d);
  return buildGeminiPrompt(d);
}

// ═══════════════════════════════════════════════════════════════
// B1 PHOTO BACKGROUND — Prompt Data & Builders
// ═══════════════════════════════════════════════════════════════

function gatherB1PromptData() {
  const step2Opt = getStep2Option(); // overlay
  const layout = getLayout();
  const track = getTrack();
  const font = getFont();
  const photoTrack = B1_PHOTO_TRACKS[STATE.track];
  const mood = STATE.mood ? B1_MOOD_OPTIONS.find(m => m.id === STATE.mood) : null;
  const intensity = STATE.customPreset ? B1_INTENSITY_PRESETS.find(p => p.id === STATE.customPreset) : null;

  // Build scene description — first = main (foreground hero), rest = small accent props
  const sceneItems = STATE.sceneElements.map(id => {
    // Check main illustration catalogue first (GM + SV + BD)
    for (const cat of ILLUS_CATS) {
      const item = cat.items.find(i => i.id === id);
      if (item) return { ...item, photoDesc: getB1PhotoDesc(id) || item.desc };
    }
    for (const cat of SUVICHAR_ILLUS_CATS) {
      const item = cat.items.find(i => i.id === id);
      if (item) return { ...item, photoDesc: getB1PhotoDesc(id) || item.desc };
    }
    for (const cat of BIRTHDAY_ILLUS_CATS) {
      const item = cat.items.find(i => i.id === id);
      if (item) return { ...item, photoDesc: getB1PhotoDesc(id) || item.desc };
    }
    // CATEGORY_PACK native items (Rath Yatra etc.)
    const pack = getCategoryPack();
    if (pack) {
      for (const packCat of (pack.illusCats || [])) {
        const item = packCat.items.find(i => i.id === id);
        if (item) return { ...item, photoDesc: item.desc };
      }
    }
    // Check overlay illustrations
    const ov = getActiveOverlay();
    if (ov) {
      const ovItem = ov.illustrations.find(i => i.id === id);
      if (ovItem) return { id: ovItem.id, name: ovItem.name, photoDesc: getB1PhotoDesc(id) || ovItem.desc };
    }
    // Check accent items
    const acc = B1_ACCENT_ITEMS[id];
    if (acc) return { id, name: acc.name, photoDesc: acc.photoDesc };
    return null;
  }).filter(Boolean);

  let scenePh = '';
  if (sceneItems.length === 1) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground`;
  } else if (sceneItems.length === 2) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground, with ${sceneItems[1].photoDesc}`;
  } else if (sceneItems.length === 3) {
    scenePh = `${sceneItems[0].photoDesc} as the hero subject in the foreground, with ${sceneItems[1].photoDesc} and ${sceneItems[2].photoDesc}`;
  }

  // Overlay phrase — auto-determined from text position + strength
  let overlayPh = getB1AutoOverlay();

  // Layout text zone
  let textZonePh = '';
  // B1 text zones — text always stays above the bottom 20% personalization safe zone.
  // L5 text band sits at 60-80% from top so it doesn't enter the safe zone.
  if (layout.id === 'L1') textZonePh = 'text overlay zone at the top of the image';
  else if (layout.id === 'L2') textZonePh = 'text overlay zone centred at roughly 40 to 50 percent from the top of the image, kept above the bottom 20 percent personalization zone';
  else if (layout.id === 'L3') textZonePh = 'text overlay zone on the left half of the image, kept above the bottom 20 percent personalization zone';
  else if (layout.id === 'L4') textZonePh = 'text overlay zone on the right half of the image, kept above the bottom 20 percent personalization zone';
  else if (layout.id === 'L5') textZonePh = 'text overlay zone in the band between 60 and 80 percent from the top of the image, leaving the bottom 20 percent clean as a personalization zone';
  else if (layout.id === 'L6') textZonePh = 'text overlay zone centred at roughly 40 to 50 percent from the top, kept above the bottom 20 percent personalization zone';

  // B1 negatives
  let negs = ['text', 'letters', 'words', 'numbers', 'typography', 'illustration', 'cartoon', 'painting', 'drawing', 'sketch', 'vector', 'clipart', 'frame', 'border', 'decorative pattern', 'motif', 'ornamental', 'watermarks', 'logos', 'blurry', 'low quality', 'artificial', 'CGI', 'rendered'];
  if (STATE.track === 'A') negs.push('muted', 'desaturated', 'flat');
  if (STATE.track === 'B') negs.push('oversaturated', 'HDR', 'neon', 'vivid');
  if (STATE.track === 'C') negs.push('colorful', 'saturated', 'busy', 'cluttered');
  if (STATE.track === 'D') negs.push('dark', 'moody', 'desaturated', 'muted');
  // After E-track is appended below — apply category negatives last so they always land at the end of the list
  if (STATE.track === 'E') negs.push('harsh', 'high contrast', 'neon', 'sharp edges');
  if (STATE.category === 'birthday') {
    negs.push('funeral', 'mourning', 'sad', 'wilted', 'dark mood', 'horror', 'illustrated elements', 'graphic design', 'decorative overlay');
  }
  // CATEGORY_PACK B1 negatives — pack negatives + B1 illustration guards
  const _packB1 = getCategoryPack();
  if (_packB1) negs.push(..._packB1.negatives, 'illustrated elements', 'graphic design');

  // Overlay negatives appended last (overlay can only ADD negatives, never remove base/track ones)
  const ov = getActiveOverlay();
  if (ov) negs.push(...ov.prompt.negatives);

  const overlayStrength = STATE.overlayStrength || 'medium';
  const overlayAtm = ov ? ov.prompt.atmosphere : '';
  const overlayMood = ov ? ov.prompt.mood : '';
  const overlayB1Scene = ov ? ov.prompt.b1Scene : '';
  const overlayFireflyAtm = ov ? ov.prompt.fireflyAtm : '';
  const overlayFireflyMood = ov ? ov.prompt.fireflyMood : '';
  const overlayFireflyB1Scene = ov ? ov.prompt.fireflyB1Scene : '';

  return { step2Opt, layout, track, font, photoTrack, mood, intensity, sceneItems, scenePh, overlayPh, textZonePh, negs, overlayStrength,
           overlay: ov, overlayAtm, overlayMood, overlayB1Scene, overlayFireflyAtm, overlayFireflyMood, overlayFireflyB1Scene };
}

function buildB1MJPrompt(d) {
  const parts = [];
  const atm = getCategoryAtmosphere();

  // Core: photorealistic photograph
  const atmInline = d.overlayAtm ? `${atm.atmosphereInline}, ${d.overlayAtm}` : atm.atmosphereInline;
  parts.push(`photorealistic photograph, full-bleed image filling the entire canvas, ${atmInline}`);

  // Scene elements (main subject first, supporting after) + overlay scene context
  const scene = d.overlayB1Scene ? `${d.scenePh}, ${d.overlayB1Scene}` : d.scenePh;
  parts.push(scene);

  // Mood (merged lighting + colour treatment) + overlay mood
  if (d.mood) {
    const mood = d.overlayMood ? `${d.mood.promptPhrase}, ${d.overlayMood}` : d.mood.promptPhrase;
    parts.push(mood);
  } else if (d.overlayMood) {
    parts.push(d.overlayMood);
  }

  // Photography aesthetic (Track)
  parts.push(d.photoTrack.promptPhrase);

  // Intensity (camera distance + depth of field)
  if (d.intensity) parts.push(d.intensity.promptPhrase);

  // Colour temperature & atmosphere
  const warmthMap = { 'MD-1': 'warm colour temperature 4500K', 'MD-2': 'neutral colour temperature 5500K', 'MD-3': 'daylight white balance 5600K', 'MD-4': 'warm dramatic colour temperature 4200K', 'MD-5': 'warm analog colour temperature 4800K', 'MD-6': 'cool colour temperature 6200K' };
  if (d.mood && warmthMap[d.mood.id]) parts.push(warmthMap[d.mood.id]);

  // Layout text zone
  parts.push(d.textZonePh);

  // Overlay with strength
  if (d.overlayPh) parts.push(d.overlayPh);

  // Personalization safe zone (bottom 20%) — photo soft-fades, main subject above this band.
  parts.push(SAFE_ZONE_DESC_B1);

  // Technical quality
  parts.push('9:16 portrait format, professional DSLR photography, sharp focus on subject, high dynamic range, natural bokeh where appropriate');

  const mainPrompt = parts.filter(p => p).join(', ');
  const negs = d.negs.join(', ');
  return `${mainPrompt} --ar 9:16 --s 250 --no ${negs}`;
}

function buildB1LeonardoPrompt(d) {
  const lines = [];
  const atm = getCategoryAtmosphere();
  const atmSentence = d.overlayAtm ? `${atm.atmosphereSentenceCase}, ${d.overlayAtm}` : atm.atmosphereSentenceCase;
  lines.push(`Photorealistic ${d.photoTrack.name} photograph, ${getCategoryLabel()} poster, 9:16 vertical (1080x1920). Full-bleed photo, no frames, no borders, no illustration. ${atmSentence}.`);
  const scene = d.overlayB1Scene ? `${d.scenePh}, ${d.overlayB1Scene}` : d.scenePh;
  lines.push(`Scene: ${scene}.`);
  if (d.mood) {
    const mood = d.overlayMood ? `${d.mood.promptPhrase}, ${d.overlayMood}` : d.mood.promptPhrase;
    lines.push(`Mood: ${mood}.`);
  } else if (d.overlayMood) {
    lines.push(`Mood: ${d.overlayMood}.`);
  }
  lines.push(`Aesthetic: ${d.photoTrack.promptPhrase}.`);
  if (d.intensity) lines.push(`Camera: ${d.intensity.promptPhrase}.`);
  // Overlay with strength context + adaptive text colour (Heavy → white; Light → track-tuned)
  const strengthWord = d.overlayStrength === 'heavy' ? 'strong dark' : 'subtle light';
  const txtColour = getB1TextColour();
  lines.push(`Text zone: ${d.textZonePh}. Overlay: ${strengthWord} ${d.overlayPh}. Keep this area readable for ${txtColour.desc} text overlay.`);
  // Personalization safe zone — bottom 20% reserved
  lines.push(`Safe zone: ${SAFE_ZONE_DESC_B1}.`);
  lines.push(`Quality: DSLR, sharp focus on subject, natural depth of field.`);
  const coreNegs = ['illustration', 'cartoon', 'painting', 'vector', 'frame', 'border', 'pattern', 'text', 'watermark', 'blurry', 'low quality', 'CGI'];
  if (STATE.category === 'birthday') {
    coreNegs.push('funeral', 'mourning', 'sad', 'wilted', 'dark mood', 'horror');
  }
  if (d.overlay && d.overlay.prompt.negatives.length) coreNegs.push(...d.overlay.prompt.negatives);
  lines.push(`Negative: ${coreNegs.join(', ')}`);
  return lines.join('\n');
}

function buildB1FireflyWithTextPrompt(d) {
  // Firefly WITH TEXT for B1: hard cap ≤950 chars.
  const parts = [];
  const atm = getCategoryAtmosphere();
  // Header: base atmosphere + compact overlay atmosphere (≤50 chars per spec)
  const atmH = d.overlayFireflyAtm ? `${atm.atmosphereInline}, ${trunc(d.overlayFireflyAtm, 50)}` : atm.atmosphereInline;
  parts.push(`Photorealistic ${d.photoTrack.name} ${getCategoryLabel()} poster, 9:16 vertical, full-bleed photograph, ${atmH}.`);

function buildLeonardoNegatives(d) {

// Helper: strip hex codes like (#FF8C1A) from strings to save chars
function stripHex(s) { return s.replace(/\s*\(#[A-Fa-f0-9]{3,8}\)/g, ''); }
// Helper: truncate to max chars at last comma
function trunc(s, max) { if (s.length <= max) return s; return s.substring(0, max).replace(/,\s*[^,]*$/, ''); }

// Returns the Firefly-compact text-zone + illustration-zone descriptors keyed by layout ID.
// Replaces the previous fragile `d.textZonePh.includes(...)` cascade which silently broke for L3,
// L4, and L5 after the v2 safe-zone phrasing update — both L3 and L4 layout phrases name BOTH
// sides ("left column ... right column anchors"), so the cascade short-circuited on `'left'` for
// both layouts; L5's new "between 60 and 80 percent from the top" phrase contains none of the
// upper/lower/left/right keywords so it fell through to `'centre'`. Explicit per-layout dispatch
// keeps the compact form correct independent of any future layout-phrase rewrites.
function compactLayoutPhFirefly(layoutId) {
  const map = {
    'L1': { textZone: 'upper 25%',            illusZone: 'centre band below text, above safe zone' },
    'L2': { textZone: 'centred mid-canvas',   illusZone: 'centred behind text, above safe zone' },
    'L3': { textZone: 'left column',          illusZone: 'right side anchor, above safe zone' },
    'L4': { textZone: 'right column',         illusZone: 'left side anchor, above safe zone' },
    'L5': { textZone: 'lower band 60-80%',    illusZone: 'upper 60% above text band' },
    'L6': { textZone: 'central 60% (framed)', illusZone: 'small accent at any of the four corners, above the reduced 10% safe zone' },
  };
  return map[layoutId] || { textZone: 'centre', illusZone: 'opposite area' };
}

function buildFireflyWithTextPrompt(d) {

  if (d.densityPh) parts.push(`${trunc(d.densityPh, 40)}.`);
  // Layout: compact (per-layout dispatch — see compactLayoutPhFirefly above for why this
  // replaced the previous string-match cascade).
  {
    const lay = compactLayoutPhFirefly(d.layout.id);
    parts.push(`Text zone: ${lay.textZone}. Illustration: ${lay.illusZone}.`);
  }
  if (d.illusItem) {
    let render = trunc(stripHex(d.renderPh), 60);
    let col = stripHex(d.illusColPh);

  if (d.a2AccentPh) parts.push(`Accents: ${trunc(d.a2AccentPh, 60)}, same style.`);
  parts.push(`${trunc(d.intensityPh, 60)}.`);
  parts.push(`${trunc(d.stylePh, 60)}.`);
  if (d.track.id === 'A') parts.push('Sparkle particles.');
  // Overlay compact atmosphere — bounded ≤50 chars per Section 6.4 of overlay spec
  if (d.overlayFireflyAtm) parts.push(`${trunc(d.overlayFireflyAtm, 50)}.`);
  // Bottom safe zone (compact, layout-aware: 20% standard, 10% for L6)
  parts.push(getSafeZoneFireflyAB(d.layout.id));

  let result = parts.join(' ');
  if (result.length > 950) result = result.substring(0, 950).replace(/\s+\S*$/, '');
  return result;
