function buildGeminiPrompt(d) {
  // Gemini: verbose structured descriptive sentences — each section maps to a wizard step
  const lines = [];

  // Header
  lines.push(`A ${d.track.name} style ${getCategoryLabel()} greeting poster in vertical 9:16 format.`);

  // [Step 5: Colour & Finish]
  let scene = `Background & Finish: ${d.bgPh}`;
  if (d.finish) scene += ` with ${d.finish.promptPhrase}`;
  scene += '.';
  lines.push(`\n${scene}`);

  // [Step 1 + 2: Template + Style]
  if (d.framePh) {
    lines.push(`\nFrame (${d.step2Opt.name}): A ${d.framePh} encloses the composition. The frame is purely decorative and does not cover the main illustration. The frame maintains its own consistent style independent of illustration rendering.`);
  }
  if (d.overlayPh) lines.push(`\nOverlay (${d.step2Opt.name}): The photograph has ${d.overlayPh}.`);
  if (d.densityPh) lines.push(`\nDensity: The composition has ${d.densityPh}.`);

  // [Step 3: Layout]
  lines.push(`\nLayout (${d.layout.name}): ${d.textZonePh}. Illustration ${d.illusPositionPh}.`);

  // [Step 6: Visual — Illustration + Render + Size + Motif + Guards]
  if (d.illusItem) {
    lines.push(`\nIllustration: ${d.illusItem.name} — ${d.illusItem.desc}.`);
    lines.push(`Render style (illustration only): ${d.renderPh}. Coloured in ${d.illusColPh}. The rendering style applies only to this illustration, not to the frame or background.`);
    lines.push(`Size: ${d.sizePh}.`);
    if (d.ornamentalGuard) lines.push(`Visibility: The illustration must be clearly visible — ${d.ornamentalGuard}.`);
    else if (d.motifBoundary) lines.push(`Visibility: The ${d.illusItem.name} must be clearly visible — ${d.motifBoundary}.`);
  }
  if (d.motifPh) {
    if (d.arch.id === 'A1') {
      lines.push(`\nMotif: ${d.motifPh}. The motif must appear ONLY on the border frame edges and must NOT appear near, beside, or around the illustration.`);
    } else {
      lines.push(`\nMotif: ${d.motifPh}. The motif accents are scattered around and near the illustration, filling the composition — they do NOT appear on the border edges.`);
    }
  }

  // A2 accent elements
  if (d.a2AccentPh) {
    lines.push(`\nAccent details: Small supporting elements nearby the main illustration — ${d.a2AccentPh}. These accents are rendered in the exact same illustration style as the main subject and serve as subtle scene-setting props.`);
  }

  // [Step 7: Intensity]
  lines.push(`\nDecoration intensity: ${d.intensityPh}.`);

  // [Track style]
  lines.push(`\nStyle reference: ${d.stylePh}.`);
  if (d.track.id === 'A') lines.push(`Small white sparkle particles are scattered across the design.`);

  // [Overlay] Atmosphere + mood layered after track style — Gemini has no char cap so use full keyword sets
  if (d.overlay) {
    lines.push(`\nOverlay flavour (${d.overlay.name}): The poster carries an additional ${d.overlay.name.toLowerCase()} atmosphere — ${d.overlayAtm}. The mood is ${d.overlayMood}.`);
  }

  // Personalization safe zone (bottom 20% standard, 10% for L6 corner-accent layout)
  lines.push(`\nPersonalization Safe Zone: ${getSafeZoneDesc(d.layout.id)}.`);

  // Do not include
  const negs = buildNegatives();
  if (d.overlayNegs && d.overlayNegs.length) negs.push(...d.overlayNegs);
  lines.push(`\nDo not include: ${negs.join(', ')}.`);

  return lines.join('\n');
}

  // Build audit data

    const mainEl = d.sceneItems.length >= 1 ? d.sceneItems[0].name : '—';
    const supportEls = d.sceneItems.slice(1).map(i => i.name).join(', ') || '—';

    const ovObj = getActiveOverlay();
    auditRows = [

// ─── Unique Code Generator ──────────────────────────────────────────────────
function generateUniqueCode() {
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const arch = STATE.archetype || '??';

  const PRESET_ABBR = {
    Basic: 'Ba', Medium: 'Me', Complex: 'Co',
    Minimal: 'Mn', Balanced: 'Bl', Expressive: 'Ex',
    Ultra: 'Ul', Warm: 'Wm', Simple: 'Si', Fun: 'Fn', Maximum: 'Mx', Rich: 'Ri',
  };

  function illusAbbr(name) {
    if (!name) return '??';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 4);
  }

  // Deterministic 3-char hash of the full set of IDs.
  // Different combos always produce different hashes; same combo always produces the same one.
  // This prevents the rare case where two illustrations abbreviate to identical letters.
  function comboHash(...ids) {
    const str = ids.filter(Boolean).join('|');
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return Math.abs(h).toString(36).slice(-3).toUpperCase();
  }

  const parts = [dd + mm];

  if (arch === 'A1') {
    parts.push('A1' + (STATE.step2 || '??'));
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    if (STATE.palette) parts.push(STATE.palette.replace('GM-C', 'C'));
    const illus = getIllusItem();
    parts.push(illusAbbr(illus ? illus.name : (STATE.illusItem === 'NONE' ? 'None' : null)));
    if (STATE.frameDecoration) parts.push({ Plain: 'Pl', Simple: 'Si', Detailed: 'Dt' }[STATE.frameDecoration] || STATE.frameDecoration[0]);
    if (STATE.illusSize) parts.push({ Small: 'Sm', Medium: 'Md', Large: 'Lg' }[STATE.illusSize] || STATE.illusSize[0]);
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.step2, STATE.track, STATE.layout, STATE.palette, STATE.illusItem, STATE.illusRender, STATE.motifSet, STATE.finish, STATE.frameDecoration, STATE.illusSize, STATE.customPreset));

  } else if (arch === 'A2') {
    parts.push('A2');
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    if (STATE.palette) parts.push(STATE.palette.replace('GM-C', 'C'));
    const illus = getIllusItem();
    parts.push(illusAbbr(illus ? illus.name : null));
    parts.push(STATE.a2SubElements.length + 'ac');
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.track, STATE.layout, STATE.palette, STATE.illusItem, STATE.illusRender, STATE.motifSet, STATE.finish, STATE.customPreset, ...STATE.a2SubElements));

  } else if (arch === 'B1') {
    parts.push('B1' + (STATE.step2 || '??'));
    parts.push(STATE.track || '?');
    parts.push(STATE.layout || '?');
    const d = gatherB1PromptData();
    if (d.sceneItems.length >= 1) parts.push(illusAbbr(d.sceneItems[0].name));
    if (STATE.mood) parts.push(STATE.mood.replace('MD-', 'M'));
    parts.push(STATE.overlayStrength === 'heavy' ? 'Hv' : 'Lt');
    if (STATE.customPreset) parts.push(PRESET_ABBR[STATE.customPreset] || STATE.customPreset.substring(0, 2));
    parts.push(comboHash(arch, STATE.step2, STATE.track, STATE.layout, STATE.mood, STATE.overlayStrength, STATE.customPreset, ...STATE.sceneElements));
  }

  return parts.join('-');
}

// ─── Compact AI Eval Prompt (model-agnostic, embeds generation prompt) ───────
function buildAIEvalPrompt() {
  const arch = STATE.archetype || '';
  const isB1 = arch === 'B1';
  const trackObj = getTrack();
  const layoutObj = getLayout();
  const code = generateUniqueCode();

  // What was requested — short context for the evaluating AI
  let contextLines = [`Run Code: ${code}`, `Archetype: ${arch}`];
  if (trackObj) contextLines.push(`Track: ${trackObj.name}`);
  if (layoutObj) contextLines.push(`Layout: ${layoutObj.id} — ${layoutObj.name}`);
  if (isB1) {
    const d = gatherB1PromptData();
    if (d.sceneItems.length >= 1) contextLines.push(`Main Subject: ${d.sceneItems[0].name}`);

  // Embed the Firefly (with text) prompt as primary — it's the most compact & human-readable

  const primaryPrompt = (GENERATED_PROMPTS[0] || '').trim();

  return `I used the following prompt to generate the attached poster background image. Please evaluate how accurately the image follows these instructions.

CONTEXT
${contextLines.map(l => '• ' + l).join('\n')}

GENERATION PROMPT USED (Firefly — swap with your platform prompt if different):
───────────────────────────────────────────────────────────
${primaryPrompt}
───────────────────────────────────────────────────────────

EVALUATE THE ATTACHED IMAGE — rate each dimension 1–5:
1. Main subject accuracy — is the illustration / subject clearly present and correctly rendered? __/5
2. Style & aesthetic — does it match the intended track (${trackObj ? trackObj.name : '—'})? __/5
3. Composition & text zone — is the layout correct with a clear, uncluttered text area? __/5
4. Colour & mood — does the palette, lighting, and mood feel right? __/5
5. Overall quality — clean, no artifacts, production-ready? __/5

Overall prompt-following score (1–5): ___
Top issue (one sentence): ___
Would a real Indian WhatsApp user share this as a Good Morning greeting? (Yes / Maybe / No): ___`;
}

    const overlayTypeDesc = {
      O1: 'Uniform dark overlay across entire image',
      O2: 'Gradient — darker toward the top, brighter toward the bottom',
      O3: 'Gradient — darker toward the bottom, brighter toward the top',
      O4: 'Vignette — bright centre, darkened edges',
      O5: 'Caption bar — solid darkened strip at the footer',
    };

    selectionsText = `• Archetype: B1 — Full Photo Background (photorealistic photography, not illustrated)
• Overlay Type: ${step2Opt ? step2Opt.id + ' ' + step2Opt.name : '—'} — ${overlayTypeDesc[STATE.step2] || ''}
• Layout: ${STATE.layout || '—'} — ${layoutDesc[STATE.layout] || ''}
• Track: ${STATE.track || '—'} — ${photoTrack.name || ''} (${photoTrack.desc || ''})
• Main Scene Element: ${mainName}
• Supporting Elements: ${supportingNames}
• Mood / Lighting: ${moodOpt ? moodOpt.name + ' — ' + moodOpt.desc : '—'}
• Overlay Strength: ${STATE.overlayStrength === 'heavy' ? 'Heavy (opaque, strong contrast)' : 'Light (subtle, semi-transparent)'}
• Intensity / Camera: ${intOpt ? intOpt.name + ' — ' + intOpt.desc : '—'}`;

    const textZoneDescB1 = {
      L1: 'The upper portion must appear darker/suitable for white text overlay.',
      L2: 'The central zone must be readable for text overlay.',
      L3: 'The left column must appear suitable for text overlay.',
      L4: 'The right column must appear suitable for text overlay.',
      L5: 'The lower portion must appear darker/suitable for white text overlay.',
      L6: 'The central zone must be readable for text overlay.',
    };

    checks = [
      `MAIN SUBJECT — Is "${mainName}" clearly visible as the main subject? Is it photorealistic (not illustrated/cartoon)?`,
      `SUPPORTING ELEMENTS — ${supportingNames !== 'None' ? `Are the supporting elements (${supportingNames}) present as background/contextual props?` : 'No supporting elements selected — is the composition focused on the main subject alone?'}`,
      `OVERLAY & TEXT ZONE — ${textZoneDescB1[STATE.layout] || 'Is there a clear text-readable zone?'} Overlay type: ${overlayTypeDesc[STATE.step2] || ''}. Strength: ${STATE.overlayStrength}.`,
      `PHOTOGRAPHY STYLE — Does it look like "${photoTrack.name || ''}"? (${photoTrack.desc || ''})`,
      `MOOD & LIGHTING — Does the lighting + colour treatment match "${moodOpt ? moodOpt.name : '—'}"? (${moodOpt ? moodOpt.desc : ''})`,
      `CAMERA / FRAMING — Does the framing match "${intOpt ? intOpt.name : '—'}"? (${intOpt ? intOpt.desc : ''})`,
      `PHOTO QUALITY — Does it look like a professional DSLR photograph with natural depth of field? No CGI, no illustration, no cartoon elements.`,
      `NO AI-GENERATED TEXT — Is there any AI-rendered text or lettering visible in the image? (There should be none.)`,
    ];
  }

  const checksText = checks.map((c, i) => `${i + 1}. ${c}`).join('\n');

  const prompt = `${header}${selectionsText}

✅ EVALUATION CHECKLIST
For each item below, respond: ✅ Pass | ⚠️ Partial (briefly explain) | ❌ Fail (briefly explain)

${checksText}

📊 AFTER COMPLETING THE CHECKLIST, PROVIDE:
• Dimension Scores (1–5 each):
  – Illustration / Subject Quality: __/5
  – Composition & Layout Clarity: __/5
  – Track Style Match: __/5
  – Colour Harmony: __/5
  – Text Zone Readability: __/5
• Would a real Indian WhatsApp user share this as a Good Morning greeting? (Yes / Maybe / No)
• Top issue (if any, in one sentence):

Upload the generated image alongside this prompt in Google Gemini / your AI model.`;

  return prompt;
}

function copyGeminiEvalPrompt(btn) {
  const prompt = buildGeminiEvalPrompt();
  navigator.clipboard.writeText(prompt).then(() => {
    btn.textContent = '✓ Gemini Prompt Copied!';
    setTimeout(() => { btn.textContent = '🤖 Copy Gemini Eval Prompt'; }, 3000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Gemini Prompt Copied!';
    setTimeout(() => { btn.textContent = '🤖 Copy Gemini Eval Prompt'; }, 3000);
  });
}

function exportEvalRow(btn) {
  const isB1 = STATE.archetype === 'B1';
  const runId = generateUniqueCode();
  const timestamp = new Date().toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' });
  const archetype = STATE.archetype || '';
  const step2Opt = getStep2Option();
  const overlay = isB1 ? ((STATE.overlayStrength || 'medium') + ' (auto from ' + (getLayout() ? getLayout().name : '') + ')') : (step2Opt ? step2Opt.name : '');
  const layout = getLayout() ? getLayout().name : '';
  const trackObj = getTrack();
  const track = trackObj ? trackObj.name : '';

  let palette = '', bgFinish = '', illustration = '', renderStyle = '', frameDeco = '', motif = '';
  let sceneMain = '', sceneSupporting = '', mood = '', intensity = '', illusSize = '', a2Accents = '', overlayStrength = '';

  if (isB1) {
    const d = gatherB1PromptData();
    sceneMain = d.sceneItems.length >= 1 ? d.sceneItems[0].name : '';
    sceneSupporting = d.sceneItems.slice(1).map(i => i.name).join(', ');
    const moodOpt = STATE.mood ? B1_MOOD_OPTIONS.find(m => m.id === STATE.mood) : null;
    mood = moodOpt ? moodOpt.name : '';
    overlayStrength = STATE.overlayStrength === 'heavy' ? 'Heavy' : 'Light';
    const intOpt = STATE.customPreset ? B1_INTENSITY_PRESETS.find(p => p.id === STATE.customPreset) : null;
    intensity = intOpt ? intOpt.name : '';
  } else {
    const pal = getPalette();
    palette = pal ? pal.name : '';
    const finishOpt = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
    bgFinish = finishOpt ? finishOpt.name : '';
    const illusItemObj = getIllusItem();
    illustration = illusItemObj ? illusItemObj.name : (STATE.illusItem === 'NONE' ? 'None' : '');
    const illusRenderOpt = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
    renderStyle = illusRenderOpt ? illusRenderOpt.name : '';
    frameDeco = STATE.frameDecoration || '';
    const motifOpt = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
    motif = motifOpt ? motifOpt.name : '';
    const presetOpt = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
    intensity = presetOpt ? presetOpt.name : '';
    const illusSizeOpt = STATE.illusSize ? ILLUS_SIZE_OPTS.find(o => o.id === STATE.illusSize) : null;
    illusSize = illusSizeOpt ? illusSizeOpt.name : '';
    a2Accents = STATE.archetype === 'A2' ? (STATE.a2SubElements.length + ' accent(s)') : '';
  }

  const aiEvalPrompt = buildAIEvalPrompt(); // compact model-agnostic eval prompt for Excel col Y (25)

  // Sanitize any cell for TSV/HTML: tabs/newlines break column alignment in Excel
  function cellForTsv(s) {
    if (s == null || s === undefined) return '';
    return String(s).replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\t/g, ' ').replace(/\n/g, ' ');
  }
  function escapeHtmlCell(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Build tab-separated row — MUST match Prompt_Eval_Framework_v4.xlsx "Eval Data" row 2 exactly (36 cols):
  // A–D   Unique Code | Timestamp | Evaluator | Platform Tested
  // E–H   Archetype | Frame/Overlay Type | Layout | Overlay Strength (B1)
  // I–L   Track | Colour Palette | Background Finish | Render Style
  // M–R   Illustration/Scene Main | Illus Size (A1) | Frame Decoration | Motif | Accents/Supporting | Mood (B1)
  // S     Intensity
  // T–X   5 platform prompts
  // Y     AI Eval Prompt (paste + image into Claude/Gemini/ChatGPT for score)
  // Z     AI Model Response (QA pastes model output)
  // AA–AJ 10 blank scoring / notes columns for QA
  const step2Label = step2Opt ? step2Opt.name : '';
  const cols = [
    cellForTsv(runId), cellForTsv(timestamp), '', '', // A–D
    cellForTsv(archetype), cellForTsv(step2Label), cellForTsv(layout), cellForTsv(overlayStrength), // E–H (4 cols only — no extra column)
    cellForTsv(track), cellForTsv(palette), cellForTsv(bgFinish), cellForTsv(renderStyle), // I–L
    cellForTsv(illustration || sceneMain), cellForTsv(illusSize), cellForTsv(frameDeco), cellForTsv(motif), // M–P
    cellForTsv(a2Accents || sceneSupporting), cellForTsv(mood), // Q–R
    cellForTsv(intensity), // S
    cellForTsv(GENERATED_PROMPTS[0]),
    cellForTsv(GENERATED_PROMPTS[1]),
    cellForTsv(GENERATED_PROMPTS[2]),
    cellForTsv(GENERATED_PROMPTS[3]),
    cellForTsv(GENERATED_PROMPTS[4]), // T–X
    cellForTsv(aiEvalPrompt), // Y — AI Eval Prompt
    '', // Z — AI Model Response (QA fills after running eval)
    '', '', '', '', '', '', '', '', '', '', // AA–AJ — 10 Part B columns
  ];

  if (cols.length !== 36) {
    console.error('Eval export: expected 36 columns (Prompt_Eval_Framework_v4), got', cols.length);
  }

  const tsv = cols.join('\t');
  // HTML table + plain TSV: Excel / Google Sheets paste one click into A4 and fills A→AJ (full row)
  const htmlTable =
    '<meta charset="utf-8"><table xmlns:o="urn:schemas-microsoft-com:office:office">' +
    '<tbody><tr>' +
    cols.map(function (c) { return '<td>' + escapeHtmlCell(c) + '</td>'; }).join('') +
    '</tr></tbody></table>';

  function fallbackCopyPlain() {
    const ta = document.createElement('textarea');
    ta.value = tsv;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.ClipboardItem && typeof ClipboardItem !== 'undefined') {
    try {
      var plainBlob = new Blob([tsv], { type: 'text/plain;charset=utf-8' });
      var htmlBlob = new Blob([htmlTable], { type: 'text/html;charset=utf-8' });
      navigator.clipboard.write([
        new ClipboardItem({
          'text/plain': plainBlob,
          'text/html': htmlBlob,
        }),
      ]).then(function () {
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      }).catch(function () {
        navigator.clipboard.writeText(tsv).then(function () {
          btn.textContent = '✓ Copied (plain only)';
          btn.style.background = '#16A34A';
          setTimeout(function () {
            btn.textContent = '📋 Export Eval Row';
            btn.style.background = '';
          }, 3000);
        }).catch(function () {
          fallbackCopyPlain();
          btn.textContent = '✓ Eval Row Copied!';
          btn.style.background = '#16A34A';
          setTimeout(function () {
            btn.textContent = '📋 Export Eval Row';
            btn.style.background = '';
          }, 3000);
        });
      });
    } catch (e) {
      navigator.clipboard.writeText(tsv).then(function () {
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      }).catch(function () {
        fallbackCopyPlain();
        btn.textContent = '✓ Eval Row Copied!';
        btn.style.background = '#16A34A';
        setTimeout(function () {
          btn.textContent = '📋 Export Eval Row';
          btn.style.background = '';
        }, 3000);
      });
    }
  } else {
    navigator.clipboard.writeText(tsv).then(function () {
      btn.textContent = '✓ Eval Row Copied!';
      btn.style.background = '#16A34A';
      setTimeout(function () {
        btn.textContent = '📋 Export Eval Row';
        btn.style.background = '';
      }, 3000);
    }).catch(function () {
      fallbackCopyPlain();
      btn.textContent = '✓ Eval Row Copied!';
      btn.style.background = '#16A34A';
      setTimeout(function () {
        btn.textContent = '📋 Export Eval Row';
        btn.style.background = '';
      }, 3000);
    });
  }
}

function copyPromptByIndex(btn, index) {
  const text = GENERATED_PROMPTS[index];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for browsers that block clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

render();
</script>
