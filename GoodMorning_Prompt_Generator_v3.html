<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioAICloud · Good Morning Poster Generator v3</title>
<style>
:root {
  --primary: #1E3A5F;
  --primary-light: #2D5A8E;
  --accent: #F59E0B;
  --accent-light: #FEF3C7;
  --success: #16A34A;
  --success-light: #DCFCE7;
  --danger: #DC2626;
  --bg: #F1F5F9;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(30,58,95,0.10);
  --shadow-hover: 0 6px 20px rgba(30,58,95,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--primary); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { background: var(--accent); color: var(--primary); font-weight: 800; font-size: 14px; padding: 6px 10px; border-radius: 8px; letter-spacing: 0.5px; }
.header-title { color: #fff; font-size: 16px; font-weight: 600; }
.header-sub { color: #94A3B8; font-size: 13px; margin-top: 2px; }
.header-badge { background: rgba(245,158,11,0.2); color: var(--accent); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(245,158,11,0.3); }

.progress-wrap { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 32px; }
.progress-steps { display: flex; align-items: center; gap: 0; max-width: 1060px; }
.prog-step { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); flex: 1; }
.prog-step:last-child { flex: 0; }
.prog-step .num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
.prog-step.done .num { background: var(--success); color: #fff; }
.prog-step.done .num::after { content: '\2713'; }
.prog-step.done .num span { display: none; }
.prog-step.active .num { background: var(--primary); color: #fff; }
.prog-step .label { font-weight: 500; white-space: nowrap; }
.prog-step.active .label { color: var(--primary); font-weight: 700; }
.prog-step.done .label { color: var(--success); }
.prog-connector { height: 2px; flex: 1; background: var(--border); margin: 0 4px; border-radius: 1px; }
.prog-connector.done { background: var(--success); }

.main { max-width: 1060px; margin: 0 auto; padding: 32px 24px; }
.step-header { margin-bottom: 24px; }
.step-eyebrow { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.step-title { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.step-desc { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 700px; }
.step-hint { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-light); border: 1px solid #FCD34D; color: #92400E; font-size: 12px; padding: 6px 12px; border-radius: 20px; margin-top: 10px; }

.options-grid { display: grid; gap: 14px; }
.options-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.options-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.options-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.options-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.options-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
@media (max-width: 700px) {
  .options-grid.cols-4, .options-grid.cols-5, .options-grid.cols-6 { grid-template-columns: repeat(2, 1fr); }
  .options-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
}
.opt-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.18s; position: relative; }
.opt-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.opt-card.selected { border-color: var(--primary); background: #EFF6FF; box-shadow: 0 0 0 3px rgba(30,58,95,0.12); }
.opt-card.recommended::before { content: '\2605 Best'; position: absolute; top: 8px; right: 8px; background: var(--accent); color: #7C2D12; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.opt-card.compatible::before { content: '\2713 Works'; position: absolute; top: 8px; right: 8px; background: var(--success-light); color: var(--success); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.opt-card.caution { opacity: 0.7; }
.opt-card.caution::before { content: '~ With care'; position: absolute; top: 8px; right: 8px; background: #FEF9C3; color: #713F12; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.opt-card.selected::after { content: '\2713'; position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; display: grid; place-items: center; }
.opt-code { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
.opt-name { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.opt-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.opt-icon { font-size: 28px; margin-bottom: 10px; }

.layout-diagram { width: 56px; height: 80px; border: 2px solid #CBD5E1; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 10px; background: #F8FAFC; flex-shrink: 0; }
.ld-row { display: flex; flex-direction: row; width: 56px; height: 80px; border: 2px solid #CBD5E1; border-radius: 6px; overflow: hidden; margin-bottom: 10px; background: #F8FAFC; flex-shrink: 0; }

.palette-card { padding: 14px; }
.palette-swatch-row { display: flex; gap: 6px; margin-bottom: 10px; }
.swatch { width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); }
.palette-name { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
.palette-id { font-size: 10px; color: var(--muted); font-weight: 600; }
.palette-vibe { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

.font-sample { font-size: 18px; font-weight: 700; margin: 8px 0 4px; color: var(--primary); }

.illus-back { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px; background: none; border: none; padding: 0; }
.illus-back:hover { text-decoration: underline; }
.cat-card { padding: 14px; display: flex; align-items: center; gap: 12px; }
.cat-icon { font-size: 28px; }
.cat-info .cat-name { font-size: 14px; font-weight: 700; color: var(--primary); }
.cat-info .cat-count { font-size: 11px; color: var(--muted); }
.item-card { padding: 12px 14px; }
.item-id { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; }
.item-name { font-size: 14px; font-weight: 700; color: var(--primary); margin: 2px 0; }
.item-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.item-archs { display: inline-block; background: #EFF6FF; color: #1E40AF; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin-top: 5px; }

.sub-section { margin-bottom: 28px; }
.sub-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.sub-section-num { width: 26px; height: 26px; background: var(--primary); color: #fff; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.sub-section-title { font-size: 15px; font-weight: 800; color: var(--primary); }
.sub-section-tag { font-size: 10px; font-weight: 700; background: #FEF3C7; color: #92400E; padding: 2px 8px; border-radius: 10px; }

.terminology-box { background: #FFF5F5; border: 1px solid #FECDD3; border-left: 4px solid #DC2626; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 24px; }
.terminology-box h4 { font-size: 13px; font-weight: 800; color: #991B1B; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.terminology-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.term-chip { background: #fff; border: 1px solid #FECDD3; border-radius: 8px; padding: 8px 12px; flex: 1; min-width: 160px; }
.term-chip strong { display: block; font-size: 12px; color: #991B1B; font-weight: 800; margin-bottom: 3px; }
.term-chip span { font-size: 11px; color: var(--muted); line-height: 1.4; }

.text-input-wrap { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 600px; }
.text-input-wrap textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; resize: vertical; min-height: 80px; color: var(--text); outline: none; transition: border-color 0.2s; }
.text-input-wrap textarea:focus { border-color: var(--primary); }
.lang-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.lang-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: #fff; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.lang-btn.active { border-color: var(--primary); background: #EFF6FF; color: var(--primary); }
.text-hint { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

.nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; }
.btn { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; border: none; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,58,95,0.3); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: transparent; color: var(--primary); border: 2px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); }
.btn-generate { background: var(--accent); color: #7C2D12; font-size: 16px; padding: 14px 36px; }
.btn-generate:hover { background: #D97706; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,158,11,0.4); }

.summary-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
.chip .chip-label { font-weight: 600; color: var(--primary); }
.chip:hover { border-color: var(--primary); }

.output-wrap { display: none; }
.output-wrap.visible { display: block; }
.output-header { background: linear-gradient(135deg, var(--primary) 0%, #2D5A8E 100%); color: #fff; border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
.output-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.output-header p { font-size: 14px; color: #94A3B8; }
.summary-table { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
@media (max-width: 700px) { .summary-table { grid-template-columns: repeat(2, 1fr); } }
.sum-cell { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; }
.sum-label { font-size: 10px; color: #94A3B8; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.sum-value { font-size: 13px; font-weight: 700; color: #fff; margin-top: 3px; }

.prompt-block { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 18px; overflow: hidden; box-shadow: var(--shadow); }
.prompt-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.prompt-platform { display: flex; align-items: center; gap: 8px; }
.platform-dot { width: 10px; height: 10px; border-radius: 50%; }
.platform-name { font-size: 14px; font-weight: 700; color: var(--primary); }
.platform-sub { font-size: 12px; color: var(--muted); }
.btn-copy { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-copy:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-copy.copied { background: var(--success); color: #fff; border-color: var(--success); }
.prompt-body { padding: 18px 20px; }
.prompt-text { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; line-height: 1.7; color: var(--text); background: #F8FAFC; border-radius: 8px; padding: 14px; word-break: break-word; white-space: pre-wrap; border: 1px solid var(--border); }
.prompt-note { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
.prompt-note strong { color: var(--primary); }

.text-overlay-box { background: #FFFBEB; border: 1px solid #FCD34D; border-radius: var(--radius); padding: 18px 20px; margin-bottom: 18px; }
.text-overlay-box h4 { font-size: 14px; font-weight: 700; color: #92400E; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.text-overlay-content { font-size: 16px; font-weight: 600; color: var(--text); background: #fff; border-radius: 8px; padding: 12px 16px; border: 1px solid #FCD34D; }
.text-overlay-meta { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.text-meta-chip { background: #FEF3C7; border: 1px solid #FCD34D; color: #92400E; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; }

.negative-box { background: #FFF1F2; border: 1px solid #FECDD3; border-radius: var(--radius); padding: 14px 18px; margin-bottom: 18px; }
.negative-box h4 { font-size: 12px; font-weight: 700; color: #BE123C; margin-bottom: 6px; }
.negative-text { font-family: monospace; font-size: 12px; color: #881337; }

.reset-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; background: none; border: none; margin-top: 24px; }
.reset-btn:hover { color: var(--primary); }

.cat-locked { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: #fff; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 700; margin-bottom: 24px; }
.cat-locked .lock-icon { font-size: 16px; }

/* ── TRACK CARDS ── */
.track-card { position: relative; overflow: hidden; }
.track-card .track-swatch { height: 6px; position: absolute; top: 0; left: 0; right: 0; border-radius: var(--radius) var(--radius) 0 0; }
.track-card .track-demo { display: flex; gap: 4px; margin: 10px 0 8px; }
.track-card .track-demo-swatch { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); }
.track-audience { font-size: 10px; color: var(--muted); font-weight: 600; background: #F1F5F9; padding: 2px 8px; border-radius: 8px; display: inline-block; margin-top: 6px; }

/* ── TRACK FILTER INDICATOR ── */
.track-filter-bar { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.track-filter-bar .track-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.track-filter-bar .track-filter-text { font-size: 13px; font-weight: 600; color: var(--primary); }
.track-filter-bar .track-filter-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
</style>
</head>

// ═══════════════════════════════════════════════════════════

function getArchetype() { return ARCHETYPES.find(a => a.id === STATE.archetype); }
function getTrack()     { return TRACKS.find(t => t.id === STATE.track); }
function getLayout()    { return LAYOUTS.find(l => l.id === STATE.layout); }
function getFrameDeco() { return FRAME_DECO_OPTS.find(f => f.id === STATE.frameDecoration); }
function getIllusSize() { return ILLUS_SIZE_OPTS.find(s => s.id === STATE.illusSize); }

function getPalette() {
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || !STATE.track) return base ? { ...base, bg: base.tracks.A.bg, text: base.tracks.A.text, accent: base.tracks.A.accent, natural: base.tracks.A.natural } : null;
  const tv = base.tracks[STATE.track];
  return { ...base, bg: tv.bg, text: tv.text, accent: tv.accent, secondary: tv.secondary, natural: tv.natural };
}

function getFont() {
  const base = FONTS_BASE.find(f => f.id === STATE.font);
  if (!base || !STATE.track) return base ? { ...base, heading: base.tracks.A.heading, body: base.tracks.A.body } : null;
  const tv = base.tracks[STATE.track];
  return { ...base, heading: tv.heading, body: tv.body, desc: tv.desc };
}

function getIllusItem() {
  if (!STATE.illusItem || STATE.illusItem === 'NONE') return null;
  for (const cat of ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  return null;
}

function getLayoutCompat(layoutId) {
  if (!STATE.archetype || !STATE.step2) return 'ok';
  const compat = LAYOUT_COMPAT[STATE.archetype]?.[STATE.step2];
  return compat?.[layoutId] || 'ok';
}

function canProceed() {
  switch (STATE.step) {
    case 1: return !!STATE.archetype;
    case 2: return !!STATE.step2;
    case 3: return !!STATE.layout;
    case 4: return !!STATE.track;
    case 5: return !!STATE.palette;
    case 6: return !!STATE.font;
    case 7: {
      if (STATE.archetype === 'A1') {
        const hasDeco = !!STATE.frameDecoration;
        const hasIllus = !!STATE.illusItem;
        const hasSize = STATE.illusItem === 'NONE' || !!STATE.illusSize;
        return hasDeco && hasIllus && hasSize;
      }
      if (STATE.archetype === 'A2') {
        return !!STATE.illusItem && !!STATE.illusSize;
      }
      return !!STATE.illusItem;
    }
    case 8: return true;
    default: return false;
  }
}

function select(key, value) {
  STATE[key] = value;
  if (key === 'archetype') { STATE.step2 = null; STATE.layout = null; STATE.track = null; STATE.palette = null; STATE.font = null; STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null; }
  if (key === 'step2') { STATE.layout = null; }
  if (key === 'track') { STATE.palette = null; STATE.font = null; }
  render();
}

function selectCat(catId) {
  STATE.illusCategory = catId;
  if (!catId) STATE.illusItem = null;
  render();
}

function jumpTo(step) {
  if (step <= STATE.step) { STATE.step = step; render(); }
}

// DIAGRAMS

function layoutDiagram(layout) {
  if (layout.type === 'vertical') {
    const topH = layout.textFirst ? '32%' : '68%';
    const botH = layout.textFirst ? '68%' : '32%';
    const topBg = layout.textFirst ? '#BFDBFE' : '#FED7AA';
    const botBg = layout.textFirst ? '#FED7AA' : '#BFDBFE';
    const topLabel = layout.textFirst ? 'T' : 'V';
    const botLabel = layout.textFirst ? 'V' : 'T';
    return `<div class="layout-diagram" style="flex-direction:column;">
      <div style="height:${topH};background:${topBg};display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:${topBg==='#BFDBFE'?'#1E40AF':'#92400E'}">${topLabel}</div>
      <div style="height:${botH};background:${botBg};display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:${botBg==='#BFDBFE'?'#1E40AF':'#92400E'}">${botLabel}</div>
    </div>`;
  }
  if (layout.type === 'overlay') {
    return `<div class="layout-diagram" style="position:relative;background:#FED7AA;">
      <div style="position:absolute;inset:0;background:rgba(191,219,254,0.7);display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:#1E3A5F;">T</div>
      <div style="width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:6px;color:#92400E;font-weight:800;">V</div>
    </div>`;
  }
  if (layout.type === 'horizontal') {
    const leftBg = layout.textFirst ? '#BFDBFE' : '#FED7AA';
    const rightBg = layout.textFirst ? '#FED7AA' : '#BFDBFE';
    const leftLabel = layout.textFirst ? 'T' : 'V';
    const rightLabel = layout.textFirst ? 'V' : 'T';
    return `<div class="ld-row">
      <div style="width:40%;background:${leftBg};display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:${leftBg==='#BFDBFE'?'#1E40AF':'#92400E'}">${leftLabel}</div>
      <div style="width:60%;background:${rightBg};display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:${rightBg==='#BFDBFE'?'#1E40AF':'#92400E'}">${rightLabel}</div>
    </div>`;
  }
  if (layout.type === 'centre-accent') {
    return `<div class="layout-diagram" style="flex-direction:column;border:3px solid #F59E0B;position:relative;background:#BFDBFE;">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#1E40AF;">T</div>
      <div style="position:absolute;bottom:4px;right:4px;width:12px;height:12px;background:#FED7AA;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:800;color:#92400E;">V</div>
    </div>`;
  }
  return '<div class="layout-diagram"></div>';
}

    'frame-arch': `<div style="${ws}position:relative;background:#F8FAFC;"><div style="position:absolute;top:0;left:0;right:0;height:18px;background:#FED7AA;border-radius:0 0 40px 40px / 0 0 30px 30px;"></div></div>`,
    'weight-light': `<div style="${ws}display:flex;align-items:center;justify-content:center;background:#FEF9C3;font-size:18px;">\uD83C\uDF3C</div>`,
    'weight-medium': `<div style="${ws}display:flex;align-items:center;justify-content:center;background:#FEF9C3;font-size:14px;">\uD83C\uDF38\uD83C\uDF3C</div>`,
    'weight-dense': `<div style="${ws}display:flex;align-items:center;justify-content:center;background:#FEF9C3;font-size:11px;">\uD83C\uDF38\uD83C\uDF3C\uD83C\uDF3A</div>`,
    'overlay-full': `<div style="${ws}background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),#93C5FD;"></div>`,
    'overlay-top': `<div style="${ws}background:linear-gradient(rgba(0,0,0,0.65) 0%,rgba(0,0,0,0.1) 60%,transparent 100%),#93C5FD;"></div>`,
    'overlay-bottom': `<div style="${ws}background:linear-gradient(transparent 0%,rgba(0,0,0,0.1) 40%,rgba(0,0,0,0.65) 100%),#93C5FD;"></div>`,

    'overlay-caption': `<div style="${ws}background:#93C5FD;display:flex;flex-direction:column;"><div style="flex:1;"></div><div style="height:22%;background:rgba(0,0,0,0.55);"></div></div>`,

// ═══════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════

function renderProgress() {
  const el = document.getElementById('progressSteps');
  let html = '';
  STEPS.forEach((s, i) => {
    const isDone = STATE.step > s.id;
    const isActive = STATE.step === s.id;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    html += `<div class="prog-step ${cls}">
      <div class="num"><span>${s.id}</span></div>
      <span class="label">${s.label}</span>
    </div>`;
    if (i < STEPS.length - 1) {
      html += `<div class="prog-connector ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// SUMMARY CHIPS
// ═══════════════════════════════════════════════════════════

function renderChips() {
  const chips = [];
  if (STATE.archetype) {
    const a = getArchetype();
    chips.push(`<div class="chip" onclick="jumpTo(1)"><span>Template:</span><span class="chip-label">${a.id}</span></div>`);
  }
  if (STATE.step2) chips.push(`<div class="chip" onclick="jumpTo(2)"><span>Style:</span><span class="chip-label">${STATE.step2}</span></div>`);
  if (STATE.layout) {
    const l = getLayout();
    chips.push(`<div class="chip" onclick="jumpTo(3)"><span>Layout:</span><span class="chip-label">${l.id}</span></div>`);
  }
  if (STATE.track) {
    const t = getTrack();
    chips.push(`<div class="chip" onclick="jumpTo(4)"><span>Track:</span><span class="chip-label" style="display:inline-flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:${t.colors[0]};display:inline-block;border:1px solid #ccc;"></span>${t.name}</span></div>`);
  }
  if (STATE.palette) {
    const p = getPalette();
    chips.push(`<div class="chip" onclick="jumpTo(5)"><span>Colour:</span><span class="chip-label" style="display:inline-flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:${p.bg};display:inline-block;border:1px solid #ccc;"></span>${p.name}</span></div>`);
  }
  if (STATE.font) {
    const f = getFont();
    chips.push(`<div class="chip" onclick="jumpTo(6)"><span>Font:</span><span class="chip-label">${f.name}</span></div>`);
  }
  if (STATE.frameDecoration) {
    chips.push(`<div class="chip" onclick="jumpTo(7)"><span>Frame:</span><span class="chip-label">${STATE.frameDecoration}</span></div>`);
  }
  if (STATE.illusItem) {
    const item = getIllusItem();
    const label = STATE.illusItem === 'NONE' ? 'None (frame only)' : item ? item.name : '\u2014';
    chips.push(`<div class="chip" onclick="jumpTo(7)"><span>Visual:</span><span class="chip-label">${label}</span></div>`);
  }
  if (STATE.illusSize) {
    chips.push(`<div class="chip" onclick="jumpTo(7)"><span>Size:</span><span class="chip-label">${STATE.illusSize}</span></div>`);
  }
  return chips.length ? `<div class="summary-strip">${chips.join('')}</div>` : '';
}

  return `

      <div class="step-title">Choose Layout</div>
      <div class="step-desc">Layout defines where text appears and where the visual sits. <span style="color:#1E40AF;font-weight:600;">\u2605 Best</span> = recommended for your choices. <span style="color:#B45309;font-weight:600;">~ With care</span> = usable but review.</div>

    <div class="options-grid cols-3">

function renderStep7() {
  const arch = STATE.archetype;
  if (arch === 'A1') return renderStep7_A1();
  if (arch === 'A2') return renderStep7_A2();
  return renderStep7_B1();
}

function renderStep7_A1() {
  const illusItemSelected = STATE.illusItem && STATE.illusItem !== 'NONE';
  const noIllus = STATE.illusItem === 'NONE';
  const track = getTrack();

  const illusSection = !STATE.illusCategory
    ? `<div class="options-grid cols-3">
        ${ILLUS_CATS.map(cat => `
          <div class="opt-card" onclick="selectCat('${cat.id}')">
            <div class="cat-card"><div class="cat-icon">${cat.icon}</div><div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.count} visuals</div></div></div>
          </div>
        `).join('')}
        <div class="opt-card ${noIllus ? 'selected' : ''}" onclick="select('illusItem','NONE');STATE.illusCategory=null;">
          <div class="opt-icon">\u2717</div>
          <div class="opt-name">No Illustration</div>
          <div class="opt-desc">Frame only \u2014 text on solid/gradient background. Clean, typographic poster.</div>
        </div>
      </div>`
    : `<button class="illus-back" onclick="selectCat(null)">\u2190 Back to categories</button>
      <div class="options-grid cols-3">
        ${ILLUS_CATS.find(c => c.id === STATE.illusCategory)?.items.map(item => `
          <div class="opt-card item-card ${STATE.illusItem === item.id ? 'selected' : ''}" onclick="select('illusItem','${item.id}')">
            <div class="item-id">${item.id}</div><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div><span class="item-archs">${item.archs}</span>
          </div>
        `).join('') || ''}
      </div>`;

  const sizeSection = illusItemSelected ? `
    <div class="sub-section">
      <div class="sub-section-header"><div class="sub-section-num">3</div><div class="sub-section-title">Illustration Size</div><span class="sub-section-tag">How much canvas the illustration occupies</span></div>
      <div class="options-grid cols-3">
        ${ILLUS_SIZE_OPTS.map(s => `
          <div class="opt-card ${STATE.illusSize === s.id ? 'selected' : ''}" onclick="select('illusSize','${s.id}')"><div class="opt-name">${s.name}</div><div class="opt-desc">${s.desc}</div></div>
        `).join('')}
      </div>
    </div>` : '';

  return `
    <div class="step-header">
      <div class="step-eyebrow">Step 7 of 8 \u00B7 A1 \u2014 Text + Frame</div>
      <div class="step-title">Frame, Illustration & Visual Setup</div>
      <div class="step-desc">A1 has three distinct asset controls. Set all three carefully.</div>
    </div>

// ═══════════════════════════════════════════════════════════
// PROMPT GENERATION (TRACK-AWARE)
// ═══════════════════════════════════════════════════════════

function getTextSpaceInstruction(layout, textInput, archetype) {
  const len = textInput.trim().split(/\s+/).filter(Boolean).length;
  const size = len === 0 ? 'clean empty' : len <= 5 ? 'small clear' : len <= 15 ? 'clear' : 'generous clear';
  if (archetype === 'B1') return '';
  const posMap = {
    L1: `${size} space in the upper 30% of the image for text overlay`,
    L2: `${size} central area with softened or slightly lighter tones for text overlay`,
    L3: `${size} space on the left half of the image for text overlay, visual subject anchored on the right`,
    L4: `${size} space on the right half of the image for text overlay, visual subject anchored on the left`,
    L5: `${size} space in the lower 25% of the image for text overlay`,
    L6: `completely empty and clear central zone occupying the full middle 60 percent of the canvas for text overlay, a single small flat illustration element placed only at the bottom-right or bottom-left corner, all other areas must be plain solid background`,
  };
  return posMap[layout] || 'clear space reserved for text overlay';
}

function buildA1FrameDesc(step2, frameDecoration) {
  const frameShapes = {
    F1: 'rectangular border frame running along all four edges of the canvas',
    F2: 'horizontal band frame at the top and bottom edges only',
    F3: 'single decorative band along the bottom edge only',
    F4: 'decorative accents at all four corners of the canvas',
    F5: 'curved arch canopy framing the top of the canvas',
  };
  const decoStyle = FRAME_DECO_OPTS.find(d => d.id === frameDecoration);
  const decoPhrase = decoStyle ? decoStyle.promptPhrase : 'simple clean border';
  return `${frameShapes[step2] || 'decorative border frame'}, ${decoPhrase}`;
}

function getTrackIllusStylePrompt(track, archetype) {
  const t = TRACKS.find(tr => tr.id === track);
  if (!t) return '';
  if (archetype === 'B1') return t.photoTreatment;
  return t.illusStyle;
}

function getTrackBgStylePrompt(track) {
  const t = TRACKS.find(tr => tr.id === track);
  return t ? t.bgStyle : '';
}

function buildSubjectLine(state) {
  const { archetype, step2, layout, frameDecoration, illusItem: illusItemId, illusSize: illusSizeId, track } = state;
  const illusItem = getIllusItem();
  const illusSize = getIllusSize();
  const trackData = getTrack();
  const trackIllusStyle = getTrackIllusStylePrompt(track, archetype);

  if (archetype === 'A1') {
    const frameDesc = buildA1FrameDesc(step2, frameDecoration);
    const item = illusItem ? illusItem.name : null;
    const sizePhrase = illusSize ? `, ${illusSize.promptPhrase}` : '';
    const isL6 = state.layout === 'L6';

    if (!item) {
      return `${frameDesc}, solid flat background fill, no illustration, no landscape, no background scene, clean open canvas for text`;
    }
    if (isL6) {
      const cornerPos = 'bottom-right corner of the canvas';
      return `${frameDesc}, solid flat plain background fill with no scenery or landscape, single isolated ${item.toLowerCase()} illustration rendered in ${trackIllusStyle} placed only at the ${cornerPos}${sizePhrase}, central 60 percent of canvas completely empty and plain`;
    }
    return `${frameDesc}, solid flat plain background fill with no scenery or landscape, ${item.toLowerCase()} illustration rendered in ${trackIllusStyle} placed inside the frame${sizePhrase}`;
  }

  if (archetype === 'A2') {
    const item = illusItem ? illusItem.name : 'morning scene';
    const sizePhrase = illusSize ? illusSize.promptPhrase : 'balanced scale';
    const illusZone = {
      L1: 'placed in the lower 65 percent of the canvas, upper 35 percent left as clean empty space for text',
      L2: 'placed filling the full canvas as a rich illustration background',
      L3: 'placed on the right two-thirds of the canvas, left one-third left as empty space for text',
      L4: 'placed on the left two-thirds of the canvas, right one-third left as empty space for text',
      L5: 'placed in the upper 65 percent of the canvas, lower 35 percent left as clean empty space for text',
      L6: 'placed only in the bottom corner as a small accent, central zone fully clear for text',
    };
    const zone = illusZone[layout] || 'placed in the designated illustration zone';
    const supportDesc = {
      Light:  `${item} as the single primary illustration rendered in ${trackIllusStyle}, no other elements, generous blank background`,
      Medium: `${item} as the primary element rendered in ${trackIllusStyle} with 2 to 3 complementary small morning motifs arranged naturally around it`,
      Dense:  `${item} as the central element rendered in ${trackIllusStyle} surrounded by 5 to 6 varied morning elements in a rich composition`,
    };
    const density = supportDesc[step2] || supportDesc.Medium;
    return `${density}, ${zone}, ${sizePhrase}, solid plain background behind all illustration elements`;
  }

  if (archetype === 'B1') {
    const item = illusItem ? illusItem.name : 'golden morning scene';
    const overlayMood = {
      O1: 'moody cinematic atmosphere, consistent warm tones across the entire scene',
      O2: 'bright airy top-lit morning atmosphere, warm morning light flooding from above',
      O3: 'warm golden morning atmosphere, subject well-lit, natural warmth throughout',
      O4: 'centrally lit with warm diffused morning light, soft natural depth',
      O5: 'warm bright morning atmosphere, rich depth, subject glowing in natural morning light',
    };
    const subjectFocus = {
      L1: `${item} in the lower-centre of the frame with open morning sky above`,
      L2: `${item} centred in the frame, surrounded by natural morning setting`,
      L3: `${item} on the right side of the frame with natural morning setting to the left`,
      L4: `${item} on the left side of the frame with natural morning setting to the right`,
      L5: `${item} in the upper-centre of the frame with natural setting below`,
      L6: `${item} centred prominently in the frame, natural morning setting around it`,
    };
    const mood = overlayMood[step2] || 'warm golden morning light throughout';
    const focus = subjectFocus[layout] || `${item} as the photographic subject in an Indian morning setting`;
    return `${focus}, ${mood}, ${trackIllusStyle}, warm golden morning light, India morning atmosphere, single continuous full-bleed photograph, one unified scene filling the entire 9:16 canvas`;
  }

  return illusItem ? illusItem.name : 'morning scene';
}

function buildStyleLine(archetype, step2, frameDecoration, track) {
  const trackData = TRACKS.find(t => t.id === track);
  const trackBgStyle = trackData ? trackData.bgStyle : '';
  const trackRef = trackData ? trackData.illusRef : '';

  if (archetype === 'A1') {
    const baseStyle = `Indian morning aesthetic, ${trackBgStyle} background treatment`;
    if (frameDecoration === 'Plain') return `${baseStyle}, no ornamentation, simple clean lines, reference: ${trackRef}`;
    if (frameDecoration === 'Simple') return `${baseStyle}, subtle traditional Indian art influence, restrained decoration, reference: ${trackRef}`;
    if (frameDecoration === 'Detailed') return `${baseStyle}, ornate traditional Indian folk art style, detailed motif work on frame, reference: ${trackRef}`;
    return baseStyle;
  }
  if (archetype === 'A2') {
    return `2D artwork not photographic, ${trackBgStyle} background, Indian morning aesthetic, reference: ${trackRef}`;
  }
  if (archetype === 'B1') {
    return 'photorealistic photography, DSLR quality, natural lighting, sharp focus, no CGI, no illustration, no graphic design elements, no decorative overlays, no added badges or icons, pure photography';
  }
  return 'flat illustration style';
}

function buildNegativeTerms(archetype, frameDecoration, layout) {
  const base = 'text letters words numbers typography watermarks logos blurry low-quality';
  if (archetype === 'B1') {
    return `collage composite split panel two photos stacked dual image inset photo multiple photographs image within image divided frame second image photo montage tiled images ${base} illustration graphic design overlay diya icon badge logo stamp decorative border frame border ornament illustrated element vector art flat design solid colour band overlay strip`;
  }
  if (archetype === 'A2') {
    return `${base} photographic background photo background landscape photograph realistic background 3D render multiple conflicting styles text in illustration`;
  }
  if (archetype === 'A1') {
    const a1Base = `${base} photographic background landscape scene photo background gradient sky illustration in center background imagery multiple illustrations`;
    if (layout === 'L6') {
      const l6Extra = 'illustration in center illustration in middle element in center background scene landscape photo scenery any imagery in the central zone';
      if (frameDecoration === 'Plain') return `${a1Base} ${l6Extra} ornate decoration excessive ornamentation motifs on frame`;
      if (frameDecoration === 'Simple') return `${a1Base} ${l6Extra} heavy ornamentation excessive motifs throughout border`;
      return `${a1Base} ${l6Extra}`;
    }
    if (frameDecoration === 'Plain') return `${a1Base} ornate decoration excessive ornamentation motifs on frame patterns on border complex frame`;
    if (frameDecoration === 'Simple') return `${a1Base} heavy ornamentation overly decorated frame excessive motifs throughout border`;
    return a1Base;
  }
  return base;
}

function buildMJPrompt(state) {
  const { archetype, step2, layout, frameDecoration, track } = state;
  const palette = getPalette();
  const text = state.textInput.trim();

  const subject = buildSubjectLine(state);
  const colorDesc = palette ? palette.natural : 'warm morning tones';
  const styleDesc = buildStyleLine(archetype, step2, frameDecoration, track);
  const textSpace = getTextSpaceInstruction(layout, text, archetype);
  const negative = buildNegativeTerms(archetype, frameDecoration, layout);
  const isPhoto = archetype === 'B1';
  const styleFlag = isPhoto ? '--style raw' : '';

  const colorHint = archetype === 'B1' ? '' : `, ${colorDesc}`;
  const textSpacePart = textSpace ? `, ${textSpace}` : '';

  return `${subject}${colorHint}, ${styleDesc}${textSpacePart}, 9:16 portrait format --ar 9:16 --no ${negative} ${styleFlag}`.replace(/\s+/g, ' ').trim();
}

function buildFireflyPrompt(state) {
  const { archetype, step2, layout, frameDecoration, track } = state;
  const palette = getPalette();
  const text = state.textInput.trim();

  const subject = buildSubjectLine(state);
  const colorDesc = palette ? palette.natural : 'warm morning tones';
  const styleDesc = buildStyleLine(archetype, step2, frameDecoration, track);
  const textSpace = getTextSpaceInstruction(layout, text, archetype);
  const negative = buildNegativeTerms(archetype, frameDecoration, layout);

  const colorHint = archetype === 'B1' ? '' : ` ${colorDesc}.`;
  const textSpacePart = textSpace ? ` ${textSpace}.` : '';

  return `${subject}. ${styleDesc}.${colorHint}${textSpacePart} Portrait 9:16 format for mobile. Do not include any ${negative.replace(/\s+/g, ', ')} anywhere in the image.`.replace(/\s+/g, ' ').trim();
}

function buildTextNote(text, lang, layout) {
  if (!text.trim()) return null;
  const posMap = {
    L1: 'Upper third of poster', L2: 'Centred overlay', L3: 'Left half',
    L4: 'Right half', L5: 'Lower strip', L6: 'Central zone (frame on all edges)',
  };
  return { text: text.trim(), lang, position: posMap[layout] || 'As per layout' };
}

    <div class="negative-box">
      <h4>\uD83D\uDEAB Negative Terms Built Into Both Prompts</h4>
      <div class="negative-text">${buildNegativeTerms(STATE.archetype, STATE.frameDecoration, STATE.layout)}</div>
    </div>

    <button class="reset-btn" onclick="resetTool()">\u21A9 Start Over \u2014 Generate a New Poster</button>
  `;
  outputEl.scrollIntoView({ behavior: 'smooth' });
}

function copyPrompt(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '\u2713 Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function resetTool() {
  Object.assign(STATE, {
    step: 1, archetype: null, step2: null, layout: null, track: null,
    palette: null, font: null, illusCategory: null, illusItem: null,
    frameDecoration: null, illusSize: null, textInput: '', textLang: 'Hindi',
  });
  const outputEl = document.getElementById('outputSection');
  if (outputEl) outputEl.className = 'output-wrap';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════

function render() {
  renderProgress();
  const app = document.getElementById('app');

  const stepContent = {
    1: renderStep1,
    2: renderStep2,
    3: renderStep3,
    4: renderStep4,
    5: renderStep5,
    6: renderStep6,
    7: renderStep7,
    8: renderStep8,
  }[STATE.step]?.() || '';

  const chips = renderChips();
  const isLastStep = STATE.step === 8;
  const canGo = canProceed();

  app.innerHTML = `
    ${chips}
    <div id="stepPanel">${stepContent}</div>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="prevStep()" ${STATE.step === 1 ? 'style="visibility:hidden"' : ''}>\u2190 Back</button>
      ${isLastStep
        ? `<button class="btn btn-generate" onclick="generateOutput()">\u2728 Generate Prompts</button>`
        : `<button class="btn btn-primary" onclick="nextStep()" ${!canGo ? 'disabled' : ''}>Continue \u2192</button>`
      }
    </div>
    <div id="outputSection" class="output-wrap"></div>
  `;
}

function nextStep() {
  if (!canProceed()) return;
  STATE.step = Math.min(STATE.step + 1, 8);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}
function prevStep() {
  if (STATE.step === 7 && STATE.illusCategory && STATE.archetype !== 'A1') {
    STATE.illusCategory = null; render(); return;
  }
  STATE.step = Math.max(STATE.step - 1, 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}
function generateOutput() {
  render();
  renderOutput();
}

// INIT
render();
</script>
</body>
</html>
