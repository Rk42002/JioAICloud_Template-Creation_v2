<style>
:root {
  --primary: #1E3A5F;
  --primary-light: #2D5A8E;
  --accent: #F59E0B;
  --accent-light: #FEF3C7;
  --success: #16A34A;
  --success-light: #DCFCE7;
  --danger: #DC2626;
  --bg: #F1F5F9;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(30,58,95,0.10);
  --shadow-hover: 0 6px 20px rgba(30,58,95,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--primary); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { background: var(--accent); color: var(--primary); font-weight: 800; font-size: 14px; padding: 6px 10px; border-radius: 8px; letter-spacing: 0.5px; }
.header-title { color: #fff; font-size: 16px; font-weight: 600; }
.header-sub { color: #94A3B8; font-size: 13px; margin-top: 2px; }
.header-badge { background: rgba(245,158,11,0.2); color: var(--accent); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(245,158,11,0.3); }

.progress-wrap { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 32px; }
.progress-steps { display: flex; align-items: center; gap: 0; max-width: 1060px; flex-wrap: wrap; }
.prog-step { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); flex: 0 1 auto; }
.prog-step .num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
.prog-step.done .num { background: var(--success); color: #fff; }
.prog-step.done .num::after { content: '\2713'; }
.prog-step.done .num span { display: none; }
.prog-step.active .num { background: var(--primary); color: #fff; }
.prog-step .label { font-weight: 500; white-space: nowrap; }
.prog-step.active .label { color: var(--primary); font-weight: 700; }
.prog-step.done .label { color: var(--success); }
.prog-connector { height: 2px; flex: 0 1 auto; min-width: 8px; background: var(--border); margin: 0 4px; border-radius: 1px; }
.prog-connector.done { background: var(--success); }

.main { max-width: 1060px; margin: 0 auto; padding: 32px 24px; }
.step-header { margin-bottom: 24px; }
.step-eyebrow { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.step-title { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.step-desc { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 700px; }
.step-hint { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-light); border: 1px solid #FCD34D; color: #92400E; font-size: 12px; padding: 6px 12px; border-radius: 20px; margin-top: 10px; }

.options-grid { display: grid; gap: 14px; }
.options-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.options-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.options-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.options-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.options-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
.options-grid.cols-9 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
.options-grid.cols-10 { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
@media (max-width: 700px) {
  .options-grid.cols-4, .options-grid.cols-5, .options-grid.cols-6, .options-grid.cols-9, .options-grid.cols-10 { grid-template-columns: repeat(2, 1fr); }
  .options-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
}
.opt-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.18s; position: relative; }
.opt-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.opt-card.selected { border-color: var(--primary); background: #EFF6FF; box-shadow: 0 0 0 3px rgba(30,58,95,0.12); }
.opt-card.recommended::before { content: '\2605 Best'; position: absolute; top: 8px; right: 8px; background: var(--accent); color: #7C2D12; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.opt-card.compatible::before { content: '\2713 Works'; position: absolute; top: 8px; right: 8px; background: var(--success-light); color: var(--success); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.opt-card.caution { opacity: 0.7; }
.opt-card.caution::before { content: '~ With care'; position: absolute; top: 8px; right: 8px; background: #FEF9C3; color: #713F12; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.opt-card.selected::after { content: '\2713'; position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; display: grid; place-items: center; }
.opt-code { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
.opt-name { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.opt-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.opt-icon { font-size: 28px; margin-bottom: 10px; }

.palette-card { padding: 14px; }
.palette-swatch-row { display: flex; gap: 6px; margin-bottom: 10px; }
.swatch { width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); }
.palette-name { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
.palette-id { font-size: 10px; color: var(--muted); font-weight: 600; }
.palette-vibe { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

.sub-section { margin-bottom: 28px; }
.sub-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.sub-section-num { width: 26px; height: 26px; background: var(--primary); color: #fff; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.sub-section-title { font-size: 15px; font-weight: 800; color: var(--primary); }
.sub-section-tag { font-size: 10px; font-weight: 700; background: #FEF3C7; color: #92400E; padding: 2px 8px; border-radius: 10px; }

.text-input-wrap { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 600px; }
.text-input-wrap textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; resize: vertical; min-height: 80px; color: var(--text); outline: none; transition: border-color 0.2s; }
.text-input-wrap textarea:focus { border-color: var(--primary); }

.nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; }
.btn { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; border: none; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,58,95,0.3); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: transparent; color: var(--primary); border: 2px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); }
.btn-generate { background: var(--accent); color: #7C2D12; font-size: 16px; padding: 14px 36px; }
.btn-generate:hover { background: #D97706; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,158,11,0.4); }

.summary-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
.chip .chip-label { font-weight: 600; color: var(--primary); }
.chip:hover { border-color: var(--primary); }

.output-wrap { display: none; }
.output-wrap.visible { display: block; }
.output-header { background: linear-gradient(135deg, var(--primary) 0%, #2D5A8E 100%); color: #fff; border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
.output-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.output-header p { font-size: 14px; color: #94A3B8; }
.summary-table { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
@media (max-width: 700px) { .summary-table { grid-template-columns: repeat(2, 1fr); } }
.sum-cell { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; }
.sum-label { font-size: 10px; color: #94A3B8; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.sum-value { font-size: 13px; font-weight: 700; color: #fff; margin-top: 3px; }

.prompt-block { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 18px; overflow: hidden; box-shadow: var(--shadow); }
.prompt-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.prompt-platform { display: flex; align-items: center; gap: 8px; }
.platform-dot { width: 10px; height: 10px; border-radius: 50%; }
.platform-name { font-size: 14px; font-weight: 700; color: var(--primary); }
.platform-sub { font-size: 12px; color: var(--muted); }
.btn-copy { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-copy:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-copy.copied { background: var(--success); color: #fff; border-color: var(--success); }
.prompt-body { padding: 18px 20px; }
.prompt-text { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; line-height: 1.7; color: var(--text); background: #F8FAFC; border-radius: 8px; padding: 14px; word-break: break-word; white-space: pre-wrap; border: 1px solid var(--border); }
.prompt-note { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
.prompt-note strong { color: var(--primary); }

.text-overlay-box { background: #FFFBEB; border: 1px solid #FCD34D; border-radius: var(--radius); padding: 18px 20px; margin-bottom: 18px; }
.text-overlay-box h4 { font-size: 14px; font-weight: 700; color: #92400E; margin-bottom: 8px; }
.text-overlay-content { font-size: 16px; font-weight: 600; color: var(--text); background: #fff; border-radius: 8px; padding: 12px 16px; border: 1px solid #FCD34D; }

.negative-box { background: #FFF1F2; border: 1px solid #FECDD3; border-radius: var(--radius); padding: 14px 18px; margin-bottom: 18px; }
.negative-box h4 { font-size: 12px; font-weight: 700; color: #BE123C; margin-bottom: 6px; }
.negative-text { font-family: monospace; font-size: 12px; color: #881337; }

.track-badge { display: inline-flex; align-items: center; gap: 6px; background: #F0F9FF; border: 1px solid #BFDBFE; color: var(--primary); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
</style>
</head>

  archetype: null,

};

// Dynamic step flow
function getSteps() {
  const isTrackA = STATE.track === 'A';
  const stepIds = ['template', 'style', 'layout', 'track', 'colour'];
  if (isTrackA) stepIds.push('finish');
  stepIds.push('font');
  stepIds.push('visual');
  if (isTrackA) stepIds.push('intensity');
  stepIds.push('text');
  return stepIds;
}

const STEP_LABELS = {
  template: 'Template',
  style: 'Style',
  layout: 'Layout',
  track: 'Track',
  colour: 'Colour',
  finish: 'Finish',
  font: 'Font',
  visual: 'Visual',
  intensity: 'Intensity',
  text: 'Text',
};

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function getArchetype() { return ARCHETYPES.find(a => a.id === STATE.archetype); }
function getTrack() { return TRACKS.find(t => t.id === STATE.track); }
function getLayout() { return LAYOUTS.find(l => l.id === STATE.layout); }

function getPalette() {
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  if (!tv) return null;
  return { ...base, bg: tv.bg, text: tv.text, accent: tv.accent, secondary: tv.secondary, natural: tv.natural };
}

function getFont() {
  const base = FONTS_BASE.find(f => f.id === STATE.font);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  return { ...base, heading: tv.heading, body: tv.body, desc: tv.desc };
}

function getIllusItem() {
  if (!STATE.illusItem || STATE.illusItem === 'NONE') return null;
  for (const cat of ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  return null;
}

function canProceed() {
  const steps = getSteps();
  const stepIndex = steps.indexOf(getCurrentStepId());

  switch (stepIndex) {
    case 0: return !!STATE.archetype;
    case 1: return !!STATE.step2;
    case 2: return !!STATE.layout;
    case 3: return !!STATE.track;
    case 4: return !!STATE.palette;
    case 5: return STATE.track === 'A' ? !!STATE.finish : true;
    case 6: return !!STATE.font;
    case 7: {
      if (STATE.archetype === 'A1') {
        return !!STATE.frameDecoration && !!STATE.illusItem && (STATE.illusItem === 'NONE' || !!STATE.illusSize);
      }
      if (STATE.archetype === 'A2') {
        return !!STATE.illusItem && !!STATE.illusSize;
      }
      return !!STATE.illusItem;
    }
    case 8: return STATE.track === 'A' ? !!STATE.customPreset : true;
    case 9: return true;
    default: return false;
  }
}

function getCurrentStepId() {
  const steps = getSteps();
  return steps[Math.min(STATE.step - 1, steps.length - 1)];
}

function select(key, value) {
  STATE[key] = value;
  if (key === 'archetype') {
    STATE.step2 = null; STATE.layout = null; STATE.track = null; STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
  }
  if (key === 'step2') { STATE.layout = null; }
  if (key === 'track') {
    STATE.palette = null; STATE.font = null;
    if (value !== 'A') {
      STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    }
  }
  render();
}

function jumpTo(step) {
  if (step <= STATE.step) { STATE.step = step; render(); }
}

function layoutDiagram(layout) {
  const L = LAYOUTS.find(l => l.id === layout);
  if (!L) return '';
  const w = 52, h = 74;
  if (L.type === 'vertical') {
    const tH = L.textFirst ? 28 : 52, vH = L.textFirst ? 52 : 28;
    const tY = L.textFirst ? 0 : vH, vY = L.textFirst ? tH : 0;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:8px;flex-shrink:0;"><rect width="${w}" height="${h}" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>

function renderProgress() {
  const steps = getSteps();
  const el = document.getElementById('progressSteps');
  let html = '';
  steps.forEach((id, i) => {
    const label = STEP_LABELS[id];
    const stepNum = i + 1;
    const isDone = STATE.step > stepNum;
    const isActive = STATE.step === stepNum;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    html += `<div class="prog-step ${cls}">
      <div class="num"><span>${stepNum}</span></div>
      <span class="label">${label}</span>
    </div>`;
    if (i < steps.length - 1) {
      html += `<div class="prog-connector ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

              <div class="opt-code">${s.id}</div>

}

      <div class="step-header">
        <div class="step-eyebrow">Step 9 · Customization Intensity</div>

        <button style="padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;" onclick="STATE.textLang = 'Hindi'; render();" class="${STATE.textLang === 'Hindi' ? 'active' : ''}" style="background: ${STATE.textLang === 'Hindi' ? '#EFF6FF' : '#fff'};">HI</button>

// ═══════════════════════════════════════════════════════════
// PROMPT GENERATION
// ═══════════════════════════════════════════════════════════

function getFinishPrompt() {
  if (STATE.track !== 'A' || !STATE.finish) return '';
  const f = FINISH_OPTIONS.find(x => x.id === STATE.finish);
  return f ? f.promptPhrase : '';
}
function getIllusRenderPrompt() {
  if (STATE.track !== 'A' || !STATE.illusRender) return '';
  const r = ILLUS_RENDER_OPTIONS.find(x => x.id === STATE.illusRender);
  return r ? r.promptPhrase : '';
}
function getMotifPrompt() {
  if (STATE.track !== 'A' || !STATE.motifSet) return '';
  const m = MOTIF_OPTIONS.find(x => x.id === STATE.motifSet);
  return m ? m.promptPhrase : '';
}
function getCustomPresetPrompt() {
  if (STATE.track !== 'A' || !STATE.customPreset) return '';
  const c = CUSTOM_PRESETS.find(x => x.id === STATE.customPreset);
  return c ? c.promptPhrase : '';
}
function getFrameDeco() { return FRAME_DECO_OPTS.find(f => f.id === STATE.frameDecoration); }
function getIllusSize() { return ILLUS_SIZE_OPTS.find(s => s.id === STATE.illusSize); }

function getTextSpaceInstruction(layout, textInput, archetype) {
  const len = textInput.trim().split(/\s+/).filter(Boolean).length;
  const size = len === 0 ? 'clean empty' : len <= 5 ? 'small clear' : len <= 15 ? 'clear' : 'generous clear';
  if (archetype === 'B1') return '';
  const posMap = {
    L1: `${size} space in the upper 30% of the image for text overlay`,
    L2: `${size} central area with softened tones for text overlay`,
    L3: `${size} space on the left half for text overlay, visual anchored right`,
    L4: `${size} space on the right half for text overlay, visual anchored left`,
    L5: `${size} space in the lower 25% for text overlay`,
    L6: `completely empty central zone for text overlay, small illustration at bottom corner only`,
  };
  return posMap[layout] || 'clear space for text overlay';
}

function getColourRoles() {
  // Returns colour role assignment for Track A palettes
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || STATE.track !== 'A') return null;
  return base.tracks.A?.roles || null;
}

function buildColourDirective() {
  // Builds explicit colour zone assignment for the prompt
  const roles = getColourRoles();
  if (!roles) {
    // Non-Track-A: use simple natural colour description
    const pal = getPalette();
    return pal ? pal.natural : 'warm morning tones';
  }
  // Track A: explicit zone-by-zone colour assignment
  return `${roles.canvas}. Frame and border motifs rendered in ${roles.frame}, clearly distinct from background. Illustration subject rendered in ${roles.illus} with ${roles.illusAccent} — the illustration must NOT be ${roles.banColour}, it must contrast sharply against the background. White (#FFFFFF) sparkle particle highlights`;
}

function buildSubjectLine() {
  const { archetype, step2, layout, frameDecoration } = STATE;
  const illusItem = getIllusItem();
  const illusSize = getIllusSize();
  const isTrackA = STATE.track === 'A';
  const renderStyle = isTrackA ? getIllusRenderPrompt() : (TRACKS.find(t=>t.id===STATE.track)?.illusStyle || '');
  const motifPhrase = isTrackA ? getMotifPrompt() : '';
  const finishPhrase = isTrackA ? getFinishPrompt() : '';
  const customPhrase = isTrackA ? getCustomPresetPrompt() : '';
  const trackData = getTrack();
  const colourDirective = buildColourDirective();

  const overlayDescs = {
    O1: 'moody cinematic atmosphere', O2: 'bright top-lit morning atmosphere',
    O3: 'warm golden morning atmosphere', O4: 'centrally lit diffused morning light',
    O5: 'warm bright morning atmosphere with rich depth',
  };

  if (archetype === 'A1') {
    const frameShapes = { F1:'rectangular border frame running along all four edges of the canvas', F2:'horizontal decorative band frame at the top and bottom edges', F3:'single decorative band along the bottom edge', F4:'ornamental decorative accents at all four corners of the canvas', F5:'curved arch canopy framing the top of the canvas with decorative side patches' };
    const decoStyle = getFrameDeco();
    const decoPhrase = decoStyle ? decoStyle.promptPhrase : 'clean border';
    const frameDesc = `${frameShapes[step2] || 'decorative border frame'}, ${decoPhrase}`;
    const item = illusItem ? illusItem.name.toLowerCase() : null;
    const sizePhrase = illusSize ? `, ${illusSize.promptPhrase}` : '';
    const renderPhrase = renderStyle ? `, rendered in ${renderStyle}` : '';
    const motifPart = motifPhrase ? `, ${motifPhrase}` : '';
    const finishPart = finishPhrase ? `, ${finishPhrase}` : '';
    const customPart = customPhrase ? `, ${customPhrase}` : '';

    if (!item) return `${frameDesc}${motifPart}, ${colourDirective}${finishPart}, no illustration, clean open canvas for text${customPart}`;
    if (layout === 'L6') return `${frameDesc}${motifPart}, ${colourDirective}${finishPart}, single isolated ${item} illustration placed only at the bottom-right corner${renderPhrase}${sizePhrase}, central 60 percent of canvas completely empty and plain for text${customPart}`;
    return `${frameDesc}${motifPart}, ${colourDirective}${finishPart}, ${item} illustration placed inside the frame in the designated illustration zone${renderPhrase}${sizePhrase}${customPart}`;
  }

  if (archetype === 'A2') {
    const item = illusItem ? illusItem.name : 'morning scene';
    const sizePhrase = illusSize ? illusSize.promptPhrase : 'balanced scale';
    const renderPhrase = renderStyle ? `rendered in ${renderStyle}` : 'flat 2D illustration';
    const finishPart = finishPhrase ? `, background treatment: ${finishPhrase}` : '';
    const customPart = customPhrase ? `, ${customPhrase}` : '';
    const illusZone = { L1:'placed in the lower 65 percent of the canvas, upper 35 percent left as clean empty space for text overlay', L2:'placed filling the full canvas as a rich illustration background', L3:'placed on the right two-thirds of the canvas, left one-third left as clean empty space for text', L4:'placed on the left two-thirds of the canvas, right one-third left as clean empty space for text', L5:'placed in the upper 65 percent of the canvas, lower 35 percent left as clean empty space for text', L6:'placed only in the bottom corner as a small accent, central zone fully clear for text' };
    const zone = illusZone[layout] || 'placed in the designated illustration zone';
    const density = { Light:`${item} as the single primary illustration, no other elements, generous blank space`, Medium:`${item} as the primary element with 2 to 3 complementary small morning motifs such as sunbeams dewdrops or small flowers arranged naturally around it`, Dense:`${item} as the central element surrounded by 5 to 6 varied morning elements such as flowers sunbeams birds leaves and morning dew arranged in a rich festive composition` };
    return `${density[step2] || density.Medium}, ${renderPhrase}, ${zone}, ${sizePhrase}, ${colourDirective}${finishPart}${customPart}`;
  }

  if (archetype === 'B1') {
    const item = illusItem ? illusItem.name : 'golden morning scene';
    const mood = overlayDescs[step2] || 'warm golden morning light';
    const photoTreatment = trackData?.photoTreatment || '';
    const subjectFocus = { L1:`${item} in the lower-centre of the frame with open morning sky or bright background above`, L2:`${item} centred in the frame, surrounded by natural Indian morning setting`, L3:`${item} on the right side of the frame with natural Indian morning setting to the left`, L4:`${item} on the left side of the frame with natural Indian morning setting to the right`, L5:`${item} in the upper-centre of the frame with natural Indian morning setting below`, L6:`${item} centred prominently in the frame, natural morning setting around it` };
    const focus = subjectFocus[layout] || `${item} as the photographic subject in an Indian morning setting`;
    return `${focus}, ${mood}, ${photoTreatment}, warm golden morning light, India morning atmosphere, single continuous full-bleed photograph, one unified scene filling the entire 9:16 canvas`;
  }
  return illusItem ? illusItem.name : 'morning scene';
}

function buildStyleLine() {
  const { archetype, step2, frameDecoration, track } = STATE;
  const trackData = TRACKS.find(t => t.id === track);
  const bgStyle = trackData?.bgStyle || '';
  const ref = trackData?.illusRef || '';
  if (archetype === 'A1') return `Indian morning aesthetic, ${bgStyle} background, reference: ${ref}`;
  if (archetype === 'A2') return `2D artwork not photographic, ${bgStyle} background, Indian morning aesthetic, reference: ${ref}`;
  if (archetype === 'B1') return 'photorealistic photography, DSLR quality, natural lighting, sharp focus, no CGI, no illustration, no graphic design elements, pure photography';
  return 'flat illustration style';
}

function buildNegativeTerms() {
  const { archetype, frameDecoration, layout } = STATE;
  const base = 'text letters words numbers typography watermarks logos blurry low-quality';
  const roles = getColourRoles();
  const banColour = roles ? `${roles.banColour} illustration ${roles.banColour} subject monochrome single-colour illustration` : '';

  if (archetype === 'B1') return `collage composite split panel two photos stacked dual image ${base} illustration graphic design overlay decorative border frame ornament vector art flat design`;
  if (archetype === 'A2') return `${base} ${banColour} photographic background photo landscape realistic 3D render multiple conflicting styles`;
  if (archetype === 'A1') {
    let neg = `${base} ${banColour} photographic background landscape scene photo background imagery`;
    if (frameDecoration === 'Plain') neg += ' ornate decoration excessive ornamentation motifs on frame';
    if (layout === 'L6') neg += ' illustration in center element in center background scene';
    return neg;
  }
  return base;
}

function buildMJPrompt() {
  const subject = buildSubjectLine();
  const style = buildStyleLine();
  const textSpace = getTextSpaceInstruction(STATE.layout, STATE.textInput, STATE.archetype);
  const negative = buildNegativeTerms();
  const isPhoto = STATE.archetype === 'B1';
  // Colour directive is already embedded in subject line for Track A
  // For non-Track-A, add natural colour description
  const roles = getColourRoles();
  const extraColour = (!roles && !isPhoto) ? `, ${getPalette()?.natural || 'warm morning tones'}` : '';
  const textPart = textSpace ? `, ${textSpace}` : '';
  const flag = isPhoto ? '--style raw' : '';
  return `${subject}${extraColour}, ${style}${textPart}, ornate festive Indian greeting poster, high detail 8K, 9:16 portrait format --ar 9:16 --s 400 --no ${negative} ${flag}`.replace(/\s+/g,' ').trim();
}

function buildLeonardoPrompt() {
  const subject = buildSubjectLine();
  const style = buildStyleLine();
  const textSpace = getTextSpaceInstruction(STATE.layout, STATE.textInput, STATE.archetype);
  const negative = buildNegativeTerms();
  const roles = getColourRoles();
  const extraColour = (!roles && STATE.archetype !== 'B1') ? ` ${getPalette()?.natural || 'warm morning tones'}.` : '';
  const textPart = textSpace ? ` ${textSpace}.` : '';
  const prompt = `${subject}. ${style}.${extraColour}${textPart} Ornate festive Indian greeting poster, high detail. Portrait 9:16 format.`.replace(/\s+/g,' ').trim();
  const neg = negative.replace(/\s+/g, ', ');
  return { prompt, negative: neg };
}

function buildFireflyPrompt() {
  const subject = buildSubjectLine();
  const style = buildStyleLine();
  const textSpace = getTextSpaceInstruction(STATE.layout, STATE.textInput, STATE.archetype);
  const negative = buildNegativeTerms();
  const roles = getColourRoles();
  const extraColour = (!roles && STATE.archetype !== 'B1') ? ` ${getPalette()?.natural || 'warm morning tones'}.` : '';
  const textPart = textSpace ? ` ${textSpace}.` : '';
  return `${subject}. ${style}.${extraColour}${textPart} Ornate festive Indian greeting poster. Portrait 9:16 format for mobile. Do not include any ${negative.replace(/\s+/g, ', ')} anywhere in the image.`.replace(/\s+/g,' ').trim();
}

function copyPrompt(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '\u2713 Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderOutput() {
  const mj = buildMJPrompt();
  const ff = buildFireflyPrompt();
  const leo = buildLeonardoPrompt();
  const arch = getArchetype();
  const pal = getPalette();
  const lay = getLayout();
  const fon = getFont();
  const trk = getTrack();
  const item = getIllusItem();
  const isTrackA = STATE.track === 'A';
  const textNote = STATE.textInput.trim();

  let html = `<div class="output-header"><h2>\u2728 Your Prompts are Ready</h2>
    <p>Track ${trk?.id} (${trk?.name}). Copy the prompt for your preferred AI image tool.</p>

      <div class="sum-cell"><div class="sum-label">Track</div><div class="sum-value">${trk?.id || '-'} ${trk?.name || ''}</div></div>

      <div class="sum-cell"><div class="sum-label">Palette</div><div class="sum-value">${pal?.name || '-'}</div></div>
      ${isTrackA ? `<div class="sum-cell"><div class="sum-label">Finish</div><div class="sum-value">${FINISH_OPTIONS.find(f=>f.id===STATE.finish)?.name || '-'}</div></div>` : ''}
      <div class="sum-cell"><div class="sum-label">Font</div><div class="sum-value">${fon?.heading || '-'}</div></div>
      <div class="sum-cell"><div class="sum-label">Visual</div><div class="sum-value">${item?.name || (STATE.illusItem==='NONE'?'None':'-')}</div></div>
      ${isTrackA ? `<div class="sum-cell"><div class="sum-label">Rendering</div><div class="sum-value">${ILLUS_RENDER_OPTIONS.find(r=>r.id===STATE.illusRender)?.name || '-'}</div></div>` : ''}
      ${isTrackA ? `<div class="sum-cell"><div class="sum-label">Intensity</div><div class="sum-value">${CUSTOM_PRESETS.find(c=>c.id===STATE.customPreset)?.name?.split(' — ')[0] || '-'}</div></div>` : ''}
    </div></div>`;

  if (textNote) {
    const posMap = { L1:'Upper third', L2:'Centred overlay', L3:'Left half', L4:'Right half', L5:'Lower strip', L6:'Central zone' };
    html += `<div class="text-overlay-box"><h4>\uD83D\uDCDD Text to Overlay Manually</h4>

        <span class="text-meta-chip">Lang: ${STATE.textLang}</span>
        <span class="text-meta-chip">Position: ${posMap[STATE.layout] || '-'}</span>
        <span class="text-meta-chip">Font: ${fon?.heading || '-'}</span>
        <span class="text-meta-chip">Text colour: ${pal?.text || '-'}</span>
      </div></div>`;
  }

  // Midjourney prompt block
  html += `<div class="prompt-block"><div class="prompt-header"><div class="prompt-platform">

    <div class="platform-sub">Use with /imagine</div></div></div>
    <button class="btn-copy" onclick="copyPrompt('mjP',this)">Copy Prompt</button></div>
    <div class="prompt-body"><div class="prompt-text" id="mjP">${mj}</div>
    <div class="prompt-note"><strong>Tip:</strong> <code>/imagine</code> then paste. Add <code>--v 6</code> for best quality.</div></div></div>`;

  // Leonardo prompt block
  if (isTrackA) {
    html += `<div class="prompt-block"><div class="prompt-header"><div class="prompt-platform">
      <div class="platform-dot" style="background:#8B5CF6;"></div><div><div class="platform-name">Leonardo.ai</div>
      <div class="platform-sub">Alchemy ON, PhotoReal OFF</div></div></div>
      <button class="btn-copy" onclick="copyPrompt('leoP',this)">Copy Prompt</button></div>
      <div class="prompt-body"><div class="prompt-text" id="leoP">${leo.prompt}</div>
      <div class="prompt-note"><strong>Negative prompt:</strong> ${leo.negative}</div></div></div>`;
  }

  // Firefly prompt block
  html += `<div class="prompt-block"><div class="prompt-header"><div class="prompt-platform">
    <div class="platform-dot" style="background:#E8613C;"></div><div><div class="platform-name">Adobe Firefly</div>
    <div class="platform-sub">Content type: ${STATE.archetype==='B1'?'Photo':'Art'}</div></div></div>
    <button class="btn-copy" onclick="copyPrompt('ffP',this)">Copy Prompt</button></div>
    <div class="prompt-body"><div class="prompt-text" id="ffP">${ff}</div>

  // Negative terms box

function resetTool() {
  Object.assign(STATE, { step:1, archetype:null, step2:null, layout:null, track:null, palette:null, font:null, illusCategory:null, illusItem:null, frameDecoration:null, illusSize:null, finish:null, illusRender:null, motifSet:null, customPreset:null, textInput:'', textLang:'Hindi' });
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════

function render() {
  renderProgress();

  const steps = getSteps();
  const currentStepIndex = Math.min(STATE.step - 1, steps.length - 1);
  const currentStepId = steps[currentStepIndex];

  let content = '';

  switch (currentStepId) {
    case 'template': content = renderStep1(); break;
    case 'style': content = renderStep2(); break;
    case 'layout': content = renderStep3(); break;
    case 'track': content = renderStep4(); break;
    case 'colour': content = renderStep5(); break;
    case 'finish': content = renderStep6(); break;
    case 'font': content = renderStepFont(); break;
    case 'visual': content = renderStep7(); break;
    case 'intensity': content = renderStep8(); break;
    case 'text': content = renderStepText(); break;
  }

  const isLastStep = currentStepIndex === steps.length - 1;

  content += `
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="prevStep()" ${STATE.step===1?'style="visibility:hidden"':''}>← Back</button>
      ${isLastStep
        ? `<button class="btn btn-generate" onclick="generateOutput()">\u2728 Generate Prompts</button>`
        : `<button class="btn btn-primary" onclick="nextStep()" ${!canProceed()?'disabled':''}>Continue →</button>`
      }
    </div>
    <div id="outputSection" class="output-wrap"></div>`;

  document.getElementById('app').innerHTML = content;

  const ta = document.getElementById('textInput');
  if (ta) ta.value = STATE.textInput;
}

function nextStep() {
  if (!canProceed()) return;
  const steps = getSteps();
  STATE.step = Math.min(STATE.step + 1, steps.length);
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}
function prevStep() {
  STATE.step = Math.max(STATE.step - 1, 1);
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}
function generateOutput() {
  render();
  const el = document.getElementById('outputSection');
  el.className = 'output-wrap visible';
  el.innerHTML = renderOutput();
  el.scrollIntoView({behavior:'smooth'});
}

function selectCat(catId) {
  STATE.illusCategory = catId;
  if (!catId) STATE.illusItem = null;
  render();
}

// Initialize on load
window.addEventListener('load', () => {
  render();
  document.getElementById('textInput')?.addEventListener('input', (e) => {
    STATE.textInput = e.target.value;
  });
});
</script>
</body>
</html>
