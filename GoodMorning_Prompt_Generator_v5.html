function getArchetype() { return ARCHETYPES.find(a => a.id === STATE.archetype); }
function getTrack() { return TRACKS.find(t => t.id === STATE.track); }
function getLayout() { return LAYOUTS.find(l => l.id === STATE.layout); }

function getPalette() {
  const base = PALETTES_BASE.find(p => p.id === STATE.palette);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  if (!tv) return null;
  return { ...base, ...tv };
}

function getFont() {
  const base = FONTS_BASE.find(f => f.id === STATE.font);
  if (!base || !STATE.track) return null;
  const tv = base.tracks[STATE.track];
  return { ...base, ...tv };
}

function getIllusItem() {
  if (!STATE.illusItem || STATE.illusItem === 'NONE') return null;
  for (const cat of ILLUS_CATS) {
    const item = cat.items.find(i => i.id === STATE.illusItem);
    if (item) return item;
  }
  return null;
}

}

function getPaletteCountForTrack(track) {
  const counts = { A: 9, B: 8, C: 8, D: 10, E: 9 };
  return counts[track] || 9;
}

function canProceed() {
  const stepId = getCurrentStepId();

  switch (stepId) {
    case 'template': return !!STATE.archetype;
    case 'style': return !!STATE.step2;
    case 'layout': return !!STATE.layout;
    case 'track': return !!STATE.track;
    case 'colour_finish': return !!STATE.palette && !!STATE.finish;
    case 'visual': {
      if (!STATE.illusItem) return false;
      if (STATE.illusItem === 'NONE') return true;
      if (STATE.archetype === 'A1') return !!STATE.frameDecoration && !!STATE.illusSize;
      return !!STATE.illusSize;
    }
    case 'intensity': return !!STATE.customPreset;
    case 'font_text': return !!STATE.font;
    default: return false;
  }
}

function getCurrentStepId() {
  const steps = getSteps();
  return steps[Math.min(STATE.step - 1, steps.length - 1)];
}

function select(key, value) {
  STATE[key] = value;
  if (key === 'archetype') {
    STATE.step2 = null; STATE.layout = null; STATE.track = null; STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
    STATE.frameDecoration = null; STATE.illusSize = null; STATE.illusItem = null; STATE.illusCategory = null;
  }
  if (key === 'step2') { STATE.layout = null; }
  if (key === 'track') {
    STATE.palette = null; STATE.font = null;
    STATE.finish = null; STATE.illusRender = null; STATE.motifSet = null; STATE.customPreset = null;
  }
  if (key === 'frameDecoration' && value === 'Plain') {
    STATE.motifSet = null; // Plain frame = no motifs
  }
  render();
}

function jumpTo(step) {
  if (step <= STATE.step) { STATE.step = step; render(); }
}

    'overlay-full': `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:6px;"><rect width="${w}" height="${h}" rx="3" fill="#93C5FD"/><rect width="${w}" height="${h}" rx="3" fill="rgba(0,0,0,0.45)"/></svg>`,
    'overlay-top': `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:6px;"><rect width="${w}" height="${h}" rx="3" fill="#93C5FD"/><defs><linearGradient id="gt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0.6)"/><stop offset="100%" stop-color="rgba(0,0,0,0.05)"/></linearGradient></defs><rect width="${w}" height="${h}" rx="3" fill="url(#gt)"/></svg>`,
    'overlay-bottom': `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:6px;"><rect width="${w}" height="${h}" rx="3" fill="#93C5FD"/><defs><linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0.05)"/><stop offset="100%" stop-color="rgba(0,0,0,0.6)"/></linearGradient></defs><rect width="${w}" height="${h}" rx="3" fill="url(#gb)"/></svg>`,
    'overlay-vignette': `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:6px;"><rect width="${w}" height="${h}" rx="3" fill="#93C5FD"/><defs><radialGradient id="gv"><stop offset="30%" stop-color="rgba(0,0,0,0.02)"/><stop offset="100%" stop-color="rgba(0,0,0,0.55)"/></radialGradient></defs><rect width="${w}" height="${h}" rx="3" fill="url(#gv)"/></svg>`,
    'overlay-caption': `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="margin-bottom:6px;"><rect width="${w}" height="${h}" rx="3" fill="#93C5FD" stroke="#CBD5E1" stroke-width="1"/><rect y="${h-12}" width="${w}" height="12" rx="3" fill="rgba(0,0,0,0.5)"/></svg>`,
  };
  return d[type] || '';
}

function renderProgress() {
  const steps = getSteps();
  const el = document.getElementById('progressSteps');
  let html = '';
  steps.forEach((id, i) => {
    const label = STEP_LABELS[id];
    const stepNum = i + 1;
    const isDone = STATE.step > stepNum;
    const isActive = STATE.step === stepNum;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    html += `<div class="prog-step ${cls}"><div class="num"><span>${stepNum}</span></div><span class="label">${label}</span></div>`;
    if (i < steps.length - 1) {
      html += `<div class="prog-connector ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

function render() {
  renderProgress();

  const stepId = getCurrentStepId();
  let content = '';

  switch (stepId) {
    case 'template': content = renderStep1(); break;
    case 'style': content = renderStep2(); break;
    case 'layout': content = renderStep3(); break;
    case 'track': content = renderStep4(); break;
    case 'colour_finish': content = renderStepColourFinish(); break;
    case 'visual': content = renderStep8(); break;
    case 'intensity': content = renderStep9(); break;
    case 'font_text': content = renderStepFontText(); break;
  }

  const steps = getSteps();
  const isLast = STATE.step >= steps.length;

  content += `<div class="nav-row"><button class="btn btn-secondary" onclick="STATE.step=Math.max(1,STATE.step-1);render();" ${STATE.step === 1 ? 'disabled' : ''}>← Back</button><div>${STATE.step} / ${steps.length}</div><button class="btn btn-primary" onclick="STATE.step=Math.min(${steps.length},STATE.step+1);render();" ${!canProceed() || isLast ? 'disabled' : ''}>Next →</button>${isLast ? '<button class="btn btn-generate" onclick="generatePrompts();">Generate Prompts</button>' : ''}</div>`;

  document.getElementById('app').innerHTML = content;
  document.getElementById('textInput')?.focus();
}

function buildSubjectLine() {
  const track = getTrack();
  const palette = getPalette();
  const font = getFont();
  const layout = getLayout();

  const trackName = track.name;
  const paletteName = palette.name;
  const layoutName = layout.name;

}

function buildNegatives() {
  const palette = getPalette();
  const roles = palette.roles || {};
  const track = STATE.track;
  const illusRender = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;

  let negs = ['text', 'letters', 'words', 'numbers', 'typography', 'watermarks', 'logos', 'blurry', 'low quality'];

  if (track === 'A') negs.push('photorealistic', 'cinematic lighting', 'landscape background', 'minimalism', 'flat modern', 'grunge', 'grayscale');
  if (track === 'B') negs.push('Bollywood', 'maximalist', 'gold foil', 'sparkle', 'metallic', 'loud colours');
  if (track === 'C') negs.push('photorealistic', 'ornate', 'gold foil', 'busy', 'multiple illustrations', 'vivid', 'gradient', 'doodles');
  if (track === 'D') negs.push('photorealism', 'cinematic', 'ornate', 'gold', 'film grain', 'muted', 'serif');
  if (track === 'E') negs.push('harsh', 'neon', 'loud', 'metallic', 'glitter', 'sparkle', 'ornate heavy decoration', 'bold thick outlines');

  if (roles.banColour) {
    negs.push(`${roles.banColour} illustration`, `${roles.banColour} subject`, 'monochrome single-colour');
  }
  if (illusRender && illusRender.id === 'IR-1') {
    negs.push('illustration hidden behind decoration', 'illustration merged with ornamental pattern');
  } else if (STATE.illusItem && STATE.illusItem !== 'NONE' && STATE.motifSet) {
    negs.push('illustration hidden behind decoration', 'motif overlapping illustration');
  }

  // Prevent illustration render style from bleeding into border/frame
  if (illusRender && STATE.illusItem && STATE.illusItem !== 'NONE') {
    negs.push('border style matching illustration style', 'frame affected by illustration rendering');
  }

  return negs;
}

function getStep2Option() {
  if (!STATE.step2) return null;
  const arch = getArchetype();
  const opts = STEP2_OPTIONS[arch.step2Key] || [];
  return opts.find(o => o.id === STATE.step2);
}

function getIllusSizeLabel() {
  if (!STATE.illusSize) return null;
  return ILLUS_SIZE_OPTS.find(o => o.id === STATE.illusSize);
}

function gatherPromptData() {
  const arch = getArchetype();
  const step2Opt = getStep2Option();
  const layout = getLayout();
  const track = getTrack();
  const palette = getPalette();
  const font = getFont();
  const finish = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
  const illusRender = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
  const motif = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
  const preset = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
  const illusItem = getIllusItem();
  const illusSize = getIllusSizeLabel();
  const roles = palette.roles || {};

  // Size phrase
  let sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
  if (illusSize) {
    if (illusSize.id === 'Small') sizePh = 'small accent illustration under 15 percent of canvas';
    if (illusSize.id === 'Medium') sizePh = 'medium-scale illustration occupying 30 to 40 percent of canvas';
    if (illusSize.id === 'Large') sizePh = 'large hero illustration occupying 50 percent or more of canvas';
  }

  // Frame phrase (A1)
  let framePh = '';
  if (arch.id === 'A1' && step2Opt) {
    const deco = STATE.frameDecoration || 'Simple';
    let frameShape = '';
    if (step2Opt.id === 'F1') frameShape = 'rectangular decorative border frame on all four edges';
    else if (step2Opt.id === 'F2') frameShape = 'decorative bands at top and bottom edges only with open sides';
    else if (step2Opt.id === 'F3') frameShape = 'single decorative band at the bottom edge';
    else if (step2Opt.id === 'F4') frameShape = 'ornamental corner accents at all four corners';
    else if (step2Opt.id === 'F5') frameShape = 'curved arch canopy frame at top with side patches';
    else frameShape = 'decorative border frame';

    let decoPh = 'with subtle motifs at corners';
    if (deco === 'Plain') decoPh = 'with clean simple border lines only no motifs no ornamentation';
    if (deco === 'Detailed') decoPh = 'with rich ornate florals paisleys and mandalas throughout every edge of the frame';

    const frameCol = roles.frame || 'golden metallic';
    framePh = `${frameShape} rendered in ${frameCol} ${decoPh}`;
  }

  // Overlay phrase (B1)
  let overlayPh = '';
  if (arch.id === 'B1' && step2Opt) {
    overlayPh = step2Opt.desc.toLowerCase();
  }

  // Density phrase (A2)
  let densityPh = '';
  if (arch.id === 'A2' && step2Opt) {
    densityPh = step2Opt.desc.toLowerCase();
  }

  // Layout text zone phrase
  let textZonePh = '';
  let illusPositionPh = '';
  if (layout.id === 'L1') {
    textZonePh = 'clean empty space in the upper 25 percent reserved for text overlay with no decorative elements in the text zone';
    illusPositionPh = 'positioned in the lower portion of the canvas below the text area';
  } else if (layout.id === 'L2') {
    textZonePh = 'text overlay centred on the canvas with semi-transparent breathing space behind text for legibility';
    illusPositionPh = 'positioned centrally on the canvas behind the text overlay';
  } else if (layout.id === 'L3') {
    textZonePh = 'left half clean for text overlay right half anchors the visual';
    illusPositionPh = 'positioned on the right half of the canvas anchoring the visual weight';
  } else if (layout.id === 'L4') {
    textZonePh = 'right half clean for text overlay left half anchors the visual';
    illusPositionPh = 'positioned on the left half of the canvas anchoring the visual weight';
  } else if (layout.id === 'L5') {
    textZonePh = 'clean empty space in the lower 25 percent reserved for text overlay with no decoration in the text zone';
    illusPositionPh = 'positioned in the upper portion of the canvas above the text area';
  } else if (layout.id === 'L6') {
    textZonePh = 'text occupies the central 60 percent of the canvas as the dominant element';
    illusPositionPh = 'placed at a corner of the canvas not overlapping the central text';
  }

  // Colour phrases
  let bgPh = roles.canvas || palette.tracks[STATE.track]?.natural || 'colourful background';
  let illusColPh = roles.illus || 'contrasting colours';
  let textColPh = roles.textCol || 'high-contrast text colour';

  // Motif phrase (only if not Plain frame)
  let motifPh = '';
  if (motif && !(arch.id === 'A1' && STATE.frameDecoration === 'Plain')) {
    motifPh = motif.promptPhrase;
  }

  // Rendering phrase with colour reinforcement for IR-2
  let renderPh = illusRender ? illusRender.promptPhrase : 'clean vector illustration';
  if (illusRender && illusRender.id === 'IR-2' && roles.banColour) {
    renderPh += `, using only the palette illustration colours not the ${roles.banColour} background colour`;
  }

  // Ornamental protection phrase (IR-1 only: keeps illustration distinct from ornamental rendering)
  let ornamentalGuard = '';
  if (illusRender && illusRender.id === 'IR-1' && illusItem) {
    ornamentalGuard = `the ${illusItem.name} must remain clearly visible as the central subject distinct from surrounding ornamentation, decorative elements frame the illustration but do not overlap or obscure it`;
  }

  // Motif boundary enforcement (ALL render styles: keeps motif patterns in border zone, not near illustration)
  let motifBoundary = '';
  if (motifPh && illusItem) {
    motifBoundary = `${motif.name} motif pattern stays only in the border frame edges not near the illustration`;
    if (ornamentalGuard) {
      ornamentalGuard += `, ${motifBoundary}`;
    }
  }

  // Track style phrase
  let stylePh = '';
  if (track.id === 'A') stylePh = 'ornate festive Indian greeting poster, Indian wedding card energy, traditional ornamental art, gold accents, sparkle particles, 8K ultra-detailed high detail';
  if (track.id === 'B') stylePh = 'contemporary Indian editorial illustration, Scroll.in aesthetic, warm earthy restraint, handcrafted feel, high resolution';
  if (track.id === 'C') stylePh = 'minimal elegant premium Indian poster, Muji Aesop packaging zen aesthetic, tonal refinement, typography dominant, generous empty space';
  if (track.id === 'D') stylePh = 'cheerful bright playful illustration, WhatsApp sticker energy, Alicia Souza Chumbak aesthetic, thick outlines, vibrant flat colours';
  if (track.id === 'E') stylePh = 'soft warm gentle morning poster, calming pastel botanical aesthetic, hand-painted greeting card feel, organic soft forms, generous breathing space, serene and inviting';

  // Preset intensity phrase
  let intensityPh = preset ? preset.promptPhrase : 'balanced composition';

  return { arch, step2Opt, layout, track, palette, font, finish, illusRender, motif, preset, illusItem, illusSize, roles, sizePh, framePh, overlayPh, densityPh, textZonePh, illusPositionPh, bgPh, illusColPh, textColPh, motifPh, renderPh, ornamentalGuard, motifBoundary, stylePh, intensityPh };
}

function buildPrompt(platform) {
  const d = gatherPromptData();

  if (platform === 'Midjourney') return buildMJPrompt(d);
  if (platform === 'Leonardo.AI') return buildLeonardoPrompt(d);
  return buildFireflyPrompt(d);
}

function buildMJPrompt(d) {
  // MJ: single dense paragraph, comma-separated visual phrases, --ar --s --no flags
  // Ordered by wizard steps for traceability
  const parts = [];

  // [Step 1: Template + Step 2: Style] Frame / Density / Overlay
  if (d.framePh) parts.push(`${d.framePh}, the frame border maintains its own consistent decorative style independent of the illustration rendering`);
  if (d.densityPh) parts.push(d.densityPh);
  if (d.overlayPh) parts.push(d.overlayPh);

  // [Step 3: Layout] Text zone + illustration position
  parts.push(d.textZonePh);

  // [Step 4: Track] — merged into style phrase below

  // [Step 5: Colour + Finish] Background and surface
  parts.push(`${d.bgPh}`);
  if (d.finish) parts.push(d.finish.promptPhrase);

  // [Step 6: Visual] Illustration + render + size + position + motif + guards
  if (d.illusItem) {
    parts.push(`the illustration only is ${d.renderPh} of ${d.illusItem.name} ${d.illusItem.desc} rendered in ${d.illusColPh}`);
    parts.push(`${d.sizePh} ${d.illusPositionPh}`);
    if (d.ornamentalGuard) parts.push(d.ornamentalGuard);
    else if (d.motifBoundary) parts.push(d.motifBoundary);
  }
  if (d.motifPh && d.arch.id === 'A1') parts.push(`${d.motifPh} as border decoration`);
  if (d.motifPh && d.arch.id !== 'A1') parts.push(d.motifPh);

  // [Step 7: Intensity]
  parts.push(d.intensityPh);

  // [Step 8: Font + Text]
  if (d.font) parts.push(`${d.font.heading} style heading text in ${d.textColPh}`);

  // [Track style + sparkle + format]
  parts.push(d.stylePh);
  if (d.track.id === 'A') parts.push('white sparkle particles scattered');
  parts.push('9:16 portrait format');

  const mainPrompt = parts.filter(p => p).join(', ');
  const negs = buildNegatives().join(', ');

  return `${mainPrompt} --ar 9:16 --s 400 --no ${negs}`;
}

function buildLeonardoPrompt(d) {
  // Leonardo: structured sections with labels — each maps to a wizard step
  const lines = [];

  // Header
  lines.push(`Create a Track ${d.track.id}: ${d.track.name} style Good Morning poster in 9:16 vertical format (1080x1350px).`);

  // [Step 5: Colour & Finish]
  lines.push(`\nBackground & Finish: ${d.bgPh}${d.finish ? ', ' + d.finish.promptPhrase : ''}.`);

  // [Step 1 + 2: Template + Style]
  if (d.framePh) {
    lines.push(`\nFrame (${d.step2Opt.name}): ${d.framePh}. The frame is a border element that must not overlap the illustration. The frame maintains its own consistent decorative style regardless of how the illustration is rendered.`);
  }
  if (d.overlayPh) lines.push(`\nOverlay (${d.step2Opt.name}): ${d.overlayPh}.`);
  if (d.densityPh) lines.push(`\nIllustration density (${d.step2Opt.name}): ${d.densityPh}.`);

  // [Step 3: Layout]
  lines.push(`\nLayout (${d.layout.name}): ${d.textZonePh}. Illustration ${d.illusPositionPh}.`);

  // [Step 6: Visual — Illustration + Render + Size + Motif + Guards]
  if (d.illusItem) {
    lines.push(`\nIllustration: ${d.illusItem.name} — ${d.illusItem.desc}.`);
    lines.push(`Render style (illustration only): ${d.renderPh}. Coloured in ${d.illusColPh}. The rendering style applies only to the illustration, not to the border or background.`);
    lines.push(`Size: ${d.sizePh}.`);
    if (d.ornamentalGuard) lines.push(`Spatial rule: ${d.ornamentalGuard}.`);
    else if (d.motifBoundary) lines.push(`Spatial rule: ${d.motifBoundary}.`);
  }
  if (d.motifPh) {
    lines.push(`\nMotif: ${d.motifPh}${d.motifBoundary ? ' — motif stays in border/edge zones only, not near the illustration' : ''}.`);
  }

  // [Step 7: Intensity]
  lines.push(`\nDecoration intensity: ${d.intensityPh}.`);

  // [Step 8: Font & Text]
  lines.push(`\nText style: "${d.font.heading}" heading, "${d.font.body}" body, ${d.textColPh} colour, flat treatment only.`);

  // [Track style]
  lines.push(`\nStyle: ${d.stylePh}.`);
  if (d.track.id === 'A') lines.push(`White sparkle particles scattered across the composition.`);

  // Negative
  const negs = buildNegatives();
  lines.push(`\nNegative prompt: ${negs.join(', ')}`);

  return lines.join('\n');
}

function buildFireflyPrompt(d) {
  // Firefly: structured descriptive sentences — each section maps to a wizard step
  const lines = [];

  // Header
  lines.push(`A ${d.track.name} style Good Morning greeting poster in vertical 9:16 format.`);

  // [Step 5: Colour & Finish]
  let scene = `Background & Finish: ${d.bgPh}`;
  if (d.finish) scene += ` with ${d.finish.promptPhrase}`;
  scene += '.';
  lines.push(`\n${scene}`);

  // [Step 1 + 2: Template + Style]
  if (d.framePh) {
    lines.push(`\nFrame (${d.step2Opt.name}): A ${d.framePh} encloses the composition. The frame is purely decorative and does not cover the main illustration. The frame maintains its own consistent style independent of illustration rendering.`);
  }
  if (d.overlayPh) lines.push(`\nOverlay (${d.step2Opt.name}): The photograph has ${d.overlayPh}.`);
  if (d.densityPh) lines.push(`\nDensity (${d.step2Opt.name}): The composition has ${d.densityPh}.`);

  // [Step 3: Layout]
  lines.push(`\nLayout (${d.layout.name}): ${d.textZonePh}. Illustration ${d.illusPositionPh}.`);

  // [Step 6: Visual — Illustration + Render + Size + Motif + Guards]
  if (d.illusItem) {
    lines.push(`\nIllustration: ${d.illusItem.name} — ${d.illusItem.desc}.`);
    lines.push(`Render style (illustration only): ${d.renderPh}. Coloured in ${d.illusColPh}. The rendering style applies only to this illustration, not to the frame or background.`);
    lines.push(`Size: ${d.sizePh}.`);
    if (d.ornamentalGuard) lines.push(`Visibility: The illustration must be clearly visible — ${d.ornamentalGuard}.`);
    else if (d.motifBoundary) lines.push(`Visibility: The ${d.illusItem.name} must be clearly visible — ${d.motifBoundary}.`);
  }
  if (d.motifPh) lines.push(`\nMotif: ${d.motifPh} appears along the borders${d.motifBoundary ? ', not near the illustration' : ''}.`);

  // [Step 7: Intensity]
  lines.push(`\nDecoration intensity: ${d.intensityPh}.`);

  // [Step 8: Font & Text]
  if (d.font) lines.push(`\nText style: ${d.font.heading} heading with ${d.font.body} body text, coloured in ${d.textColPh}.`);

  // [Track style]
  lines.push(`\nStyle reference: ${d.stylePh}.`);
  if (d.track.id === 'A') lines.push(`Small white sparkle particles are scattered across the design.`);

  // Do not include
  const negs = buildNegatives();
  lines.push(`\nDo not include: ${negs.join(', ')}.`);

  return lines.join('\n');
}

// Store generated prompts globally so copy buttons can reference them safely
const GENERATED_PROMPTS = {};

function generatePrompts() {
  if (!canProceed() || STATE.step < getSteps().length) {
    alert('Please complete all steps first');
    return;
  }

  const platforms = [
    { name: 'Midjourney', dotColor: '#0891B2' },
    { name: 'Leonardo.AI', dotColor: '#F59E0B' },
    { name: 'Adobe Firefly', dotColor: '#EC4899' },
  ];

  // Pre-generate all prompts and store globally
  platforms.forEach((p, i) => {
    GENERATED_PROMPTS[i] = buildPrompt(p.name);
  });

  // Build audit data
  const d = gatherPromptData();
  const illusItem = getIllusItem();
  const illusRenderOpt = STATE.illusRender ? getIllusRenderOptions().find(r => r.id === STATE.illusRender) : null;
  const motifOpt = STATE.motifSet ? getMotifOptions().find(m => m.id === STATE.motifSet) : null;
  const finishOpt = STATE.finish ? getFinishOptions().find(f => f.id === STATE.finish) : null;
  const presetOpt = STATE.customPreset ? getCustomPresets().find(p => p.id === STATE.customPreset) : null;
  const fontOpt = getFont();
  const sizeOpt = getIllusSizeLabel();

  const auditRows = [
    { step: '1', label: 'Template', value: getArchetype().codeName, section: 'Frame / Density / Overlay' },
    { step: '2', label: 'Style', value: d.step2Opt ? d.step2Opt.name : '—', section: d.framePh ? 'Frame (…)' : (d.overlayPh ? 'Overlay (…)' : 'Density (…)') },
    { step: '3', label: 'Layout', value: getLayout().name, section: 'Layout (…)' },
    { step: '4', label: 'Track', value: getTrack().name, section: 'Header + Style reference' },
    { step: '5a', label: 'Palette', value: getPalette().name, section: 'Background & Finish' },
    { step: '5b', label: 'Finish', value: finishOpt ? finishOpt.name : '—', section: 'Background & Finish' },
    { step: '6a', label: 'Illustration', value: illusItem ? illusItem.name : (STATE.illusItem === 'NONE' ? 'None' : '—'), section: 'Illustration:' },
    { step: '6b', label: 'Render Style', value: illusRenderOpt ? illusRenderOpt.name : '—', section: 'Render style (…)' },
    { step: '6c', label: 'Size', value: sizeOpt ? sizeOpt.name : '—', section: 'Size:' },
    { step: '6d', label: 'Frame Deco', value: STATE.frameDecoration || '—', section: 'Frame (…)' },
    { step: '6e', label: 'Motif', value: motifOpt ? motifOpt.name : '—', section: 'Motif:' },
    { step: '7', label: 'Intensity', value: presetOpt ? presetOpt.name : '—', section: 'Decoration intensity:' },
    { step: '8a', label: 'Font', value: fontOpt ? fontOpt.name : '—', section: 'Text style:' },
    { step: '8b', label: 'Text Colour', value: d.textColPh || '—', section: 'Text style:' },
  ];

  let auditHTML = auditRows.map(r =>
    `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.08);">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(245,158,11,0.3);color:#FCD34D;font-size:10px;font-weight:800;display:grid;place-items:center;flex-shrink:0;">${r.step}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;color:#94A3B8;">${r.label}</div>
        <div style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.value}</div>
      </div>
      <div style="font-size:10px;color:#64748B;text-align:right;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.section}">→ ${r.section}</div>
    </div>`
  ).join('');

  let outputHTML = `<div class="output-header">
    <h2>Your Good Morning Poster Prompt</h2>
    <p>Generated for ${getTrack().name} track · ${getPalette().name} palette</p>
    <details style="margin-top:16px;cursor:pointer;">
      <summary style="font-size:13px;font-weight:700;color:#FCD34D;letter-spacing:0.5px;">PROMPT AUDIT — Every Step → Prompt Section</summary>
      <div style="margin-top:10px;background:rgba(0,0,0,0.2);border-radius:8px;padding:12px;max-height:320px;overflow-y:auto;">
        ${auditHTML}
      </div>
    </details>
  </div>`;

  platforms.forEach((p, i) => {
    const prompt = GENERATED_PROMPTS[i];
    const displayText = prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;');

    outputHTML += `<div class="prompt-block">
      <div class="prompt-header">
        <div class="prompt-platform">
          <div class="platform-dot" style="background-color:${p.dotColor};"></div>
          <div>
            <div class="platform-name">${p.name}</div>
            <div class="platform-sub">Optimized prompt format</div>
          </div>
        </div>
        <button class="btn-copy" onclick="copyPromptByIndex(this, ${i})">Copy</button>
      </div>
      <div class="prompt-body">
        <div class="prompt-text">${displayText}</div>
        <div class="prompt-note"><strong>Tip:</strong> Paste this into ${p.name} and adjust the length if needed.</div>
      </div>
    </div>`;
  });

  const outputWrap = document.querySelector('.output-wrap');
  if (outputWrap) {
    outputWrap.innerHTML = outputHTML;
    outputWrap.classList.add('visible');
    outputWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function copyPromptByIndex(btn, index) {
  const text = GENERATED_PROMPTS[index];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for browsers that block clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

render();
</script>

<div class="output-wrap" id="outputWrap"></div>

</body>
